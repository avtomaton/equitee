// ── Main view ─────────────────────────────────────────────────────────────────

function PropertiesView({ properties, onPropertyClick, onAddProperty, onEditProperty, onReloadProperties }) {
  const { visible, update: setVisible, col, isCustom, reset } = useColumnVisibility('properties');
  const allColKeys   = COLUMN_DEFS.properties.map(d => d.key);
  const allColLabels = Object.fromEntries(COLUMN_DEFS.properties.map(d => [d.key, d.label]));

  const [searchTerm,    setSearchTerm]    = useState('');
  const [sortBy,        setSortBy]        = useState('name');
  const [sortOrder,     setSortOrder]     = useState('asc');
  const [archivedProps, setArchivedProps] = useState([]);

  // Income/expense records fetched once and shared with Analytics
  const [allIncome,   setAllIncome]   = useState([]);
  const [allExpenses, setAllExpenses] = useState([]);

  // Derived filter options
  const allStatuses  = useMemo(() => mergeOptions(INITIAL_OPTIONS.propertyStatuses, properties.map(p => p.status)), [properties]);
  const allTypes     = useMemo(() => mergeOptions(INITIAL_OPTIONS.propertyTypes, properties.map(p => p.type).filter(Boolean)), [properties]);
  const allProvinces = useMemo(() => mergeOptions(PROVINCES, properties.map(p => p.province)), [properties]);
  const allCities    = useMemo(() => [...new Set(properties.map(p => p.city))].sort(), [properties]);

  const [filterStatuses,  setFilterStatuses]  = useState(() => allStatuses);
  const [filterTypes,     setFilterTypes]     = useState(() => allTypes);
  const [filterProvinces, setFilterProvinces] = useState(() => allProvinces);
  const [filterCities,    setFilterCities]    = useState(() => allCities);

  useEffect(() => { setFilterStatuses(prev  => mergeOptions(prev, allStatuses)); },  [allStatuses]);
  useEffect(() => { setFilterTypes(prev     => mergeOptions(prev, allTypes)); },     [allTypes]);
  useEffect(() => { setFilterProvinces(prev => mergeOptions(prev, allProvinces)); }, [allProvinces]);
  useEffect(() => { setFilterCities(prev    => [...new Set([...prev, ...allCities])].sort()); }, [allCities]);

  // Single fetch for income/expenses — shared with Analytics (eliminates double fetch)
  useEffect(() => {
    if (!properties.length) return;
    const ids = properties.map(p => p.id);
    Promise.all(ids.map(id =>
      fetch(`${API_URL}/income?property_id=${id}`).then(r => r.ok ? r.json() : [])
        .then(d => d.map(i => ({ ...i, property_id: id })))
    )).then(r => setAllIncome(r.flat())).catch(() => {});
    Promise.all(ids.map(id =>
      fetch(`${API_URL}/expenses?property_id=${id}`).then(r => r.ok ? r.json() : [])
        .then(d => d.map(e => ({ ...e, property_id: id })))
    )).then(r => setAllExpenses(r.flat())).catch(() => {});
  }, [properties.map(p => p.id).join(',')]);

  const loadArchived = useCallback(() => {
    fetch(`${API_URL}/properties?archived=1`)
      .then(r => r.ok ? r.json() : [])
      .then(all => setArchivedProps(all.filter(p => p.is_archived)))
      .catch(() => {});
  }, []);

  useEffect(() => { loadArchived(); }, [loadArchived]);

  const handleArchive = async (id) => {
    if (!confirm('Archive this property? It will be hidden from all views but can be restored.')) return;
    const res = await fetch(`${API_URL}/properties/${id}`, { method: 'DELETE' });
    if (res.ok) { onReloadProperties(); loadArchived(); }
    else alert('Failed to archive property');
  };

  const handleRestore = async (id) => {
    const res = await fetch(`${API_URL}/properties/${id}/restore`, { method: 'POST' });
    if (res.ok) { onReloadProperties(); loadArchived(); }
    else alert('Failed to restore property');
  };

  const filtered = useMemo(() => {
    let list = properties.filter(p => {
      const q = searchTerm.toLowerCase();
      if (q && !p.name.toLowerCase().includes(q) &&
               !p.city.toLowerCase().includes(q) &&
               !p.address.toLowerCase().includes(q)) return false;
      if (!filterStatuses.includes(p.status))                  return false;
      if (p.type && !filterTypes.includes(p.type))             return false;
      if (!filterProvinces.includes(p.province))               return false;
      if (allCities.length && !filterCities.includes(p.city))  return false;
      return true;
    });
    list.sort((a, b) => {
      const dir = sortOrder === 'asc' ? 1 : -1;
      switch (sortBy) {
        case 'name':         return dir * a.name.localeCompare(b.name);
        case 'score': {
          const sA = calcSimpleHealth(a).score;
          const sB = calcSimpleHealth(b).score;
          return dir * (sA - sB);
        }
        case 'market_price':   return dir * (a.market_price   - b.market_price);
        case 'monthly_rent':   return dir * (a.monthly_rent   - b.monthly_rent);
        case 'total_income':   return dir * (a.total_income   - b.total_income);
        case 'total_expenses': return dir * (a.total_expenses - b.total_expenses);
        case 'net':    return dir * ((a.total_income - a.total_expenses) - (b.total_income - b.total_expenses));
        case 'roi': {
          const rA = a.market_price ? (a.total_income - a.total_expenses) / a.market_price : 0;
          const rB = b.market_price ? (b.total_income - b.total_expenses) / b.market_price : 0;
          return dir * (rA - rB);
        }
        default: return 0;
      }
    });
    return list;
  }, [properties, searchTerm, filterStatuses, filterTypes, filterProvinces, filterCities, sortBy, sortOrder]);

  // Per-property all-time principal for table rows
  const perPropPrincipal = useMemo(() => {
    const map = {};
    for (const p of filtered) {
      const pe = allExpenses.filter(r => r.property_id === p.id);
      map[p.id] = principalInRange(pe, p.loan_amount, p.mortgage_rate || 0, new Date(0), new Date());
    }
    return map;
  }, [filtered, allExpenses]);

  // ── Summary stats ─────────────────────────────────────────────────────────
  const totalValue    = filtered.reduce((s, p) => s + p.market_price,   0);
  const totalPurchase = filtered.reduce((s, p) => s + p.purchase_price, 0);
  const totalIncome   = filtered.reduce((s, p) => s + p.total_income,   0);
  const totalExpenses = filtered.reduce((s, p) => s + p.total_expenses, 0);
  const totalLoan     = filtered.reduce((s, p) => s + p.loan_amount,    0);
  const totalBalance  = totalIncome - totalExpenses;
  const totalEquity   = totalValue - totalLoan;
  const totalAppr     = totalValue - totalPurchase;
  const totalApprPct  = totalPurchase > 0 ? totalAppr / totalPurchase * 100 : null;
  const ltvPct        = totalValue > 0 ? totalLoan / totalValue * 100 : null;
  const netPosition   = totalValue + totalIncome - totalExpenses - totalLoan;
  const npPct         = totalBalance !== 0 ? (netPosition / Math.abs(totalBalance) * 100) : null;
  const occupiedCount = filtered.filter(p => p.status !== 'Vacant').length;
  const occupancyPct  = filtered.length > 0 ? occupiedCount / filtered.length * 100 : 0;
  const ltvColors     = ltvColor(ltvPct ?? 0);

  // YTD operating profit (3M avg CF, OER) — computed from lifted income/expense data
  const summaryMetrics = useMemo(() => {
    if (!filtered.length) return null;
    const now        = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const { start: ytdStart, end: ytdEnd } = trailingYear();
    const win3Start  = new Date(monthStart); win3Start.setMonth(win3Start.getMonth() - 3);

    const inYTD = makeInTrailingYear();
    const in3M  = d => { if (!d) return false; const [y,m,dd] = d.split('-').map(Number); const dt = new Date(y,m-1,dd); return dt >= win3Start && dt < monthStart; };

    const filteredIds = new Set(filtered.map(p => p.id));
    const filtInc = allIncome.filter(r   => filteredIds.has(r.property_id));
    const filtExp = allExpenses.filter(r => filteredIds.has(r.property_id));

    const ytdInc  = filtInc.filter(r => inYTD(r.income_date)).reduce((s, r) => s + r.amount, 0);
    const ytdExp  = filtExp.filter(r => inYTD(r.expense_date)).reduce((s, r) => s + r.amount, 0);
    const ytdPrin = filtered.reduce((sum, p) => {
      const pe = filtExp.filter(r => r.property_id === p.id);
      return sum + principalInRange(pe, p.loan_amount, p.mortgage_rate || 0, ytdStart, ytdEnd);
    }, 0);
    const ytdOpProfit = ytdInc - (ytdExp - ytdPrin);

    const inc3 = filtInc.filter(r => in3M(r.income_date)).reduce((s, r) => s + r.amount, 0);
    const exp3 = filtExp.filter(r => in3M(r.expense_date)).reduce((s, r) => s + r.amount, 0);
    const noi3 = filtExp.filter(r => in3M(r.expense_date) && !['Mortgage', 'Principal'].includes(r.expense_category)).reduce((s, r) => s + r.amount, 0);
    const avgCF = (inc3 - exp3) / 3;
    const oer   = inc3 > 0 ? noi3 / inc3 : null;

    // Interest Coverage Ratio
    const totalAnnualInterest = calcPortfolioInterest(filtered);
    const annualNOI3 = (inc3 - noi3) / 3 * 12;   // avg monthly NOI × 12
    const icr  = totalAnnualInterest > 0 ? annualNOI3 / totalAnnualInterest : null;
    const expNOIAnnual = filtered.reduce((sum, p) => {
      const e = calcExpected(p, 0);  // mortgage excluded — ICR uses interest, not debt service
      return e ? sum + e.monthlyNOI * 12 : sum;
    }, 0);
    const expICR = totalAnnualInterest > 0 && expNOIAnnual > 0
      ? expNOIAnnual / totalAnnualInterest : null;

    return { ytdOpProfit, avgCF, oer, icr, expICR };
  }, [filtered, allIncome, allExpenses]);

  // ── Smart tips ────────────────────────────────────────────────────────────
  const smartTips = useMemo(() => {
    const tips = [];
    if (!filtered.length) return tips;

    const vacant   = filtered.filter(p => p.status === 'Vacant');
    const negative = filtered.filter(p => {
      const dp = p.purchase_price - p.loan_amount;
      return p.total_income > 0 && (p.total_income - (p.total_expenses - dp)) < 0;
    });
    const highLTV  = filtered.filter(p => p.purchase_price > 0 && p.loan_amount / p.purchase_price > 0.80);
    const noRent   = filtered.filter(p => !p.monthly_rent && p.status === 'Rented');
    const scores   = filtered.map(p => ({ p, s: calcSimpleHealth(p) }));
    const bottomTwo  = [...scores].sort((a, b) => a.s.score - b.s.score).slice(0, 2);
    const strongOnes = scores.filter(x => x.s.score >= 70);
    const highNPLowCF = filtered.filter(p =>
      p.market_price + p.total_income - p.total_expenses - p.loan_amount > p.market_price * 0.10 &&
      p.total_income > 0 && (p.total_income - p.total_expenses) < 0
    );
    const occPct = filtered.filter(p => p.status !== 'Vacant').length / filtered.length * 100;

    if (vacant.length > 0) {
      const lostRent = vacant.reduce((s, p) => s + (p.monthly_rent || 0), 0);
      tips.push({ icon: '🏠', cls: 'text-danger', label: `${vacant.length} vacant propert${vacant.length > 1 ? 'ies' : 'y'}`,
        detail: lostRent > 0
          ? `Losing up to ${fmt(lostRent)}/mo in potential rent. Prioritise filling vacancies to improve cash flow.`
          : `${vacant.length} propert${vacant.length > 1 ? 'ies' : 'y'} with no rental income.` });
    }
    if (highNPLowCF.length > 0) {
      const names   = highNPLowCF.map(p => p.name).join(', ');
      const totalNP = highNPLowCF.reduce((s, p) => s + p.market_price + p.total_income - p.total_expenses - p.loan_amount, 0);
      tips.push({ icon: '💡', cls: 'text-warning', label: 'Strong net position, weak cash flow',
        detail: `${names} ${highNPLowCF.length > 1 ? 'have' : 'has'} a combined net position of ${fmt(totalNP)} but ${highNPLowCF.length > 1 ? 'are' : 'is'} cash-flow-negative.` });
    }
    if (negative.length > 0) {
      tips.push({ icon: '📉', cls: 'text-danger', label: `${negative.length} cash-flow-negative propert${negative.length > 1 ? 'ies' : 'y'}`,
        detail: `${negative.map(p => p.name).join(', ')} ${negative.length > 1 ? 'are' : 'is'} generating more expenses than income.` });
    }
    if (highLTV.length > 0) {
      tips.push({ icon: '⚡', cls: 'text-warning', label: `${highLTV.length} high-leverage propert${highLTV.length > 1 ? 'ies' : 'y'}`,
        detail: `${highLTV.map(p => p.name).join(', ')} ${highLTV.length > 1 ? 'have' : 'has'} LTV above 80%.` });
    }
    if (occPct < 80 && filtered.length > 1) {
      tips.push({ icon: '📊', cls: 'text-warning', label: `Occupancy at ${occPct.toFixed(0)}%`,
        detail: `Only ${filtered.filter(p => p.status !== 'Vacant').length} of ${filtered.length} properties are occupied. Industry target is 90%+.` });
    }
    if (noRent.length > 0) {
      tips.push({ icon: '⚠️', cls: 'text-warning', label: `${noRent.length} rented propert${noRent.length > 1 ? 'ies' : 'y'} missing rent amount`,
        detail: `Set monthly rent on ${noRent.map(p => p.name).join(', ')} to enable cap rate and vacancy calculations.` });
    }
    if (bottomTwo.length > 0 && filtered.length > 2) {
      tips.push({ icon: '🔻', cls: 'text-warning', label: 'Lowest-scoring properties',
        detail: `${bottomTwo.map(x => `${x.p.name} (${x.s.score}/100)`).join(', ')}. Click to see detailed insights.` });
    }
    if (strongOnes.length > 0) {
      tips.push({ icon: '🚀', cls: 'text-success', label: `${strongOnes.length} healthy propert${strongOnes.length > 1 ? 'ies' : 'y'}`,
        detail: `${strongOnes.map(x => x.p.name).join(', ')} score 70+ — strong performers.` });
    }
    if (!tips.length) {
      tips.push({ icon: '✅', cls: 'text-success', label: 'Portfolio looks healthy',
        detail: 'No major issues detected across the filtered properties.' });
    }
    return tips;
  }, [filtered]);

  return (
    <>
      <div className="page-header">
        <div>
          <h1 className="page-title">Properties
            {filtered.length < properties.length && (
              <span style={{ fontSize: '1rem', fontWeight: 500, color: 'var(--text-tertiary)', marginLeft: '0.6rem' }}>
                ({filtered.length}/{properties.length})
              </span>
            )}
          </h1>
          <p className="page-subtitle">Manage your real estate portfolio</p>
        </div>
        <div className="page-actions">
          <button className="btn btn-primary" onClick={onAddProperty}>+ Add Property</button>
        </div>
      </div>

      {/* ── Summary bar ── */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '0.75rem' }}>
        <KPICard label="Portfolio Value" primary={fmt(totalValue)}
          secondary={totalAppr !== 0
            ? (totalAppr >= 0 ? '+' : '') + fmt(totalAppr) + (totalApprPct !== null ? ' (' + totalApprPct.toFixed(1) + '%)' : '')
            : null}
          secondaryCls={totalAppr >= 0 ? 'text-success' : 'text-danger'}
          accentColor="#3b82f6"
          tooltip={`Sum of current market values.\nTotal appreciation: ${fmt(totalAppr)} (${totalApprPct !== null ? totalApprPct.toFixed(1) + '%' : 'n/a'} over purchase price of ${fmt(totalPurchase)}).`} />

        <KPICard label="Equity" primary={fmt(totalEquity)}
          primaryCls={totalEquity >= 0 ? 'text-success' : 'text-danger'}
          secondary={ltvPct !== null ? `LTV ${ltvPct.toFixed(0)}%` : null}
          secondaryCls={ltvColors.cls}
          accentColor={totalEquity >= 0 ? '#10b981' : '#ef4444'}
          tooltip="Your ownership stake across filtered properties.\nFormula: Total Market Value − Total Loans.\nLTV = Total Loans ÷ Market Value." />

        <KPICard label="Net Position" primary={fmt(netPosition)}
          primaryCls={netPosition >= 0 ? 'text-success' : 'text-danger'}
          secondary={npPct !== null ? npPct.toFixed(1) + '% of net spending' : null}
          secondaryCls={npPct !== null ? (npPct >= 0 ? 'text-success' : 'text-danger') : ''}
          accentColor={netPosition >= 0 ? '#10b981' : '#ef4444'}
          tooltip="What you'd walk away with selling all filtered properties and clearing their mortgages today.\nFormula: Portfolio Value + All Income − All Expenses − All Loans." />

        <KPICard label="Occupancy"
          primary={filtered.length ? `${occupancyPct.toFixed(0)}%` : '—'}
          primaryCls={occupancyPct >= 90 ? 'text-success' : occupancyPct >= 70 ? '' : 'text-danger'}
          secondary={`${occupiedCount}/${filtered.length} properties`}
          accentColor={occupancyPct >= 90 ? '#10b981' : occupancyPct >= 70 ? '#f59e0b' : '#ef4444'}
          tooltip="Share of filtered properties currently occupied (not marked Vacant).\nTarget 90%+." />

        <KPICard label="Avg Cash Flow"
          primary={summaryMetrics ? fmt(summaryMetrics.avgCF) : '…'}
          primaryCls={!summaryMetrics ? '' : summaryMetrics.avgCF >= 0 ? 'text-success' : 'text-danger'}
          tertiary="3-month avg"
          accentColor={!summaryMetrics ? '#6b7280' : summaryMetrics.avgCF >= 0 ? '#10b981' : '#ef4444'}
          tooltip="Average monthly profit per property over the last 3 months." />

        <KPICard label="OER"
          primary={summaryMetrics && summaryMetrics.oer !== null ? `${(summaryMetrics.oer * 100).toFixed(1)}%` : '…'}
          primaryCls={!summaryMetrics || summaryMetrics.oer === null ? '' : summaryMetrics.oer < 0.35 ? 'text-success' : summaryMetrics.oer < 0.5 ? '' : 'text-danger'}
          tertiary="3-month avg"
          accentColor={!summaryMetrics || summaryMetrics.oer === null ? '#6b7280' : summaryMetrics.oer < 0.35 ? '#10b981' : summaryMetrics.oer < 0.5 ? '#f59e0b' : '#ef4444'}
          tooltip="Operating Expense Ratio: what fraction of income is consumed by operating costs (excl. mortgage). 3-month average." />

        <KPICard label="ICR"
          primary={summaryMetrics?.icr != null ? summaryMetrics.icr.toFixed(2) + 'x' : '…'}
          primaryCls={!summaryMetrics?.icr ? '' : summaryMetrics.icr >= 2 ? 'text-success' : summaryMetrics.icr >= 1.25 ? '' : 'text-danger'}
          secondary={summaryMetrics?.expICR != null ? `Exp: ${summaryMetrics.expICR.toFixed(2)}x` : null}
          secondaryCls={summaryMetrics?.expICR != null
            ? (summaryMetrics.expICR >= 2 ? 'text-success' : summaryMetrics.expICR >= 1.25 ? '' : 'text-danger')
            : ''}
          tertiary="3-month avg"
          accentColor={!summaryMetrics?.icr ? '#6b7280' : summaryMetrics.icr >= 2 ? '#10b981' : summaryMetrics.icr >= 1.25 ? '#f59e0b' : '#ef4444'}
          tooltip={'Interest Coverage Ratio = annualised NOI \u00f7 total annual interest (loan \u00d7 rate).\n\u2265 2.0x: strong. 1.25\u20132.0x: adequate. < 1.25x: tight.\nExp uses budgeted operating costs.'} />

        <KPICard label="Op. Profit"
          primary={summaryMetrics ? fmt(summaryMetrics.ytdOpProfit) : '…'}
          primaryCls={!summaryMetrics ? '' : summaryMetrics.ytdOpProfit >= 0 ? 'text-success' : 'text-danger'}
          tertiary="YTD"
          accentColor={!summaryMetrics ? '#6b7280' : summaryMetrics.ytdOpProfit >= 0 ? '#10b981' : '#ef4444'}
          tooltip="Trailing 12-month income minus operating expenses (principal excluded)." />
      </div>

      {/* ── Insights ── */}
      {smartTips.length > 0 && (
        <Collapsible title="💡 Portfolio Insights" defaultOpen={false}>
          <div style={{ padding: '0.5rem 1.5rem 1rem', display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
            {smartTips.map((tip, i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'flex-start', gap: '0.65rem',
                padding: '0.55rem 0.85rem', borderRadius: '8px',
                border: '1px solid var(--border)', background: 'var(--bg-tertiary)',
              }}>
                <span style={{ fontSize: '1.1rem', lineHeight: 1, flexShrink: 0, marginTop: '0.1rem' }}>{tip.icon}</span>
                <div>
                  <span style={{ fontWeight: 600, fontSize: '0.82rem' }} className={tip.cls}>{tip.label} </span>
                  <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', lineHeight: 1.5 }}>{tip.detail}</span>
                </div>
              </div>
            ))}
          </div>
        </Collapsible>
      )}

      {/* ── Analytics ── */}
      {properties.length > 0 && (
        <Collapsible title="📈 Analytics" defaultOpen={false}>
          <Analytics filtered={filtered} allIncome={allIncome} allExpenses={allExpenses} />
        </Collapsible>
      )}

      {/* ── Properties table ── */}
      <div className="table-container">
        <div className="table-header">
          <div className="table-title">All Properties ({filtered.length})</div>
        </div>

        <div style={{
          padding: '0.6rem 1.25rem', borderBottom: '1px solid var(--border)',
          display: 'flex', flexWrap: 'wrap', gap: '0.4rem', alignItems: 'center',
        }}>
          <input type="text" placeholder="Search…" value={searchTerm}
            onChange={e => setSearchTerm(e.target.value)}
            style={{ width: 150, fontSize: '0.82rem', padding: '0.38rem 0.6rem' }} />
          <MultiSelect label="Status"   options={allStatuses}  selected={filterStatuses}  onChange={setFilterStatuses} />
          <MultiSelect label="Type"     options={allTypes}     selected={filterTypes}     onChange={setFilterTypes} />
          <MultiSelect label="Province" options={allProvinces} selected={filterProvinces} onChange={setFilterProvinces} />
          {allCities.length > 0 && (
            <MultiSelect label="City" options={allCities} selected={filterCities} onChange={setFilterCities} />
          )}
          <MultiSelect label="Columns" options={allColKeys} selected={visible} onChange={setVisible} labelMap={allColLabels} />
          {isCustom && <ResetColumnsButton onClick={reset} />}
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '0.4rem', flexShrink: 0 }}>
            <span style={{ fontSize: '0.75rem', color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Sort</span>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              style={{ fontSize: '0.82rem', padding: '0.38rem 0.5rem' }}>
              <option value="name">Name</option>
              <option value="score">Score</option>
              <option value="market_price">Market Value</option>
              <option value="monthly_rent">Rent</option>
              <option value="total_income">Income</option>
              <option value="total_expenses">Expenses</option>
              <option value="net">Net Position</option>
              <option value="roi">ROI</option>
            </select>
            <button className="btn btn-secondary btn-small"
              onClick={() => setSortOrder(o => o === 'asc' ? 'desc' : 'asc')}>
              {sortOrder === 'asc' ? '↑' : '↓'}
            </button>
          </div>
        </div>

        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">🏢</div>
            <div className="empty-state-text">No properties match the current filters</div>
          </div>
        ) : (
          <div className="table-scroll-wrap">
            <table>
              <thead>
                <tr>
                  {col('name')         && <th className="col-fill">Name</th>}
                  <th className="col-shrink" title="Investment health score (0–100)">Score</th>
                  {col('status')       && <th className="col-shrink">Status</th>}
                  {col('type')         && <th className="col-shrink">Type</th>}
                  {col('location')     && <th className="col-shrink">Location</th>}
                  {col('market_price') && <th className="col-shrink">Mkt Value</th>}
                  {col('monthly_rent') && <th className="col-shrink">Rent/mo</th>}
                  {col('total_income') && <th className="col-shrink">Income</th>}
                  {col('net_expenses') && <th className="col-shrink">Net Exp</th>}
                  {col('net')          && <th className="col-shrink">Net Position</th>}
                  {col('roi')          && <th className="col-shrink">ROI</th>}
                  {col('equity')       && <th className="col-shrink">Equity</th>}
                  {col('loan')         && <th className="col-shrink">Loan</th>}
                  {col('poss_date')    && <th className="col-shrink">Possession</th>}
                  {col('notes')        && <th className="col-fill">Notes</th>}
                  <th style={{ width: 52 }}></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => {
                  const netExp     = p.total_expenses - (perPropPrincipal[p.id] ?? 0);
                  const net        = p.market_price + p.total_income - p.total_expenses - p.loan_amount;
                  const roi        = p.market_price ? ((net / p.market_price) * 100).toFixed(1) : null;
                  const equity     = p.market_price - p.loan_amount;
                  const health     = calcSimpleHealth(p);
                  const hColor     = health.score >= 70 ? '#10b981' : health.score >= 40 ? '#f59e0b' : '#ef4444';
                  return (
                    <tr key={p.id} style={{ cursor: 'pointer' }} onClick={() => onPropertyClick(p)}>
                      {col('name')         && <td className="col-fill"><strong>{p.name}</strong></td>}
                      <td className="col-shrink">
                        <span title={`${health.label} — ${health.score}/100`} style={{
                          display: 'inline-block', width: '2.1rem', textAlign: 'center',
                          fontSize: '0.78rem', fontWeight: 700, padding: '0.15rem 0.3rem', borderRadius: '6px',
                          background: `${hColor}22`, color: hColor, cursor: 'default',
                        }}>{health.score}</span>
                      </td>
                      {col('status')       && <td className="col-shrink"><span className={`property-badge ${p.status?.toLowerCase()}`}>{p.status}</span></td>}
                      {col('type')         && <td className="col-shrink">{p.type || '—'}</td>}
                      {col('location')     && <td className="col-shrink"><TruncatedCell text={`${p.city}, ${p.province}`} /></td>}
                      {col('market_price') && <td className="col-shrink">{fmt(p.market_price)}</td>}
                      {col('monthly_rent') && <td className="col-shrink">{p.monthly_rent ? fmt(p.monthly_rent) : <span style={{ color: 'var(--text-tertiary)' }}>—</span>}</td>}
                      {col('total_income') && <td className="col-shrink text-success">{fmt(p.total_income)}</td>}
                      {col('net_expenses') && <td className={`col-shrink ${netExp >= 0 ? 'text-danger' : 'text-success'}`}>{fmt(netExp)}</td>}
                      {col('net')          && <td className={`col-shrink ${net >= 0 ? 'text-success' : 'text-danger'}`}>{fmt(net)}</td>}
                      {col('roi')          && <td className={roi !== null && parseFloat(roi) >= 0 ? 'text-success' : 'text-danger'}>{roi !== null ? `${roi}%` : '—'}</td>}
                      {col('equity')       && <td className="col-shrink">{fmt(equity)}</td>}
                      {col('loan')         && <td className="col-shrink">{fmt(p.loan_amount)}</td>}
                      {col('poss_date')    && <td style={{ whiteSpace: 'nowrap' }}>{p.poss_date || '—'}</td>}
                      {col('notes')        && <td className="col-fill" onClick={e => e.stopPropagation()}><TruncatedCell text={p.notes} /></td>}
                      <td onClick={e => e.stopPropagation()}>
                        <div className="row-actions">
                          <button className="btn btn-secondary btn-icon" title="Edit"    onClick={() => onEditProperty(p)}>✏️</button>
                          <button className="btn btn-danger    btn-icon" title="Archive" onClick={() => handleArchive(p.id)}>🗑</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <ArchivedPropertiesSection archivedProps={archivedProps} onRestore={handleRestore} />
    </>
  );
}


// ── src/components/PropertyDetail.jsx──────────────────────

const DETAIL_TOOLTIP_STYLE = {
  background: '#1a1f2e', border: '1px solid #374151', borderRadius: '8px', color: '#f3f4f6',
};

function PropertyDetail({ property, properties = [], onSelectProperty, onBack,
                                         onAddExpense, onAddIncome, onAddTenant, onEdit, onJump }) {
  const [tenants,    setTenants]    = useState([]);
  const [expenses,   setExpenses]   = useState([]);
  const [events,     setEvents]     = useState([]);
  const [income,     setIncome]     = useState([]);
  const [avgWindow,  setAvgWindow]  = useState(3);

  useEffect(() => {
    if (!property) return;

    // Income and expenses are fetched atomically so YTD metrics never render
    // with one loaded and the other still empty (race condition → wrong YTD values).
    Promise.all([
      fetch(`${API_URL}/income?property_id=${property.id}`).then(r => r.ok ? r.json() : []),
      fetch(`${API_URL}/expenses?property_id=${property.id}`).then(r => r.ok ? r.json() : []),
    ]).then(([inc, exp]) => {
      setIncome(inc);
      setExpenses(exp);
    }).catch(() => {});

    // Tenants and events don't affect financial metrics — load independently.
    fetch(`${API_URL}/tenants?property_id=${property.id}`)
      .then(r => r.ok ? r.json() : []).then(setTenants).catch(() => {});
    fetch(`${API_URL}/events?property_id=${property.id}`)
      .then(r => r.ok ? r.json() : []).then(setEvents).catch(() => {});
  }, [property?.id, property?.total_income, property?.total_expenses]);

  if (!property) return null;

  // ── Derived view helpers ──────────────────────────────────────────────────
  const currTenants = tenants.filter(isCurrentTenant);
  const recentExp   = [...expenses].sort((a, b) => new Date(b.expense_date) - new Date(a.expense_date)).slice(0, 5);
  const isVacant    = property.status === 'Vacant';

  const lastRentChange = useMemo(() => {
    const rentEvents = events
      .filter(e => e.column_name === 'monthly_rent' && parseFloat(e.old_value) > 0 && parseFloat(e.new_value) > 0)
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    return rentEvents[0] ?? null;
  }, [events]);

  // ── Financial fundamentals ────────────────────────────────────────────────
  const downPmt  = property.purchase_price - property.loan_amount;
  const equity   = property.market_price   - property.loan_amount;
  const equityPct = property.market_price > 0 ? equity / property.market_price * 100 : null;
  const loanPct   = property.market_price > 0 ? property.loan_amount / property.market_price * 100 : null;
  const appr      = property.market_price - property.purchase_price;
  const apprPct   = property.purchase_price > 0 ? appr / property.purchase_price * 100 : null;
  const yrs       = yearsHeld(property);
  const yearlyAppr    = yrs ? appr / yrs : null;
  const yearlyApprPct = (yrs && property.purchase_price > 0) ? yearlyAppr / property.purchase_price * 100 : null;
  const projectedYE   = property.market_price + (yearlyAppr ?? 0) * yearFracRemaining();
  const balance         = property.total_income   - property.total_expenses;
  const sellingProfit   = property.market_price + property.total_income - property.total_expenses - property.loan_amount;
  const availableEquity = Math.max(0, 0.80 * property.market_price - property.loan_amount);

  // ── YTD window (trailing 12 months) ──────────────────────────────────────
  const { start: ytdStart, end: ytdEnd } = trailingYear();
  const inYTD = makeInTrailingYear();
  const ytdInc        = income.filter(r   => inYTD(r.income_date)).reduce((s, r) => s + r.amount, 0);
  const ytdExp        = expenses.filter(r => inYTD(r.expense_date)).reduce((s, r) => s + r.amount, 0);
  const ytdBal        = ytdInc - ytdExp;
  const ytdPrin       = principalInRange(expenses, property.loan_amount, property.mortgage_rate || 0, ytdStart, ytdEnd);
  const allTimePrin   = principalInRange(expenses, property.loan_amount, property.mortgage_rate || 0, new Date(0), new Date());

  // Net Expenses = Total Expenses − allTimePrin (down payment + all mortgage principal repayments)
  const totalNetExp     = property.total_expenses - allTimePrin;
  const totalNetBalance = property.total_income   - totalNetExp;
  const roi             = property.market_price > 0 ? totalNetBalance / property.market_price * 100 : null;
  const ytdNetExp     = ytdExp     - ytdPrin;
  const ytdNetBalance = ytdInc     - ytdNetExp;

  // ── Monthly averages & ratios ─────────────────────────────────────────────
  const avg          = avgMonthly(income, expenses, avgWindow);
  const monthlyRent  = property.monthly_rent;
  const annualRent   = monthlyRent * 12;
  const annualNOI    = avg.noi * 12;
  const annualCashFlow = avg.cashflow * 12;
  const capRate      = property.purchase_price > 0 ? annualNOI  / property.purchase_price : 0;
  const cashOnCash   = equity > 0 ? annualCashFlow / equity : 0;
  const loanToValue  = property.market_price > 0 ? property.loan_amount / property.market_price : 0;
  const expenseRatio = monthlyRent > 0 ? avg.expenses / monthlyRent : 0;
  const rentToValue  = property.purchase_price > 0 ? annualRent / property.purchase_price : 0;
  const oer          = avg.income > 0 ? avg.noiExpenses / avg.income : 0;

  const annualInterest = property.loan_amount > 0 && property.mortgage_rate > 0
    ? property.loan_amount * property.mortgage_rate / 100 : null;
  const icr    = annualInterest > 0 ? annualNOI / annualInterest : null;
  const expICR = (annualInterest > 0 && expected?.monthlyNOI != null)
    ? expected.monthlyNOI * 12 / annualInterest : null;

  // ── Derived metrics that were previously inline IIFEs ─────────────────────
  // Economic vacancy: uses status-change and rent-change events to measure real
  // vacancy windows, rather than comparing income against potential rent.
  const econVacancy = useMemo(
    () => calcEconVacancy(property, events, ytdStart, ytdEnd),
    [property, events, ytdStart, ytdEnd]
  );

  const maintCapexRatio = (() => {
    if (!monthlyRent) return null;
    const maintExp = expenses
      .filter(r => inYTD(r.expense_date) && ['Maintenance', 'Capital'].includes(r.expense_category))
      .reduce((s, r) => s + r.amount, 0);
    return annualRent > 0 ? maintExp / annualRent : null;
  })();

  const irr = (() => {
    const cfs = buildPropertyIRRCashFlows(property, income, expenses);
    if (!cfs) return null;
    return calcIRR(cfs);
  })();

  // ── Expected / budgeted values ────────────────────────────────────────────
  const expected       = calcExpected(property, avg.mortgage);
  const monthlyAppr    = yearlyAppr !== null ? yearlyAppr / 12 : 0;
  const monthlyGain    = avg.cashflow + monthlyAppr;

  const expApprPct     = property.expected_appreciation_pct || 0;
  const expYearlyAppr  = expApprPct > 0 ? property.purchase_price * expApprPct / 100 : null;
  const expMonthlyAppr = expYearlyAppr !== null ? expYearlyAppr / 12 : null;
  const expMonthlyCF   = expected?.monthlyCF ?? null;
  const expMonthlyGain = (expMonthlyCF !== null && expMonthlyAppr !== null)
    ? expMonthlyCF + expMonthlyAppr
    : expMonthlyCF !== null ? expMonthlyCF : null;

  // ── Payback & Break-even via shared pure functions ──────────────────────
  const pbOutstanding = property.total_expenses - property.total_income;
  const paybackPeriod = calcPayback(pbOutstanding, avg.cashflow);
  const expPayback    = (() => {
    if (expMonthlyCF == null || expMonthlyCF <= 0) return null;
    if (pbOutstanding <= 0) return 'Exp: Recovered';
    return 'Exp: ' + fmtPeriod(pbOutstanding / expMonthlyCF);
  })();

  const breakEven    = calcBreakEven(sellingProfit, monthlyGain);
  const expBreakEven = (() => {
    if (expMonthlyGain == null || expMonthlyGain <= 0) return null;
    if (sellingProfit >= 0) return 'Exp: Reached';
    return 'Exp: ' + fmtPeriod(-sellingProfit / expMonthlyGain);
  })();

  // ── Investment score & analysis ───────────────────────────────────────────
  const investmentScore = calcSimpleHealth(property);
  const ltvRatio        = loanToValue;
  const yearlyApprRatio = (yearlyAppr !== null && property.purchase_price > 0)
    ? yearlyAppr / property.purchase_price : 0;

  const expProps = (actual, exp, colorFn, fmtFn, label = 'Exp:', hiIsGood = true, absThresh = 25) =>
    expGap(actual, exp, colorFn, fmtFn, label, hiIsGood, absThresh);

  // ── Net Position card secondary ───────────────────────────────────────────
  const npPct = balance !== 0 ? (sellingProfit / Math.abs(balance) * 100) : null;

  const monthlyGainExpProps = expGap(monthlyGain, expMonthlyGain, v => v >= 0 ? 'text-success' : 'text-danger', fmt, 'Exp:', true, 50);

  // yearlyApprExpProps: custom label + special tertiary when no possession date
  const yearlyApprExpProps = expYearlyAppr == null ? {} : yearlyAppr === null
    ? { secondary: `Exp: ${fmt(expYearlyAppr)} (${expApprPct}% per year)`,
        secondaryCls: 'text-success',
        tertiary: 'No possession date \u2014 cannot compute actual' }
    : expGap(yearlyAppr, expYearlyAppr, v => v >= 0 ? 'text-success' : 'text-danger',
        v => `${fmt(v)} (${expApprPct}% per year)`, 'Exp:', true, 200);

  // ── Year-End Balance ──────────────────────────────────────────────────────
  const ml          = monthsLeftInYear();
  const yearEndRate = sellingProfit + avg.cashflow * ml + monthlyAppr * ml;
  const yearEndBudg = expMonthlyGain != null ? sellingProfit + expMonthlyGain * ml : null;
  const yearEndExpProps = expGap(yearEndRate, yearEndBudg, v => v >= 0 ? 'text-success' : 'text-danger', fmt, 'Budget:', true, 1000);

  // ── Property analysis ────────────────────────────────────────────────────
  const analysis = analyzeProperty(property, income, {
    avgCashflow: avg.cashflow, yearlyAppr, monthlyAppr, monthlyGain, sellingProfit,
    monthlyRent, capRate, expenseRatio, ltvRatio, equity, cashOnCash, yearlyApprRatio,
  });
  const [primary, ...secondary] = analysis;

  // ── Chart data ────────────────────────────────────────────────────────────
  const chartData = [
    { name: 'Income',           value: property.total_income },
    { name: 'Net Exp',          value: Math.max(0, totalNetExp) },
    { name: 'Operating Profit', value: totalNetBalance },
  ];

  return (
    <>
      {/* Header */}
      <div className="page-header">
        <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
          <button className="btn btn-secondary" onClick={onBack}>← Back</button>
          {properties.length > 1 && (
            <select
              value={property.id}
              onChange={e => {
                const p = properties.find(x => x.id === Number(e.target.value));
                if (p) onSelectProperty?.(p);
              }}
              style={{
                padding: '0.4rem 0.6rem', borderRadius: '6px', fontSize: '0.82rem',
                background: 'var(--bg-tertiary)', border: '1px solid var(--border)',
                color: 'var(--text-primary)', cursor: 'pointer', maxWidth: 220,
              }}
            >
              <PropertyOptions properties={properties} />
            </select>
          )}
        </div>
        <div className="page-actions">
          <button className="btn btn-secondary" onClick={onEdit}>✏️ Edit</button>
          <button className="btn btn-secondary" onClick={onAddTenant}>+ Tenant</button>
          <button className="btn btn-secondary" onClick={onAddExpense}>+ Expense</button>
          <button className="btn btn-primary"   onClick={onAddIncome}>+ Income</button>
        </div>
      </div>

      {/* Title panel */}
      <div className="detail-panel">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <h1 className="page-title" style={{ marginBottom: '0.25rem' }}>{property.name}</h1>
            <p className="page-subtitle" style={{ marginBottom: '0.5rem' }}>
              {property.address}, {property.city}, {property.province} {property.postal_code}
            </p>
            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
              <span className={`property-badge ${property.status?.toLowerCase()}`}>{property.status}</span>
              {property.type && (
                <span className="property-badge" style={{ background: 'rgba(139,92,246,0.1)', color: '#8b5cf6' }}>
                  {property.type}
                </span>
              )}
              {lastRentChange ? (
                <span style={{
                  fontSize: '0.8rem', color: 'var(--text-secondary)',
                  background: 'var(--bg-tertiary)', border: '1px solid var(--border)',
                  borderRadius: '6px', padding: '0.2rem 0.6rem',
                }}>
                  Last rent change: <strong style={{ color: 'var(--text-primary)' }}>
                    {new Date(lastRentChange.created_at).toLocaleDateString()}
                  </strong>
                  {' '}(was ${parseFloat(lastRentChange.old_value).toLocaleString()}/mo)
                </span>
              ) : !isVacant && (
                <span style={{ fontSize: '0.8rem', color: 'var(--text-tertiary)', fontStyle: 'italic' }}>
                  No rent changes recorded
                </span>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* Jump buttons */}
      <div className="jump-buttons">
        {[
          { label: '💳 Expenses', view: 'expenses' },
          { label: '💰 Income',   view: 'income'   },
          { label: '👤 Tenants',  view: 'tenants'  },
          { label: '📝 Events',   view: 'events'   },
        ].map(({ label, view }) => (
          <button key={view} className="btn btn-secondary" onClick={() => onJump(view, property.id)}>
            {label} →
          </button>
        ))}
      </div>

      {/* ══ Summary & Insights ══════════════════════════════════════════════ */}
      <div style={{ marginBottom: '1.25rem' }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.65rem', marginBottom: '0.85rem' }}>
          {mc({ label: 'Market Value', primary: fmt(property.market_price),
            secondary: appr !== 0 ? (appr >= 0 ? '+' : '') + fmt(appr) + (apprPct !== null ? ' (' + apprPct.toFixed(1) + '%)' : '') : null,
            secondaryCls: appr >= 0 ? 'text-success' : 'text-danger',
            tertiary: `purchased ${fmt(property.purchase_price)}`,
            tooltip: `Current estimated market value.\nAppreciation: ${fmt(appr)} (${apprPct !== null ? apprPct.toFixed(1) + '%' : 'n/a'} over purchase price of ${fmt(property.purchase_price)}).` })}
          {mc({ label: 'Equity', primary: fmt(equity),
            primaryCls: equity >= 0 ? 'text-success' : 'text-danger',
            secondary: equityPct !== null ? fp(equityPct) + ' of value' : null,
            secondaryCls: equityPct !== null && equityPct >= 50 ? 'text-success' : '',
            tertiary: loanToValue > 0 ? `LTV ${fPct(loanToValue)}` : null,
            tertiaryCls: ltvColor(loanToValue).cls,
            tooltip: 'Market Value − Loan Amount.\nLTV shown — below 65%: conservative. 65–80%: normal. Above 80%: high risk.' })}
          {mc({ label: 'Avail. Equity', primary: availableEquity > 0 ? fmt(availableEquity) : '—',
            primaryCls: availableEquity > 0 ? 'text-success' : 'text-secondary',
            tertiary: availableEquity > 0 ? 'Above 20% LTV threshold' : 'LTV too high',
            tooltip: 'Equity accessible via refinancing while staying at ≤80% LTV.\nFormula: (0.80 × Market Value) − Loan Amount.' })}
          {mc({ label: 'Net Position', primary: fmt(sellingProfit),
            primaryCls: sellingProfit >= 0 ? 'text-success' : 'text-danger',
            secondary: npPct !== null ? npPct.toFixed(1) + '% of net spending' : null,
            secondaryCls: npPct !== null ? (npPct >= 0 ? 'text-success' : 'text-danger') : '',
            tooltip: `What you would net if you sold this property today and cleared the mortgage.\nFormula: Market Value + All Income − All Expenses − Loan Balance.` })}
          {mc({ label: 'Monthly Rent', primary: monthlyRent ? fmt(monthlyRent) : '—',
            tooltip: 'Configured monthly rent. Used for Cap Rate and OER calculations.' })}
          {mc({ label: `Avg CF (${wLabel(avgWindow)})`, primary: fmt(avg.cashflow),
            primaryCls: avg.cashflow >= 0 ? 'text-success' : 'text-danger',
            tooltip: `Average monthly (Income − Expenses) over the last ${wLabel(avgWindow)} of complete months.` })}
          {mc({ label: `OER (${wLabel(avgWindow)})`, primary: avg.income > 0 ? fPct(avg.noiExpenses / avg.income) : '—',
            primaryCls: avg.income > 0 ? (avg.noiExpenses / avg.income < 0.35 ? 'text-success' : avg.noiExpenses / avg.income < 0.5 ? '' : 'text-danger') : '',
            tooltip: 'Operating Expense Ratio = op-ex ÷ income. Below 35%: efficient. 35–50%: normal. Above 50%: high.' })}
          {mc({ label: 'YTD Op. Profit', primary: fmt(ytdNetBalance),
            primaryCls: ytdNetBalance >= 0 ? 'text-success' : 'text-danger',
            tertiary: 'Trailing 12 months',
            tooltip: 'Income minus operating expenses (principal excluded) over the trailing 12 months.' })}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: '0.75rem',
            padding: '0.6rem 0.9rem', borderRadius: '8px',
            border: '1px solid var(--border)', background: 'var(--bg-tertiary)',
          }}>
            <span style={{ fontSize: '1.5rem', fontWeight: 800, lineHeight: 1 }} className={investmentScore.cls}>
              {investmentScore.score}
              <span style={{ fontSize: '0.75rem', fontWeight: 500, color: 'var(--text-tertiary)' }}>/100</span>
            </span>
            <div>
              <StarRating starsData={investmentScore.starsData} />
              <span style={{ fontWeight: 600, fontSize: '0.82rem' }} className={investmentScore.cls}>
                {investmentScore.label}
              </span>
            </div>
          </div>

          <div style={{
            display: 'flex', alignItems: 'flex-start', gap: '0.65rem',
            padding: '0.75rem 0.9rem', borderRadius: '8px',
            border: '1px solid var(--border)', background: 'var(--bg-secondary)',
          }}>
            <span style={{ fontSize: '1.2rem', lineHeight: 1, flexShrink: 0 }}>{primary.icon}</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: '0.9rem' }} className={primary.cls}>{primary.label}</div>
              <div style={{ fontSize: '0.79rem', color: 'var(--text-secondary)', marginTop: '0.2rem', lineHeight: 1.5 }}>
                {primary.detail}
              </div>
            </div>
          </div>

          {secondary.map((s, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'flex-start', gap: '0.55rem',
              padding: '0.5rem 0.8rem', borderRadius: '7px',
              border: '1px solid var(--border)', background: 'var(--bg-tertiary)',
            }}>
              <span style={{ fontSize: '1rem', lineHeight: 1, flexShrink: 0 }}>{s.icon}</span>
              <div>
                <span style={{ fontWeight: 600, fontSize: '0.79rem' }} className={s.cls}>{s.label} </span>
                <span style={{ fontSize: '0.77rem', color: 'var(--text-secondary)', lineHeight: 1.4 }}>{s.detail}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ══ Financing Efficiency ══════════════════════════════════════════════ */}
      <p className="stat-section-label">Financing Efficiency</p>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem' }}>
        {mc({ label: 'Loan Amount', primary: fmt(property.loan_amount), primaryCls: 'text-danger',
          secondary: loanPct !== null ? fp(loanPct) + ' of value' : null,
          tooltip: 'Outstanding mortgage or loan balance. Update this when you pay it down to keep LTV accurate.' })}
        {property.mortgage_rate > 0 && mc({ label: 'Mortgage Rate', primary: `${property.mortgage_rate}%`,
          tertiary: annualInterest ? `~${fmt(annualInterest)}/yr in interest` : null,
          tooltip: 'Annual mortgage interest rate. Used to compute interest cost and interest coverage ratio.' })}
        {mc({ label: 'Loan-to-Value', primary: fPct(ltvRatio),
          primaryCls: ltvColor(ltvRatio).cls,
          tertiary: ltvRatio > 0.80 ? 'High leverage' : ltvRatio < 0.55 ? 'Low leverage' : 'Moderate leverage',
          tooltip: 'Loan \u00f7 Market Value. Below 65%: conservative. 65\u201380%: normal. Above 80%: high risk.' })}
        {mc({
          label: `DSCR (${wLabel(avgWindow)})`,
          primary: avg.mortgage > 0 ? (avg.noi / avg.mortgage).toFixed(2) + 'x' : '\u2014',
          primaryCls: avg.mortgage > 0
            ? (avg.noi / avg.mortgage >= 1.25 ? 'text-success' : avg.noi / avg.mortgage >= 1.0 ? 'text-warning' : 'text-danger')
            : 'text-secondary',
          ...(avg.mortgage > 0 ? expProps(avg.noi / avg.mortgage, expected?.dscr,
            v => v >= 1.25 ? 'text-success' : v >= 1.0 ? 'text-warning' : 'text-danger',
            v => v.toFixed(2) + 'x', 'Exp:', true, 0.05) : {}),
          tertiary: avg.mortgage <= 0
            ? (expected?.dscr != null ? `Exp: ${expected.dscr.toFixed(2)}x \u2014 no mortgage recorded` : 'No mortgage expenses recorded')
            : undefined,
          tooltip: 'Debt Service Coverage = monthly NOI \u00f7 mortgage payment.\n\u2265 1.25x: comfortable. 1.0\u20131.25x: marginal. < 1.0x: income doesn\u2019t cover the mortgage.' })}
        {icr !== null && mc({ label: 'Interest Coverage', primary: icr.toFixed(2) + 'x',
          primaryCls: icr >= 2 ? 'text-success' : icr >= 1.25 ? '' : 'text-danger',
          ...expProps(icr, expICR,
            v => v >= 2 ? 'text-success' : v >= 1.25 ? '' : 'text-danger',
            v => v.toFixed(2) + 'x', 'Exp:', true, 0.05),
          tertiary: icr >= 2 ? 'Strong' : icr >= 1.25 ? 'Adequate' : 'Weak',
          tooltip: 'Annual NOI \u00f7 Annual Interest Expense (loan \u00d7 rate).\n\u2265 2.0x: strong. 1.25\u20132.0x: adequate. < 1.25x: tight.\nExp uses budgeted operating costs.' })}
      </div>

      {/* ══ Investment Ratios ════════════════════════════════════════════════ */}
      <p className="stat-section-label">Investment Ratios</p>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem' }}>
        {mc({
          label: 'Cap Rate', primary: fPct(capRate),
          primaryCls: capRate > 0.07 ? 'text-success' : capRate > 0.04 ? '' : 'text-danger',
          ...expProps(capRate, expected?.capRate,
            v => v > 0.07 ? 'text-success' : v > 0.04 ? '' : 'text-danger', fPct),
          tertiary: capRate > 0.07 ? 'Strong yield' : capRate > 0.04 ? 'Moderate yield' : 'Weak yield',
          tooltip: 'Annual NOI \u00f7 Purchase Price. Financing-agnostic measure of a property\u2019s income yield.\nResidential target: 4\u20136%. Commercial: 6\u20138%+.' })}
        {mc({
          label: 'Cash-on-Cash', primary: fPct(cashOnCash),
          primaryCls: cashOnCash > 0.08 ? 'text-success' : cashOnCash > 0.04 ? '' : cashOnCash < 0 ? 'text-danger' : 'text-warning',
          ...expProps(cashOnCash, expected?.cashOnCash,
            v => v > 0.08 ? 'text-success' : v > 0.04 ? '' : v < 0 ? 'text-danger' : 'text-warning', fPct),
          tooltip: 'Annual Cash Flow \u00f7 Equity. Measures how hard your invested equity is working.\nTarget: 6\u201310%+.' })}
        {monthlyRent > 0 && mc({
          label: 'Expense Ratio', primary: fPct(expenseRatio),
          primaryCls: expenseRatio < 0.35 ? 'text-success' : expenseRatio < 0.50 ? '' : 'text-danger',
          ...expProps(expenseRatio, expected?.expenseRatio,
            v => v < 0.35 ? 'text-success' : v < 0.50 ? '' : 'text-danger', fPct, 'Exp:', false),
          tooltip: 'Avg Monthly Expenses \u00f7 Monthly Rent. All costs including mortgage.\nBelow 35%: efficient. 35\u201350%: normal. Above 50%: review costs.' })}
        {monthlyRent > 0 && mc({ label: 'Rent-to-Value', primary: fPct(rentToValue),
          primaryCls: rentToValue > 0.01 ? 'text-success' : rentToValue > 0.007 ? '' : 'text-danger',
          tertiary: rentToValue > 0.01 ? 'Passes 1% rule' : rentToValue > 0.007 ? 'Near 1% rule' : 'Below 1% rule',
          tooltip: 'Monthly Rent \u00f7 Purchase Price. The 1% rule: monthly rent \u2265 1% of purchase price signals healthy cash flow potential.' })}
      </div>

      {/* ══ Operating Metrics & Gain ══════════════════════════════════════════ */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '0.6rem', flexWrap: 'wrap' }}>
        <p className="stat-section-label" style={{ margin: 0 }}>Operating Metrics &amp; Gain</p>
        <WindowPicker value={avgWindow} onChange={setAvgWindow} />
      </div>

      {/* Row 1: Cash flow & gain */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '0.75rem' }}>
        {mc({ label: `Avg Income (${wLabel(avgWindow)})`, primary: fmt(avg.income), primaryCls: 'text-success',
          tooltip: `Average monthly income over the last ${avgWindow} complete months.` })}
        {mc({ label: `Avg Cash Flow (${wLabel(avgWindow)})`, primary: fmt(avg.cashflow),
          primaryCls: avg.cashflow >= 0 ? 'text-success' : 'text-danger',
          ...expProps(avg.cashflow, expMonthlyCF,
            v => v >= 0 ? 'text-success' : 'text-danger', v => fmt(v)),
          tooltip: `Average monthly (income \u2212 all expenses incl. mortgage) over the last ${avgWindow} months.\nExp = budgeted NOI minus expected mortgage.` })}
        {mc({ label: 'Monthly Gain', primary: fmt(monthlyGain),
          primaryCls: monthlyGain >= 0 ? 'text-success' : 'text-danger',
          secondary: yearlyAppr !== null && expMonthlyGain == null
            ? `CF ${fmt(avg.cashflow)} + Appr ${fmt(monthlyAppr)}/mo` : null,
          secondaryCls: 'text-secondary',
          ...monthlyGainExpProps,
          tooltip: 'Avg Cash Flow + Monthly Appreciation (yearly \u00f7 12). Combines income and value growth in one number.\nExp uses budgeted operating costs, expected mortgage, and expected appreciation %.' })}
        {mc({ label: 'Payback Period',
          ...paybackPeriod,
          secondary: expPayback, secondaryCls: expPayback ? 'text-success' : '',
          tooltip: `Time until all recorded expenses are fully recovered by cumulative cash flow.\nNumerator = Total Expenses − Total Income (${fmt(property.total_expenses)} − ${fmt(property.total_income)}).\nExp uses budgeted cash flow.` })}
        {mc({ label: 'Break-even',
          ...breakEven,
          secondary: expBreakEven, secondaryCls: expBreakEven ? 'text-success' : '',
          tooltip: 'Time until Net Position reaches zero or better.\nUses monthly gain (cash flow + appreciation) to close the gap.\nExp uses budgeted monthly gain.' })}
      </div>

      {/* Row 2: NOI, expenses, cap rate */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '0.75rem' }}>
        {mc({
          label: `Avg NOI (${wLabel(avgWindow)})`, primary: fmt(avg.noi),
          primaryCls: avg.noi >= 0 ? 'text-success' : 'text-danger',
          ...expProps(avg.noi, expected?.monthlyNOI,
            v => v >= 0 ? 'text-success' : 'text-danger', v => fmt(v)),
          tooltip: 'Net Operating Income = avg monthly income \u2212 op-ex (excl. mortgage & principal).\nExp uses budgeted fixed costs + utilities + tax/12.' })}
        {mc({
          label: `Avg Expenses (${wLabel(avgWindow)})`, primary: fmt(avg.expenses),
          primaryCls: avg.expenses > avg.income * 0.85 ? 'text-danger' : avg.expenses > avg.income * 0.65 ? 'text-warning' : '',
          ...expProps(avg.expenses, expected?.monthlyExpenses,
            v => v < (monthlyRent * 0.65) ? '' : v < (monthlyRent * 0.85) ? 'text-warning' : 'text-danger',
            v => fmt(v), 'Exp:', false),
          tooltip: 'Avg total monthly expenses (all categories including mortgage).\nExp = budgeted op-ex + actual avg mortgage payment.' })}
        {mc({
          label: 'Cap Rate', primary: fPct(capRate),
          primaryCls: capRate > 0.07 ? 'text-success' : capRate > 0.04 ? '' : 'text-danger',
          ...expProps(capRate, expected?.capRate,
            v => v > 0.07 ? 'text-success' : v > 0.04 ? '' : 'text-danger', fPct),
          tertiary: capRate > 0.07 ? 'Strong yield' : capRate > 0.04 ? 'Moderate yield' : 'Weak yield',
          tooltip: 'Annual NOI \u00f7 Purchase Price. Same as in Investment Ratios — shown here in context with actual operating averages.' })}
      </div>

      {/* Row 3: OER, IRR, vacancy, maint */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem' }}>
        {mc({
          label: 'OER',
          primary: avg.income > 0 ? fPct(oer) : '\u2014',
          primaryCls: avg.income > 0 ? (oer < 0.35 ? 'text-success' : oer < 0.50 ? '' : 'text-danger') : 'text-secondary',
          ...(avg.income > 0 ? expProps(oer, expected?.oer,
            v => v < 0.35 ? 'text-success' : v < 0.50 ? '' : 'text-danger', fPct, 'Exp:', false) : {}),
          tertiary: avg.income <= 0 ? 'No income in selected window' : (oer < 0.35 ? 'Efficient' : oer < 0.50 ? 'Normal' : 'High'),
          tooltip: 'Operating Expense Ratio = op-ex \u00f7 gross income. Excludes mortgage and principal.' })}
        {mc({
          label: 'IRR',
          primary: irr !== null ? fPct(irr) : '\u2014',
          primaryCls: irr !== null
            ? (irr > 0.15 ? 'text-success' : irr > 0.08 ? '' : irr < 0 ? 'text-danger' : 'text-warning')
            : 'text-secondary',
          tertiary: irr !== null
            ? (irr > 0.15 ? 'Excellent' : irr > 0.08 ? 'Good' : irr < 0 ? 'Loss' : 'Below target')
            : (!property.poss_date ? 'No possession date set' : 'Need \u2265 2 months of records'),
          tooltip: 'Internal Rate of Return \u2014 the annualised rate that makes NPV of all cash flows zero.\nTarget: 10\u201315%+ for real estate.' })}
        {mc({
          label: 'Economic Vacancy',
          primary: econVacancy !== null ? `${Math.min(econVacancy, 100).toFixed(1)}%` : '\u2014',
          primaryCls: econVacancy !== null ? (econVacancy > 10 ? 'text-danger' : econVacancy > 4 ? 'text-warning' : 'text-success') : 'text-secondary',
          tertiary: econVacancy !== null ? (econVacancy > 10 ? 'High loss' : econVacancy > 4 ? 'Moderate' : 'Low') : 'No status events recorded',
          tooltip: 'Lost rent due to vacancy \u00f7 Potential rent (trailing 12 months).\n\nMeasured from Vacant\u2192Rented status changes in the Events log.\nRent value at the time of each vacancy is used for lost-rent calculation.\nTarget: < 5%.' })}
        {mc({
          label: 'Maint+CapEx Ratio',
          primary: maintCapexRatio !== null ? fPct(maintCapexRatio) : '\u2014',
          primaryCls: maintCapexRatio !== null ? (maintCapexRatio < 0.05 ? 'text-success' : maintCapexRatio < 0.12 ? '' : 'text-danger') : 'text-secondary',
          tertiary: maintCapexRatio !== null ? (maintCapexRatio < 0.05 ? 'Low' : maintCapexRatio < 0.12 ? 'Normal' : 'High') : 'Set monthly rent to compute',
          tooltip: 'YTD Maintenance + Capital Expenditure \u00f7 Annual gross rental income.\nNorm: 5\u201310% of gross rent.' })}
      </div>

      {/* ══ Income & Expenses (all-time) ══════════════════════════════════════ */}
      <p className="stat-section-label">Income &amp; Expenses (all-time)</p>
      <FinancialPeriodSection
        income={property.total_income} expenses={property.total_expenses}
        netExpenses={totalNetExp} balance={balance}
        operatingProfit={totalNetBalance} roi={roi}
        principal={allTimePrin} scope="property" />

      {/* ══ YTD ═══════════════════════════════════════════════════════════════ */}
      <p className="stat-section-label">YTD — trailing 12 months</p>
      <FinancialPeriodSection prefix="YTD "
        income={ytdInc} expenses={ytdExp} netExpenses={ytdNetExp}
        balance={ytdBal} operatingProfit={ytdNetBalance}
        principal={ytdPrin} scope="property" />

      {/* ══ Appreciation ══════════════════════════════════════════════════════ */}
      <p className="stat-section-label">Appreciation</p>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem' }}>
        {mc({ label: 'Total Appreciation', primary: fmt(appr),
          primaryCls: appr >= 0 ? 'text-success' : 'text-danger',
          secondary: apprPct !== null && property.purchase_price > 0 ? apprPct.toFixed(1) + '% from ' + fmt(property.purchase_price) : null,
          secondaryCls: appr >= 0 ? 'text-success' : 'text-danger',
          tooltip: 'Market Value \u2212 Purchase Price. Total unrealised gain since acquisition.' })}
        {mc({
          label: 'Yearly Appreciation',
          primary: yearlyAppr !== null ? fmt(yearlyAppr) : '\u2014',
          primaryCls: yearlyAppr !== null ? (yearlyAppr >= 0 ? 'text-success' : 'text-danger') : 'text-secondary',
          secondary: yearlyApprPct !== null ? fp(yearlyApprPct) + ' per year' : null,
          secondaryCls: yearlyAppr !== null && yearlyAppr >= 0 ? 'text-success' : 'text-danger',
          ...yearlyApprExpProps,
          tooltip: 'Appreciation \u00f7 years held since possession date.\nExp uses your expected appreciation % of purchase price.' })}
        {mc({ label: 'Projected Year-End', primary: fmt(projectedYE),
          tertiary: yearlyAppr !== null ? 'At current appreciation rate' : 'No possession date',
          tooltip: 'Current value + remaining year fraction \u00d7 annual appreciation rate.' })}
        {mc({
          label: 'Year-End Balance',
          primary: fmt(yearEndRate),
          primaryCls: yearEndRate >= 0 ? 'text-success' : 'text-danger',
          ...yearEndExpProps,
          tooltip: `Projected Net Position at December 31st.\n\nRun-rate: current Net Position + avg CF \u00d7 ${ml} months + avg monthly appreciation \u00d7 ${ml} months.\nBudget: same using your budgeted cash flow and expected appreciation %.` })}
      </div>

      {/* Chart */}
      <div className="chart-container">
        <div className="chart-header"><h2 className="chart-title">Financial Overview</h2></div>
        <ResponsiveContainer width="100%" height={250}>
          <BarChart data={chartData}>
            <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
            <XAxis dataKey="name" stroke="#9ca3af" />
            <YAxis stroke="#9ca3af" />
            <Tooltip contentStyle={DETAIL_TOOLTIP_STYLE} />
            <Bar dataKey="value" fill="#3b82f6" />
          </BarChart>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
        {/* Current Tenants */}
        <div className="detail-panel">
          <div className="detail-panel-title">
            <span>👤 Current Tenants</span>
            <button className="btn btn-secondary" onClick={onAddTenant}>+ Add</button>

const TAX_OPTIONS = ['Deductible', 'Non-deductible'];
const isTaxDeductible = e => !(e.tax_deductible === 0 || e.tax_deductible === false);

function ExpensesView({ properties, onAddExpense, onEditExpense, initialPropertyId }) {
  const tx = useTransactionView({
    viewName: 'expenses', endpoint: 'expenses',
    dateField: 'expense_date', defaultSortBy: 'expense_date',
    properties, initialPropertyId,
    seedTypeOptions:     INITIAL_OPTIONS.expenseTypes,      typeField: 'expense_type',
    seedCategoryOptions: INITIAL_OPTIONS.expenseCategories, categoryField: 'expense_category',
  });

  // Tax filter is expenses-only, managed locally
  const [taxFilter, setTaxFilter] = useState(TAX_OPTIONS);

  const { colVis, allColKeys, allColLabels, propName } = tx;
  const { visible, update: setVisible, col, isCustom, reset } = colVis;

  // Apply tax filter on top of the hook's filtered list
  const filtered = tx.filtered.filter(e => {
    const label = isTaxDeductible(e) ? 'Deductible' : 'Non-deductible';
    return taxFilter.includes(label);
  });

  const filteredTotal = filtered.reduce((s, e) => s + e.amount, 0);
  const isFiltered    = filteredTotal !== tx.baseTotal;
  const pct           = tx.baseTotal > 0 ? ((filteredTotal / tx.baseTotal) * 100).toFixed(1) : '100';
  const amountSub     = isFiltered ? `$${tx.baseTotal.toLocaleString()} unfiltered · ${pct}% shown` : null;
  const txSub         = isFiltered ? `${tx.baseRecords.length} unfiltered` : null;

  return (
    <>
      <div className="page-header">
        <div>
          <h1 className="page-title">Expenses</h1>
          <p className="page-subtitle">Track and manage property expenses</p>
        </div>
        <div className="page-actions">
          <button className="btn btn-primary" onClick={onAddExpense}>+ Add Expense</button>
        </div>
      </div>

      <div className="stats-grid" style={{ gridTemplateColumns: 'repeat(auto-fit,minmax(200px,1fr))' }}>
        <StatCard
          label={propName ? `Total Expenses — ${propName}` : 'Total Expenses'}
          value={`$${filteredTotal.toLocaleString()}`}
          cls="text-danger"
          sub={amountSub}
        />
        <StatCard
          label={propName ? `Transactions — ${propName}` : 'Transactions'}
          value={filtered.length}
          sub={txSub}
        />
      </div>

      <div className="table-container">
        <div className="table-header">
          <div className="table-title">All Expenses</div>
          <div className="table-controls">
            <div className="filter-group">
              <span className="filter-label">Filter:</span>
              <select value={tx.filterProperty} onChange={e => tx.setFilterProperty(e.target.value)}>
                <PropertyOptions properties={properties} placeholder="All Properties" />
              </select>
              <MultiSelect label="Category" options={tx.allCategories} selected={tx.filterCategories} onChange={tx.setFilterCategories} />
              <MultiSelect label="Type"     options={tx.allTypes}      selected={tx.filterTypes}      onChange={tx.setFilterTypes} />
              <MultiSelect label="Tax" options={TAX_OPTIONS} selected={taxFilter} onChange={setTaxFilter} />
              <DateRangeFilter
                value={tx.dateFilter}      onChange={tx.setDateFilter}
                customStart={tx.customDateStart} onCustomStart={tx.setCustomDateStart}
                customEnd={tx.customDateEnd}     onCustomEnd={tx.setCustomDateEnd}
              />
              <MultiSelect label="Columns" options={allColKeys} selected={visible} onChange={setVisible} labelMap={allColLabels} />
              {isCustom && <ResetColumnsButton onClick={reset} />}
            </div>
            <div className="sort-group">
              <span className="sort-label">Sort:</span>
              <select value={tx.sortBy} onChange={e => tx.setSortBy(e.target.value)}>
                <option value="expense_date">Date</option>
                <option value="amount">Amount</option>
              </select>
              <button className="btn btn-secondary btn-small"
                onClick={() => tx.setSortOrder(o => o === 'asc' ? 'desc' : 'asc')}>
                {tx.sortOrder === 'asc' ? '↑' : '↓'}
              </button>
            </div>
          </div>
        </div>

        {tx.loading ? <div className="loading"><div className="spinner" /></div>
        : filtered.length === 0 ? (
          <div className="empty-state"><div className="empty-state-icon">💳</div>
            <div className="empty-state-text">No expenses found</div></div>
        ) : (
          <div className="table-scroll-wrap">
            <table>
              <thead><tr>
                {col('date')           && <th className="col-shrink">Date</th>}
                {col('property')       && <th className="col-fill">Property</th>}
                {col('amount')         && <th className="col-shrink">Amount</th>}
                {col('category')       && <th className="col-shrink">Category</th>}
                {col('type')           && <th className="col-shrink">Type</th>}
                {col('tax_deductible') && <th className="col-shrink" title="Tax Deductible">Tax Ded.</th>}
                {col('notes')          && <th className="col-fill">Notes</th>}
                <th style={{ width: 52 }}></th>
              </tr></thead>
              <tbody>
                {filtered.map(e => (
                  <tr key={e.id}>
                    {col('date')           && <td className="col-shrink">{fmtDate(e.expense_date)}</td>}
                    {col('property')       && <td className="col-fill"><TruncatedCell text={e.property_name} /></td>}
                    {col('amount')         && <td className="col-shrink text-danger">${e.amount.toLocaleString()}</td>}
                    {col('category')       && <td className="col-shrink">{e.expense_category}</td>}
                    {col('type')           && <td className="col-shrink">{e.expense_type}</td>}
                    {col('tax_deductible') && (
                      <td className="col-shrink" style={{ textAlign: 'center' }}>
                        {isTaxDeductible(e)
                          ? <span title="Tax deductible"     style={{ color: 'var(--color-success, #22c55e)' }}>✓</span>
                          : <span title="Not tax deductible" style={{ color: 'var(--text-tertiary)' }}>✗</span>}
                      </td>
                    )}
                    {col('notes')          && <td className="col-fill"><TruncatedCell text={e.notes} /></td>}
                    <td>
                      <div className="row-actions">
                        <button className="btn btn-secondary btn-icon" title="Edit"   onClick={() => onEditExpense(e)}>✏️</button>
                        <button className="btn btn-danger    btn-icon" title="Delete" onClick={() => tx.handleDelete(e.id)}>🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </>
  );
}

// ── Analysis tips (forward-looking, no historical records) ────────────────────

function buildAnalysis({ avgCashFlow, monthlyGain, yearlyAppr, yearlyApprRatio,
  marketValue, monthlyRent, capRate, cashOnCash,
  expenseRatio, ltvRatio, equity, monthlyMortgage, vacancyRate,
  oneOffExpense, repairReserve }) {

  const items = [];

  // ── Primary ───────────────────────────────────────────────────────────────

  if (!monthlyRent) {
    items.push({ isPrimary: true, icon: '📋', cls: 'text-secondary', label: 'Enter rent to see analysis',
      detail: 'Fill in expected monthly rent to compute cash flow and all derived metrics.' });
  } else if (avgCashFlow < 0 && yearlyApprRatio < 0.02) {
    items.push({ isPrimary: true, icon: '🚨', cls: 'text-danger', label: 'Negative cash flow, weak appreciation',
      detail: `This property would cost ${fmt(Math.abs(avgCashFlow))}/mo to hold, with only ${fp(yearlyApprRatio * 100)}% annual appreciation. Both income and growth are insufficient.` });
  } else if (avgCashFlow < 0) {
    items.push({ isPrimary: true, icon: '⚖️', cls: monthlyGain >= 0 ? 'text-warning' : 'text-danger',
      label: monthlyGain >= 0 ? 'Appreciation-led — negative cash flow' : 'Cash flow insufficient, appreciation too weak',
      detail: monthlyGain >= 0
        ? `Property costs ${fmt(Math.abs(avgCashFlow))}/mo but appreciation adds ${fmt(yearlyAppr / 12)}/mo. Monthly gain: ${fmt(monthlyGain)}/mo. Requires strong cash reserves.`
        : `Cash drain (${fmt(Math.abs(avgCashFlow))}/mo) exceeds appreciation gains (${fmt(yearlyAppr / 12)}/mo). Net monthly loss: ${fmt(monthlyGain)}/mo.` });
  } else if (avgCashFlow === 0) {
    items.push({ isPrimary: true, icon: '➖', cls: 'text-warning', label: 'Breakeven cash flow',
      detail: `Rent exactly covers expenses. Monthly gain comes entirely from appreciation: ${fmt(yearlyAppr / 12)}/mo.` });
  } else if (capRate > 0.07 && cashOnCash > 0.08) {
    items.push({ isPrimary: true, icon: '🚀', cls: 'text-success', label: 'Strong investment opportunity',
      detail: `Cap rate ${fp(capRate * 100)} and cash-on-cash ${fp(cashOnCash * 100)} both exceed typical thresholds. This property looks like a strong performer.` });
  } else if (cashOnCash > 0.08) {
    items.push({ isPrimary: true, icon: '✅', cls: 'text-success', label: 'Good capital efficiency',
      detail: `Cash-on-cash return of ${fp(cashOnCash * 100)} means your down payment works hard. Cap rate ${fp(capRate * 100)} is in acceptable range.` });
  } else if (capRate > 0.06) {
    items.push({ isPrimary: true, icon: '📈', cls: 'text-success', label: 'Decent yield',
      detail: `Cap rate of ${fp(capRate * 100)} indicates reasonable asset yield. Cash-on-cash ${fp(cashOnCash * 100)} — consider increasing down payment to improve capital returns.` });
  } else {
    items.push({ isPrimary: true, icon: '📊', cls: 'text-warning', label: 'Moderate investment',
      detail: `Cap rate ${fp(capRate * 100)} and cash-on-cash ${fp(cashOnCash * 100)} are below strong-investment thresholds. Review rent pricing or expenses.` });
  }

  // ── Secondary advisories ──────────────────────────────────────────────────

  if (ltvRatio > 0.80) {
    items.push({ icon: '⚡', cls: 'text-danger', label: 'High leverage',
      detail: `LTV of ${fp(ltvRatio * 100)} leaves little equity buffer. A 10% market drop would nearly wipe out your ${fmt(equity)} equity position.` });
  }
  if (monthlyRent > 0 && expenseRatio > 0.50) {
    items.push({ icon: '💸', cls: 'text-danger', label: 'High expense ratio',
      detail: `${fp(expenseRatio * 100)} of rent is consumed by expenses. Consider negotiating purchase price, refinancing, or increasing rent to improve margins.` });
  }
  if (vacancyRate >= 8) {
    items.push({ icon: '🏠', cls: 'text-warning', label: 'Significant vacancy modelled',
      detail: `${vacancyRate}% vacancy reduces effective annual rent by ${fmt(monthlyRent * vacancyRate / 100 * 12)}. Ensure the local market supports stable tenancy at this rent level.` });
  }
  if (oneOffExpense > monthlyRent * 3) {
    items.push({ icon: '🔧', cls: 'text-warning', label: 'Large one-off expense',
      detail: `${fmt(oneOffExpense)} in upfront costs takes ${Math.ceil(oneOffExpense / Math.max(1, avgCashFlow))} months of cash flow to recover.` });
  }
  if (monthlyRent > 0 && capRate < 0.05) {
    const targetRent = Math.round(marketValue * 0.06 / 12);
    const delta = targetRent - monthlyRent;
    if (delta > 0) {
      items.push({ icon: '📈', cls: 'text-warning', label: 'Low cap rate',
        detail: `At ${fp(capRate * 100)}, yield is below the 5% threshold. Increasing rent to ~${fmt(targetRent)}/mo (+${fmt(delta)}) would push cap rate to ~6%.` });
    }
  }
  if (ltvRatio > 0 && ltvRatio < 0.55 && equity > 50000) {
    items.push({ icon: '🏦', cls: 'text-success', label: 'Low leverage — cash-out potential',
      detail: `LTV of ${fp(ltvRatio * 100)} with ${fmt(equity)} in equity. A cash-out refinance at purchase could fund additional investments while still keeping LTV conservative.` });
  }
  if (yearlyApprRatio > 0.07) {
    items.push({ icon: '💎', cls: 'text-success', label: 'Strong appreciation projected',
      detail: `At ${fp(yearlyApprRatio * 100)}/yr appreciation, the property gains ${fmt(yearlyAppr)}/yr in value. Even modest cash flow becomes highly profitable long-term.` });
  }
  if (repairReserve < 0.5 && marketValue > 200000) {
    items.push({ icon: '🔩', cls: 'text-warning', label: 'Low repair reserve',
      detail: `A reserve below 0.5% of value may be insufficient. Industry standard is 1–1.5% (${fmt(marketValue * 0.01)}/yr) for repairs and maintenance.` });
  }

  return items;
}
