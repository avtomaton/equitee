function EvaluatorView() {
  const [inputs, setInputs] = useState({
    propertyType:       'Residential',
    purchasePrice:      500000,
    downPayment:        100000,
    mortgageRate:       5.0,
    amortization:       25,
    monthlyRent:        2500,
    monthlyOpEx:        300,
    yearlyTax:          4000,
    annualAppreciation: 3.0,
  });

  const [scenario, setScenario] = useState({
    rentDelta:        0,
    downPaymentDelta: 0,
    rateDelta:        0,
    vacancyRate:      0,
    oneOffExpense:    0,
    repairReserve:    1.0,
  });

  const set  = (key, val) => setInputs(s  => ({ ...s, [key]: val }));
  const setS = (key, val) => setScenario(s => ({ ...s, [key]: val }));

  const m = useMemo(() => {
    const p = inputs;
    const s = scenario;

    const effectiveRent        = p.monthlyRent * (1 + s.rentDelta / 100);
    const effectiveDownPayment = clamp(p.downPayment * (1 + s.downPaymentDelta / 100), 0, p.purchasePrice * 0.99);
    const effectiveRate        = Math.max(0.1, p.mortgageRate + s.rateDelta);
    const loanAmount           = p.purchasePrice - effectiveDownPayment;

    const monthlyMortgage      = calcMortgagePayment(loanAmount, effectiveRate, p.amortization);
    const monthlyTax           = p.yearlyTax / 12;
    const monthlyRepairReserve = (p.purchasePrice * s.repairReserve / 100) / 12;
    const totalMonthlyExpenses = p.monthlyOpEx + monthlyTax + monthlyMortgage + monthlyRepairReserve;

    const occupancyRate        = 1 - s.vacancyRate / 100;
    const effectiveMonthlyRent = effectiveRent * occupancyRate;
    const avgCashFlow          = effectiveMonthlyRent - totalMonthlyExpenses;

    const annualGrossRent   = effectiveRent * 12;
    const annualNetOpIncome = annualGrossRent - (p.monthlyOpEx + monthlyTax) * 12;
    const capRate           = p.purchasePrice > 0 ? annualNetOpIncome / p.purchasePrice : 0;

    const cashInvested = effectiveDownPayment + s.oneOffExpense;
    const cashOnCash   = cashInvested > 0 ? (avgCashFlow * 12) / cashInvested : 0;

    const ltvRatio      = p.purchasePrice > 0 ? loanAmount / p.purchasePrice : 0;
    const equity        = effectiveDownPayment;
    const expenseRatio  = effectiveMonthlyRent > 0 ? totalMonthlyExpenses / effectiveMonthlyRent : 0;
    const rentToValue   = p.purchasePrice > 0 ? annualGrossRent / p.purchasePrice : 0;

    const yearlyAppr      = p.purchasePrice * p.annualAppreciation / 100;
    const yearlyApprRatio = p.annualAppreciation / 100;
    const monthlyAppr     = yearlyAppr / 12;
    const monthlyGain     = avgCashFlow + monthlyAppr;

    // Payback: cash invested ÷ avg cash flow (forward-looking: no historical expenses)
    // Break-even: cash invested ÷ monthly gain (includes appreciation)
    const payback   = calcPayback(cashInvested, avgCashFlow);
    const breakEven = calcBreakEven(-cashInvested, monthlyGain);

    // 10-year projection
    const projections = [];
    let balance = loanAmount;
    const monthlyRate = effectiveRate / 100 / 12;
    for (let year = 1; year <= 10; year++) {
      for (let mo = 0; mo < 12; mo++) {
        const interest  = balance * monthlyRate;
        const principal = Math.max(0, monthlyMortgage - interest);
        balance         = Math.max(0, balance - principal);
      }
      const propertyValue = p.purchasePrice * Math.pow(1 + yearlyApprRatio, year);
      const yearEquity    = propertyValue - balance;
      const cumulativeCF  = avgCashFlow * 12 * year - s.oneOffExpense;
      const totalGain     = yearEquity - effectiveDownPayment + cumulativeCF;
      projections.push({ year, propertyValue, balance, yearEquity, cumulativeCF, totalGain });
    }

    const score = calcInvestmentScore({ avgCashFlow, capRate, cashOnCash, expenseRatio, ltvRatio, yearlyApprRatio });

    const grm = annualGrossRent > 0 ? p.purchasePrice / annualGrossRent : null;

    const irr10 = (() => {
      if (!avgCashFlow || projections.length < 1) return null;
      const monthlyCFs = new Array(120).fill(avgCashFlow);
      monthlyCFs[119] += projections[projections.length - 1]?.yearEquity ?? 0;
      return calcIRR([-cashInvested, ...monthlyCFs]);
    })();

    const analysis = buildAnalysis({
      avgCashFlow, monthlyGain, yearlyAppr, yearlyApprRatio,
      marketValue: p.purchasePrice, monthlyRent: effectiveRent,
      capRate, cashOnCash, expenseRatio, ltvRatio, equity,
      monthlyMortgage, vacancyRate: s.vacancyRate,
      oneOffExpense: s.oneOffExpense, repairReserve: s.repairReserve,
    });

    return {
      effectiveRent, effectiveDownPayment, effectiveRate, loanAmount,
      monthlyMortgage, monthlyTax, monthlyRepairReserve, totalMonthlyExpenses,

    };
  }, [inputs, scenario]);

  const [primary, ...secondary] = m.analysis;

    || scenario.oneOffExpense !== 0 || scenario.repairReserve !== 1.0;

// ── Result card row ───────────────────────────────────────────────────────────

function ResultRow({ label, value, cls = '', secondary, tooltip }) {

// ── Main computation ──────────────────────────────────────────────────────────

function calcReno({
  currentPrice, plannedPrice, yearlyApprPct,
  monthlyExpenses, currentRent, newRent,
  renoCost, renoMonths,
}) {
  const rentLift      = newRent - currentRent;          // extra rent per month post-reno
  const missedRent    = renoMonths * currentRent;       // rent foregone during works
  const totalCost     = renoCost + missedRent;          // everything the renovation costs you

  // Immediate equity gain from uplift in market price
  const priceUplift   = Math.max(0, plannedPrice - currentPrice);

  // --- Pure payback (ignores market price change entirely) ---
  // How many months of extra rent to recover totalCost?
  const purePB = rentLift > 0
    ? renoMonths + totalCost / rentLift        // renoMonths until reno done, then recovery
    : null;

  // --- Appreciation-adjusted payback ---
  // The price uplift is an immediate paper gain at completion; subtract it from
  // what cash flow still needs to recover.
  const remainingAfterUplift = totalCost - priceUplift;
  let apprPB;
  if (priceUplift >= totalCost) {
    // Uplift covers everything — payback happens the moment reno finishes
    apprPB = renoMonths;
  } else if (rentLift > 0) {
    apprPB = renoMonths + remainingAfterUplift / rentLift;
  } else {
    apprPB = null;   // no rent lift and uplift insufficient
  }

  // --- Monthly numbers post-renovation ---
  const monthlyNOI       = newRent - monthlyExpenses;
  const yearlyAppr       = plannedPrice * yearlyApprPct / 100;
  const monthlyAppr      = yearlyAppr / 12;
  const monthlyGain      = monthlyNOI + monthlyAppr;     // cash flow + appreciation

  // --- Annualised ROI on renovation spend ---
  // If we recover the cost purely via cash-flow uplift, what annual return is that?
  const annualLift       = rentLift * 12;
  const renoROI          = renoCost > 0 ? annualLift / renoCost * 100 : null;

  // --- Breakeven on new NOI recovering initial renovation outlay ---
  // (uses combined gain for best-case view)
  const gainPayback = monthlyGain > 0 && totalCost > 0
    ? renoMonths + totalCost / monthlyGain
    : null;

  return {
    rentLift, missedRent, totalCost, priceUplift,
    purePB, apprPB, gainPayback,
    monthlyNOI, monthlyAppr, monthlyGain, annualLift, renoROI,
  };
}

// ── PB display helpers ────────────────────────────────────────────────────────

function pbDisplay(months) {
  if (months === null) return { val: '∞', cls: 'text-danger' };
  if (months <= 0)     return { val: 'Instant', cls: 'text-success' };
  const cls = months < 24 ? 'text-success' : months < 60 ? '' : 'text-danger';
  return { val: fmtPeriod(months), cls };
}

                cls={adj.renoMonths > 0 ? 'text-danger' : adj.renoMonths < 0 ? 'text-success' : ''}
                help={`Effective: ${eff.renoMonths.toFixed(1)} months`}
              />
            </div>

          {/* Breakdown table */}
          <div className="detail-panel">
            <div className="detail-panel-title">📋 Detailed Breakdown</div>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
              <tbody>
                {[
                  ['', 'Before', 'After', 'Change'],
                  ['Monthly rent',     fmt(eff.currentRent), fmt(eff.newRent),
                    { v: m.rentLift, colored: true, sign: true }],
                  ['Monthly expenses', fmt(eff.monthlyExpenses), fmt(eff.monthlyExpenses), '—'],
                  ['Monthly NOI',      fmt(eff.currentRent - eff.monthlyExpenses),
                    fmt(m.monthlyNOI),
                    { v: m.rentLift, colored: true, sign: true }],
                  ['Market price',     fmt(eff.currentPrice), fmt(eff.plannedPrice),
                    { v: m.priceUplift, colored: true, sign: true }],
                  ['Yearly appr.',     fmt(eff.currentPrice * eff.yearlyApprPct / 100),
                    fmt(eff.plannedPrice * eff.yearlyApprPct / 100),
                    { v: (eff.plannedPrice - eff.currentPrice) * eff.yearlyApprPct / 100, colored: true, sign: true }],
                ].map((row, ri) => {
                  const isHeader = ri === 0;
                  return (
                    <tr key={ri} style={{ borderBottom: '1px solid var(--border)' }}>
                      {row.map((cell, ci) => {
                        let content = cell;
                        let style = {
                          padding: '0.55rem 0.6rem',
                          fontWeight: isHeader ? 700 : ci === 0 ? 600 : 400,
                          color: isHeader ? 'var(--text-secondary)' : 'var(--text-primary)',
                          fontSize: isHeader ? '0.75rem' : undefined,
                          textTransform: isHeader ? 'uppercase' : undefined,
                          letterSpacing: isHeader ? '0.05em' : undefined,
                          textAlign: ci === 0 ? 'left' : 'right',
                        };
                        if (cell && typeof cell === 'object') {
                          const pos = cell.v >= 0;
                          const col = cell.v === 0 ? 'var(--text-tertiary)'
                            : pos ? '#10b981' : '#ef4444';
                          content = `${cell.sign && pos ? '+' : ''}${fmt(cell.v)}`;
                          if (cell.colored) style = { ...style, color: col, fontWeight: 600 };
                        }
                        return <td key={ci} style={style}>{content}</td>;
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </>
  );
}

/** Today's date as a YYYY-MM-DD string (for form default values). */
const today = () => new Date().toISOString().split('T')[0];

/** Shared style for quick-fill buttons across modals. */
const QUICK_BTN_STYLE = {
  padding: '0.3rem 0.7rem', borderRadius: '6px', fontSize: '0.78rem',
  cursor: 'pointer', fontWeight: 600, border: '1px solid var(--accent-primary)',
  background: 'rgba(59,130,246,0.1)', color: 'var(--accent-primary)',
  transition: 'background 0.15s',
};

/**
 * PropertyOptions — reusable <option> list for property selects.
 * Usage: <select ...><PropertyOptions properties={properties} /></select>
 * Omit `placeholder` to skip the leading blank option (e.g. navigation selectors).
 */
function PropertyOptions({ properties, placeholder }) {
  return (
    <>
      {placeholder != null && <option value="">{placeholder}</option>}
      {properties.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
    </>
  );
}

/**
 * ModalOverlay — backdrop that only closes when the user clicks directly on it.
 *
 * Problem with `onClick={onClose}`: if the user presses the mouse button inside
 * the modal, drags outside, and releases on the backdrop, the browser fires a
 * click event on the overlay (nearest common ancestor of mousedown + mouseup
 * targets), which unintentionally closes the modal.
 *
 * Fix: close only when BOTH mousedown AND mouseup happen on the backdrop itself.
 */
function ModalOverlay({ onClose, children }) {
  const downOnBackdrop = useRef(false);

  return (
    <div
      className="modal-overlay"
      onMouseDown={e => { downOnBackdrop.current = e.target === e.currentTarget; }}
      onMouseUp={e => {
        if (e.target === e.currentTarget && downOnBackdrop.current) onClose();
        downOnBackdrop.current = false;
      }}
    >
      {children}
    </div>
  );
}

/**
 * DateInput — native date input with an explicit calendar-picker button.
 *
 * Supports both keyboard typing (full YYYY-MM-DD entry) and clicking 📅 to
 * open the browser's native date picker via `showPicker()`.
 * The picker button is excluded from Tab order (tabIndex={-1}).
 */
function DateInput({ value, onChange, required, id, style, ...rest }) {
  const inputRef = useRef(null);

  const openPicker = () => {
    inputRef.current?.focus();
    try { inputRef.current?.showPicker(); } catch { /* not supported in all browsers */ }
  };

  return (
    <div style={{ display: 'flex', gap: '0.35rem', alignItems: 'stretch', ...style }}>
      <input
        ref={inputRef}
        id={id}
        type="date"
        value={value}
        onChange={onChange}
        required={required}
        style={{ flex: 1, minWidth: 0 }}
        {...rest}
      />
      <button
        type="button"
        onClick={openPicker}
        tabIndex={-1}
        title="Open calendar"
        style={{
          padding: '0 0.6rem', borderRadius: '6px',
          border: '1px solid var(--border)',
          background: 'var(--bg-tertiary)',
          color: 'var(--text-secondary)',
          cursor: 'pointer', fontSize: '0.95rem',
          lineHeight: 1, flexShrink: 0,
          transition: 'background 0.15s, color 0.15s',
        }}
        onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-secondary)'; e.currentTarget.style.color = 'var(--text-primary)'; }}
        onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg-tertiary)'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
      >
        📅
      </button>
    </div>
  );
}

/**
 * selectOnFocus — onFocus handler that selects all text in a number/text input.
 * Use: <input type="number" onFocus={selectOnFocus} ... />
 *
 * The setTimeout defers the select() call until after the browser's own focus
 * handling, which is required for reliable cross-browser behaviour.
 */
const selectOnFocus = e => {
  const target = e.target;
  setTimeout(() => target.select(), 0);
};

const toFormState_Property = (p) => p ? {
  name:                 p.name                 ?? '',
  province:             p.province             ?? '',
  city:                 p.city                 ?? '',
  address:              p.address              ?? '',
  postalCode:           p.postal_code          ?? p.postalCode          ?? '',
  parking:              p.parking              ?? '',
  purchasePrice:        p.purchase_price       ?? p.purchasePrice       ?? 0,
  marketPrice:          p.market_price         ?? p.marketPrice         ?? 0,
  loanAmount:           p.loan_amount          ?? p.loanAmount          ?? 0,
  mortgageRate:         p.mortgage_rate        ?? p.mortgageRate        ?? 0,
  monthlyRent:          p.monthly_rent         ?? p.monthlyRent         ?? 0,
  possDate:             p.poss_date            ?? p.possDate            ?? '',
  status:               p.status               ?? 'Rented',
  type:                 p.type                 ?? 'Condo',
  notes:                p.notes                ?? '',
  expectedCondoFees:    p.expected_condo_fees        ?? p.expectedCondoFees      ?? 0,
  expectedInsurance:    p.expected_insurance         ?? p.expectedInsurance      ?? 0,
  expectedUtilities:    p.expected_utilities         ?? p.expectedUtilities      ?? 0,
  expectedMiscExpenses: p.expected_misc_expenses     ?? p.expectedMiscExpenses   ?? 0,
  expectedAppreciationPct: p.expected_appreciation_pct ?? p.expectedAppreciationPct ?? 0,
  annualPropertyTax:    p.annual_property_tax      ?? p.annualPropertyTax    ?? 0,
  mortgagePayment:      p.mortgage_payment         ?? p.mortgagePayment      ?? 0,
  mortgageFrequency:    p.mortgage_frequency       ?? p.mortgageFrequency    ?? 'monthly',
} : {
  name: '', province: '', city: '', address: '', postalCode: '',
  parking: '', purchasePrice: 0, marketPrice: 0, loanAmount: 0, mortgageRate: 0,
  monthlyRent: 0, possDate: '', status: 'Rented', type: 'Condo', notes: '',
  expectedCondoFees: 0, expectedInsurance: 0, expectedUtilities: 0, expectedMiscExpenses: 0,
  expectedAppreciationPct: 0, annualPropertyTax: 0,
  mortgagePayment: 0, mortgageFrequency: 'monthly',
};

function PropertyModal({ property, onClose, onSave }) {
  const [formData, setFormData] = useState(() => toFormState_Property(property));
  const [errors,   setErrors]   = useState({});

  const prevStatus = property?.status ?? null;

  const isVacant  = formData.status === 'Vacant';
  const isRented  = formData.status === 'Rented';
  // Warn when switching TO Rented and rent is still 0
  const rentWarn  = isRented && formData.monthlyRent === 0;
  // Rent field is locked to 0 when Vacant
  const rentLocked = isVacant;

  const set = (field, value) => {
    setFormData(prev => ({ ...prev, [field]: value }));
    if (errors[field]) setErrors(e => ({ ...e, [field]: null }));
  };

  const handleStatusChange = (newStatus) => {
    if (newStatus === 'Vacant') {
      // Force rent to 0 immediately
      setFormData(prev => ({ ...prev, status: newStatus, monthlyRent: 0 }));
    } else {
      setFormData(prev => ({ ...prev, status: newStatus }));
    }
    if (errors.status) setErrors(e => ({ ...e, status: null }));
  };

  const validate = () => {
    const e = {};
    if (!formData.name.trim())    e.name     = 'Required';
    if (!formData.province)       e.province = 'Required';
    if (!formData.city.trim())    e.city     = 'Required';
    if (!formData.address.trim()) e.address  = 'Required';
    if (!formData.possDate)       e.possDate = 'Required';
    const pc = formData.postalCode.replace(/\s/g, '');
    if (pc && !/^[A-Za-z]\d[A-Za-z]\d[A-Za-z]\d$/.test(pc))
      e.postalCode = 'Format: A1A 1A1';
    if (isVacant && formData.monthlyRent !== 0)
      e.monthlyRent = 'Must be 0 when Vacant';
    if (isRented && formData.monthlyRent === 0)
      e.monthlyRent = 'Please enter the rent amount';
    return e;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    try {
      const url    = property ? `${API_URL}/properties/${property.id}` : `${API_URL}/properties`;
      const method = property ? 'PUT' : 'POST';
      const res    = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData),
      });
      if (!res.ok) throw new Error(await res.text());
      onSave();
    } catch (err) {
      console.error(err);
      alert('Failed to save property');
    }
  };

  const err = (key) => errors[key]
    ? <span style={{ color: 'var(--danger)', fontSize: '0.75rem' }}>{errors[key]}</span>
    : null;

  const rentBorderColor = rentLocked
    ? 'var(--text-tertiary)'
    : rentWarn
      ? 'var(--warning, #f59e0b)'
      : errors.monthlyRent
        ? 'var(--danger)'
        : undefined;

  const rentBg = rentLocked
    ? 'rgba(255,255,255,0.03)'
    : rentWarn
      ? 'rgba(245,158,11,0.08)'
      : undefined;

  return (
    <ModalOverlay onClose={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2 className="modal-title">{property ? 'Edit Property' : 'Add New Property'}</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <form onSubmit={handleSubmit}>
          <div className="form-grid">
            {/* Name */}
            <div className="form-group full-width">
              <label>Property Name *</label>
              <input type="text" value={formData.name} onChange={e => set('name', e.target.value)} />
              {err('name')}
            </div>

            {/* Type */}
            <div className="form-group">
              <label>Type *</label>
              <select value={formData.type} onChange={e => set('type', e.target.value)}>
                {INITIAL_OPTIONS.propertyTypes.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            {/* Status */}
            <div className="form-group">
              <label>Status *</label>
              <select value={formData.status} onChange={e => handleStatusChange(e.target.value)}>
                {INITIAL_OPTIONS.propertyStatuses.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>

            {/* Province */}
            <div className="form-group">
              <label>Province *</label>
              <select value={formData.province} onChange={e => set('province', e.target.value)}>
                <option value="">Select Province</option>
                {PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              {err('province')}
            </div>

            {/* City */}
            <div className="form-group">
              <label>City *</label>
              <input type="text" value={formData.city} onChange={e => set('city', e.target.value)} />
              {err('city')}
            </div>

            {/* Address */}
            <div className="form-group full-width">
              <label>Address *</label>
              <input type="text" value={formData.address} onChange={e => set('address', e.target.value)} />
              {err('address')}
            </div>

            {/* Postal code */}
            <div className="form-group">
              <label>Postal Code</label>
              <input type="text" value={formData.postalCode} placeholder="A1A 1A1"
                onChange={e => set('postalCode', formatPostalCode(e.target.value))} maxLength={7} />
              {err('postalCode')}
            </div>

            {/* Parking */}
            <div className="form-group">
              <label>Parking</label>
              <input type="text" value={formData.parking} onChange={e => set('parking', e.target.value)} />
            </div>

            {/* Purchase price */}
            <div className="form-group">
              <label>Purchase Price *</label>
              <input type="number" min="0" step="0.01" value={formData.purchasePrice}
                onChange={e => set('purchasePrice', parseFloat(e.target.value) || 0)}
                onFocus={selectOnFocus} />
            </div>

            {/* Market price */}
            <div className="form-group">
              <label>Market Price *</label>
              <input type="number" min="0" step="0.01" value={formData.marketPrice}
                onChange={e => set('marketPrice', parseFloat(e.target.value) || 0)}
                onFocus={selectOnFocus} />
            </div>

            {/* Loan amount */}
            <div className="form-group">
              <label>Loan Amount *</label>
              <input type="number" min="0" step="0.01" value={formData.loanAmount}
                onChange={e => set('loanAmount', parseFloat(e.target.value) || 0)}
                onFocus={selectOnFocus} />
            </div>

            {/* Mortgage rate */}
            <div className="form-group">
              <label>Mortgage Rate (% annual)</label>
              <input type="number" min="0" max="30" step="0.01"
                value={formData.mortgageRate}
                placeholder="e.g. 5.25"
                onChange={e => set('mortgageRate', parseFloat(e.target.value) || 0)}
                onFocus={selectOnFocus} />
            </div>

            {/* Monthly rent — with vacancy/rented highlighting */}
            <div className="form-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                Monthly Rent *
                {isVacant && (
                  <span style={{ fontSize: '0.72rem', color: 'var(--text-tertiary)', fontWeight: 400 }}>
                    (locked — property is Vacant)
                  </span>
                )}
                {rentWarn && !isVacant && (
                  <span style={{ fontSize: '0.72rem', color: '#f59e0b', fontWeight: 600 }}>
                    ⚠ Enter rent amount
                  </span>
                )}
              </label>
              <input
                type="number" min="0" step="0.01" value={formData.monthlyRent}
                disabled={rentLocked}
                style={{
                  borderColor: rentBorderColor,
                  background:  rentBg,
                  opacity: rentLocked ? 0.5 : 1,
                  transition: 'border-color 0.2s, background 0.2s',
                }}
                onChange={e => {
                  if (!rentLocked) set('monthlyRent', parseFloat(e.target.value) || 0);
                }}
              />
              {err('monthlyRent')}
            </div>

const toFormState_Expense = (expense, property) => expense ? {
  property_id:      expense.property_id ?? '',
  expense_date:     expense.expense_date ?? today(),
  amount:           expense.amount ?? 0,
  expense_type:     expense.expense_type ?? '',
  expense_category: expense.expense_category ?? '',
  notes:            expense.notes ?? '',
  tax_deductible:   expense.tax_deductible === undefined ? true : Boolean(expense.tax_deductible),
} : {
  property_id:      property?.id ?? '',
  expense_date:     today(),
  amount: 0, expense_type: '', expense_category: '', notes: '',
  tax_deductible: true,
};

const NON_DEDUCTIBLE_CATEGORIES = ['Mortgage', 'Principal'];

function ExpenseModal({ expense, properties, property, onClose, onSave }) {
  const [formData, setFormData] = useState(() => toFormState_Expense(expense, property));

  const set = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));

  // When category changes, auto-derive tax_deductible
  const setCategory = (category) => setFormData(prev => ({
    ...prev,
    expense_category: category,
    tax_deductible: category === '' ? prev.tax_deductible : !NON_DEDUCTIBLE_CATEGORIES.includes(category),
  }));

  const selectedProp = useMemo(() =>
    properties.find(p => String(p.id) === String(formData.property_id)) ?? null,
  [properties, formData.property_id]);

  // Quick-fill also derives tax_deductible from category
  const quickFill = (patch) => setFormData(prev => {
    const merged = { ...prev, ...patch };
    if ('expense_category' in patch && patch.expense_category !== '')
      merged.tax_deductible = !NON_DEDUCTIBLE_CATEGORIES.includes(patch.expense_category);
    return merged;
  });

  const fillCondoFees = () => {
    if (!selectedProp?.expected_condo_fees) return;
    quickFill({ amount: selectedProp.expected_condo_fees, expense_category: 'Management', expense_type: 'Recurrent', notes: 'Condo fees' });
  };
  const fillMortgage = () => {
    if (!selectedProp?.mortgage_payment) return;
    const monthly = monthlyMortgageEquiv(selectedProp.mortgage_payment, selectedProp.mortgage_frequency);
    quickFill({ amount: parseFloat(monthly.toFixed(2)), expense_category: 'Mortgage', expense_type: 'Recurrent',
      notes: `Mortgage payment (${selectedProp.mortgage_frequency || 'monthly'})` });
  };

  const hasCondoFees  = selectedProp?.expected_condo_fees > 0;
  const hasMortgage   = selectedProp?.mortgage_payment > 0;
  const showQuickFill = !expense && (hasCondoFees || hasMortgage);

  const handleSubmit = async (e) => {
    e.preventDefault();
    try {
      const url    = expense ? `${API_URL}/expenses/${expense.id}` : `${API_URL}/expenses`;
      const method = expense ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          propertyId: formData.property_id, expenseDate: formData.expense_date,
          amount: formData.amount, expenseType: formData.expense_type,
          expenseCategory: formData.expense_category, notes: formData.notes,
          taxDeductible: formData.tax_deductible,
        }),
      });
      if (!res.ok) throw new Error(await res.text());
      onSave();
    } catch (err) { console.error(err); alert('Failed to save expense'); }
  };

  return (
    <ModalOverlay onClose={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2 className="modal-title">{expense ? 'Edit Expense' : 'Add New Expense'}</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <form onSubmit={handleSubmit}>
          <div className="form-grid">
            <div className="form-group">
              <label>Property *</label>
              <select value={formData.property_id} onChange={e => set('property_id', e.target.value)} required>
                <PropertyOptions properties={properties} />
              </select>
            </div>

            <div className="form-group">
              <label>Date *</label>
              <DateInput value={formData.expense_date} onChange={e => set('expense_date', e.target.value)} required />
            </div>

            {showQuickFill && (
              <div className="form-group full-width" style={{ marginBottom: '0.25rem' }}>
                <label style={{ marginBottom: '0.4rem', display: 'block' }}>
                  Quick-fill
                  <span style={{ fontWeight: 400, color: 'var(--text-tertiary)', marginLeft: '0.4rem', fontSize: '0.72rem' }}>
                    — pre-fills amount, category &amp; type from property settings
                  </span>
                </label>
                <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                  {hasCondoFees && (
                    <button type="button" style={QUICK_BTN_STYLE} onClick={fillCondoFees}>
                      🏢 Condo Fees &nbsp;<span style={{ opacity: 0.7, fontWeight: 400 }}>${selectedProp.expected_condo_fees}/mo</span>
                    </button>
                  )}
                  {hasMortgage && (
                    <button type="button" style={QUICK_BTN_STYLE} onClick={fillMortgage}>
                      🏦 Mortgage Payment &nbsp;<span style={{ opacity: 0.7, fontWeight: 400 }}>
                        ${selectedProp.mortgage_payment}/{selectedProp.mortgage_frequency || 'mo'}
                      </span>
                    </button>
                  )}
                </div>
              </div>
            )}

            <div className="form-group">
              <label>Amount *</label>
              <input type="number" step="0.01" min="0" value={formData.amount}
                onChange={e => set('amount', parseFloat(e.target.value) || 0)}

            </div>

// ── URL routing helpers ───────────────────────────────────────────────────────

const VALID_VIEWS = ['dashboard', 'properties', 'expenses', 'income', 'tenants', 'events', 'property-detail', 'evaluator', 'renovation'];

const getViewFromHash = () => {
  const hash = window.location.hash.replace('#', '');
  return VALID_VIEWS.includes(hash) ? hash : 'dashboard';
};

const setHash = (view) => {
  window.history.replaceState(null, '', `#${view}`);
};

// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [currentView, setCurrentView]   = useState(getViewFromHash);
  const [properties, setProperties]     = useState([]);
  const [loading, setLoading]           = useState(true);
  const [alert, setAlert]               = useState(null);
  const [selectedProperty, setSelectedProperty] = useState(null);

  // modal state: { type: 'property'|'expense'|'income'|'tenant', data: obj|null, context: obj|null }
  const [modal, setModal] = useState(null);

  // filter pre-selection when jumping from property detail
  const [jumpPropertyId, setJumpPropertyId] = useState(null);

  // Sync hash on view change
  const navigate = (view) => {
    setCurrentView(view);
    setHash(view);
    setJumpPropertyId(null);
  };

  // Handle browser back/forward
  useEffect(() => {
    const onHash = () => setCurrentView(getViewFromHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => { loadData(); }, []);

  const showAlert = (message, type = 'info') => {
    setAlert({ message, type });
    setTimeout(() => setAlert(null), 4000);
  };

  const loadData = async () => {
    try {
      setLoading(true);
      const res = await fetch(`${API_URL}/properties`);
      if (!res.ok) throw new Error('Failed to fetch');
      const fresh = await res.json();
      setProperties(fresh);
      // Keep selectedProperty in sync so PropertyDetail shows updated values
      setSelectedProperty(prev => prev ? (fresh.find(p => p.id === prev.id) ?? prev) : null);
    } catch (err) {
      console.error(err);
      showAlert('Failed to load data', 'error');
    } finally {
      setLoading(false);
    }
  };

  const openModal  = (type, data = null, context = null) => setModal({ type, data, context });
  const closeModal = () => setModal(null);
  const handleSave = async () => { await loadData(); closeModal(); showAlert('Saved successfully', 'success'); };

  const handlePropertyClick = async (property) => {
    try {
      const res  = await fetch(`${API_URL}/properties/${property.id}`);
      const data = await res.json();
      setSelectedProperty(data);
      setCurrentView('property-detail');
      setHash('property-detail');
    } catch {
      showAlert('Failed to load property details', 'error');
    }
  };

  // Jump from PropertyDetail to a filtered view
  const handleJump = (view, propertyId) => {
    setJumpPropertyId(propertyId);
    setCurrentView(view);
    setHash(view);
  };

  const renderView = () => {
    switch (currentView) {
      case 'dashboard':
        return <Dashboard properties={properties} onPropertyClick={handlePropertyClick} />;

      case 'properties':
        return <PropertiesView
          properties={properties}
          onPropertyClick={handlePropertyClick}
          onAddProperty={() => openModal('property')}
          onEditProperty={(p) => openModal('property', p)}
          onReloadProperties={loadData}
        />;

      case 'expenses':
        return <ExpensesView
          properties={properties}
          onAddExpense={() => openModal('expense')}
          onEditExpense={(e) => openModal('expense', e)}
          initialPropertyId={jumpPropertyId}
        />;

      case 'income':
        return <IncomeView
          properties={properties}
          onAddIncome={() => openModal('income')}
          onEditIncome={(i) => openModal('income', i)}
          initialPropertyId={jumpPropertyId}
        />;

      case 'tenants':
        return <TenantsView
          properties={properties}
          onAddTenant={() => openModal('tenant')}
          onEditTenant={(t) => openModal('tenant', t)}
          initialPropertyId={jumpPropertyId}
        />;

      case 'events':
        return <EventsView properties={properties} initialPropertyId={jumpPropertyId} />;

      case 'evaluator':
        return <EvaluatorView />;

      case 'renovation':
        return <RenovationView />;

      case 'property-detail':
        return <PropertyDetail
          property={selectedProperty}
          properties={properties}
          onSelectProperty={(p) => { setSelectedProperty(p); }}
          onBack={() => navigate('properties')}
          onEdit={() => openModal('property', selectedProperty)}
          onAddExpense={() => openModal('expense', null, selectedProperty)}
          onAddIncome={() => openModal('income',  null, selectedProperty)}
          onAddTenant={() => openModal('tenant',  null, selectedProperty)}
          onJump={handleJump}
        />;

      default:
        return <Dashboard properties={properties} onPropertyClick={handlePropertyClick} />;
    }
  };

  if (loading) {
    return (
      <div className="loading">
        <div className="spinner" />
        <p style={{ marginTop:'1rem', color:'var(--text-secondary)' }}>Loading your portfolio…</p>
      </div>
    );
  }

  // Resolve the property context for expense/income/tenant modals opened from detail view
  const contextProperty = modal?.context
    ? properties.find(p => p.id === modal.context.id) ?? modal.context
    : null;

  return (
    <div className="app">
      <Sidebar currentView={currentView} onNavigate={navigate} />

      <main className="main-content">
        {alert && (
          <div className={`alert alert-${alert.type}`}>
            <span>{alert.type === 'success' ? '✓' : alert.type === 'error' ? '✗' : 'ℹ'}</span>
            <span>{alert.message}</span>
          </div>
        )}
        {renderView()}
      </main>

      {modal?.type === 'property' && (
        <PropertyModal property={modal.data} onClose={closeModal} onSave={handleSave} />
      )}
      {modal?.type === 'expense' && (
        <ExpenseModal
          expense={modal.data}
          properties={properties}
          property={contextProperty ?? (modal.data ? properties.find(p => p.id === modal.data.property_id) : null)}
          onClose={closeModal}
          onSave={handleSave}
        />
      )}
      {modal?.type === 'income' && (
        <IncomeModal
          income={modal.data}
          properties={properties}
          property={contextProperty ?? (modal.data ? properties.find(p => p.id === modal.data.property_id) : null)}
          onClose={closeModal}
          onSave={handleSave}
        />
      )}
      {modal?.type === 'tenant' && (
        <TenantModal
          tenant={modal.data}
          properties={properties}
          property={contextProperty ?? (modal.data ? properties.find(p => p.id === modal.data.property_id) : null)}
          onClose={closeModal}
          onSave={handleSave}
        />
      )}
    </div>
  );
}


    // ── Mount ───────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(React.StrictMode, null, React.createElement(App))
    );
  </script>
</body>
</html>
