/**
 * useTransactionView — shared state and logic for ExpensesView and IncomeView.
 *
 * @param {string}   viewName         – 'expenses' | 'income'  (matches COLUMN_DEFS keys)
 * @param {string}   endpoint         – API path segment, e.g. 'expenses' | 'income'
 * @param {string}   dateField        – record field used for date filtering, e.g. 'expense_date'
 * @param {string}   defaultSortBy    – initial sortBy value
 * @param {object[]} properties       – property records from App state
 * @param {number|null} initialPropertyId
 * @param {string[]} seedTypeOptions  – INITIAL_OPTIONS slice for the main type filter
 * @param {string}   typeField        – record field for the type filter, e.g. 'expense_type'
 * @param {string[]} [seedCategoryOptions] – optional second filter seed (expenses only)
 * @param {string}   [categoryField]       – optional second filter field (expenses only)
 */
function useTransactionView({
  viewName, endpoint, dateField, defaultSortBy,
  properties, initialPropertyId,
  seedTypeOptions, typeField,
  seedCategoryOptions, categoryField,
}) {
  const [records,         setRecords]         = useState([]);
  const [loading,         setLoading]         = useState(true);
  const [sortBy,          setSortBy]          = useState(defaultSortBy);
  const [sortOrder,       setSortOrder]       = useState('desc');
  const [filterProperty,  setFilterProperty]  = useState(initialPropertyId ? String(initialPropertyId) : 'all');
  const [dateFilter,      setDateFilter]      = useState('all');
  const [customDateStart, setCustomDateStart] = useState('');
  const [customDateEnd,   setCustomDateEnd]   = useState('');
  const [filterTypes,     setFilterTypes]     = useState(seedTypeOptions);
  const [filterCategories, setFilterCategories] = useState(seedCategoryOptions ?? []);

  const colVis    = useColumnVisibility(viewName);
  const allColKeys   = COLUMN_DEFS[viewName].map(d => d.key);
  const allColLabels = Object.fromEntries(COLUMN_DEFS[viewName].map(d => [d.key, d.label]));

  // Sync jump property
  useEffect(() => {
    if (initialPropertyId) setFilterProperty(String(initialPropertyId));
  }, [initialPropertyId]);

  // Derived option lists (merge seeded values with any new ones found in data)
  const allTypes = useMemo(() =>
    mergeOptions(seedTypeOptions, records.map(r => r[typeField])), [records]);

  const allCategories = useMemo(() =>
    categoryField ? mergeOptions(seedCategoryOptions, records.map(r => r[categoryField])) : [],
  [records]);

  useEffect(() => { setFilterTypes(t => mergeOptions(t, allTypes)); }, [allTypes]);
  useEffect(() => {
    if (categoryField) setFilterCategories(c => mergeOptions(c, allCategories));
  }, [allCategories]);

  // Load
  useEffect(() => { if (properties.length > 0) load(); }, [properties]);

  const load = async () => {
    try {
      setLoading(true);
      const responses = await Promise.all(
        properties.map(p =>
          fetch(`${API_URL}/${endpoint}?property_id=${p.id}`)
            .then(r => r.ok ? r.json() : [])
            .then(data => data.map(rec => ({ ...rec, property_name: p.name })))
        )
      );
      setRecords(responses.flat());
    } catch (err) { console.error(err); }
    finally { setLoading(false); }
  };

  const handleDelete = async (id) => {
    if (!confirm(`Delete this ${viewName.replace(/s$/, '')} record?`)) return;
    const res = await fetch(`${API_URL}/${endpoint}/${id}`, { method: 'DELETE' });
    if (res.ok) load();
  };

  // Base: property filter only (unfiltered reference for stat cards)
  const baseRecords = useMemo(() =>
    filterProperty === 'all'
      ? records
      : records.filter(r => r.property_id === parseInt(filterProperty)),
  [records, filterProperty]);

  const filtered = useMemo(() => {
    let list = baseRecords.filter(r => {
      if (!filterTypes.includes(r[typeField])) return false;
      if (categoryField && !filterCategories.includes(r[categoryField])) return false;
      if (dateFilter !== 'all' && dateFilter !== 'custom') {
        const range = getDateRanges()[dateFilter];
        if (range && !isDateInRange(r[dateField], range.start, range.end)) return false;
      }
      if (dateFilter === 'custom' && customDateStart && customDateEnd) {
        if (!isDateInRange(r[dateField], new Date(customDateStart), new Date(customDateEnd))) return false;
      }
      return true;
    });
    list.sort((a, b) => {
      const dir = sortOrder === 'asc' ? 1 : -1;
      if (sortBy === dateField) return dir * (new Date(a[dateField]) - new Date(b[dateField]));
      if (sortBy === 'amount')  return dir * (a.amount - b.amount);
      return 0;
    });
    return list;
  }, [baseRecords, filterTypes, filterCategories, dateFilter, customDateStart, customDateEnd, sortBy, sortOrder]);

  const baseTotal     = baseRecords.reduce((s, r) => s + r.amount, 0);
  const filteredTotal = filtered.reduce((s, r) => s + r.amount, 0);
  const isFiltered    = filteredTotal !== baseTotal;
  const pct           = baseTotal > 0 ? ((filteredTotal / baseTotal) * 100).toFixed(1) : '100';
  const propName      = filterProperty !== 'all'
    ? properties.find(p => String(p.id) === filterProperty)?.name
    : null;

  return {
    // data
    records, loading, filtered, baseRecords,
    baseTotal, filteredTotal, isFiltered, pct, propName,
    // sort
    sortBy, setSortBy, sortOrder, setSortOrder,
    // filters
    filterProperty, setFilterProperty,
    dateFilter, setDateFilter,
    customDateStart, setCustomDateStart,
    customDateEnd, setCustomDateEnd,
    filterTypes, setFilterTypes, allTypes,
    filterCategories, setFilterCategories, allCategories,
    // column visibility
    colVis, allColKeys, allColLabels,
    // actions
    load, handleDelete,
  };
}


// ── src/components/Tooltip.jsx─────────────────────────────

/**
 * TruncatedCell — shows text truncated to its container width, with a
 * floating tooltip only when the text is actually clipped.
 *
 * maxWidth defaults to '100%' so the span fills whatever space the td gives it.
 * Pass a px number only when you need a hard cap (e.g. a note inside a narrow column).
 */
function TruncatedCell({ text, maxWidth = '100%' }) {
  const [tip, setTip]           = useState(null);
  const [overflows, setOverflows] = useState(false);
  const ref                     = useRef(null);

  // Detect overflow after render / on resize
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const check = () => setOverflows(el.scrollWidth > el.clientWidth + 1);
    check();
    const ro = new ResizeObserver(check);
    ro.observe(el);
    return () => ro.disconnect();
  }, [text]);

  if (!text) return <span>—</span>;

  const showTip = () => {
    if (!overflows) return;
    const rect = ref.current?.getBoundingClientRect();
    if (rect) setTip({ x: rect.left, y: rect.top });
  };

  return (
    <>
      <span
        ref={ref}
        onMouseEnter={showTip}
        onMouseLeave={() => setTip(null)}
        style={{
          maxWidth,
          display:      'block',
          whiteSpace:   'nowrap',
          overflow:     'hidden',
          textOverflow: 'ellipsis',
          cursor:       overflows ? 'default' : 'inherit',
        }}
      >
        {text}
      </span>
      {tip && (
        <div style={{
          position:     'fixed',
          top:          tip.y,
          left:         tip.x,
          transform:    'translateY(-110%)',
          background:   '#1a1f2e',
          border:       '1px solid #374151',
          borderRadius: '8px',
          padding:      '0.6rem 0.9rem',
          fontSize:     '0.82rem',
          whiteSpace:   'pre-wrap',
          maxWidth:     360,
          zIndex:       9999,
          color:        '#f3f4f6',
          boxShadow:    '0 8px 24px rgba(0,0,0,0.6)',
          lineHeight:   1.5,
          pointerEvents:'none',
        }}>
          {text}
        </div>
      )}
    </>
  );
}


// ── src/components/MultiSelect.jsx─────────────────────────

function MultiSelect({ label, options, selected, onChange, labelMap = {} }) {
  const [isOpen,  setIsOpen]  = useState(false);
  const [dropPos, setDropPos] = useState({ top: 0, left: 0, width: 0, flip: false });
  const triggerRef  = useRef(null);
  const dropdownRef = useRef(null);

  useEffect(() => {
    if (!isOpen) return;

    const onMouseDown = (e) => {
      // Close only when the click is outside BOTH the trigger and the dropdown
      if (
        triggerRef.current  && !triggerRef.current.contains(e.target) &&
        dropdownRef.current && !dropdownRef.current.contains(e.target)
      ) {
        setIsOpen(false);
      }
    };

    const onScroll = (e) => {
      // Close only when the scroll originates outside the dropdown
      if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
      setIsOpen(false);
    };

    document.addEventListener('mousedown', onMouseDown);
    document.addEventListener('scroll', onScroll, true); // capture
    return () => {
      document.removeEventListener('mousedown', onMouseDown);
      document.removeEventListener('scroll', onScroll, true);
    };
  }, [isOpen]);

  const openDropdown = useCallback(() => {
    if (!triggerRef.current) return;
    const r = triggerRef.current.getBoundingClientRect();
    const dropHeight = Math.min(options.length * 40 + 48, 280);
    const spaceBelow = window.innerHeight - r.bottom;
    const flip = spaceBelow < dropHeight && r.top > dropHeight;
    setDropPos({ top: flip ? r.top : r.bottom + 4, left: r.left, width: r.width, flip });
    setIsOpen(o => !o);
  }, [options.length]);

  const allSelected  = selected.length === options.length;
  const noneSelected = selected.length === 0;

  const toggle    = (v) => onChange(selected.includes(v) ? selected.filter(s => s !== v) : [...selected, v]);
  const selectAll = () => onChange([...options]);
  const clearAll  = () => onChange([]);
  const only      = (v) => onChange([v]);

  const triggerLabel =
    allSelected        ? label :
    noneSelected       ? `${label}: None` :
    selected.length === 1 ? `${label}: ${labelMap[selected[0]] || selected[0]}` :
                          `${label}: ${selected.length}`;

  const isFiltered = !allSelected;

  const dropdown = isOpen && createPortal(
    <div
      ref={dropdownRef}
      style={{
        position:  'fixed',
        top:       dropPos.flip ? undefined : dropPos.top,
        bottom:    dropPos.flip ? window.innerHeight - dropPos.top : undefined,
        left:      dropPos.left,
        minWidth:  Math.max(dropPos.width, 160),
        width:     'max-content',
        maxWidth:  280,
        maxHeight: 280,
        overflowY: 'auto',
        background: 'var(--bg-secondary)',
        border:     '1px solid var(--border)',
        borderRadius: '8px',
        boxShadow:  '0 8px 24px rgba(0,0,0,0.55)',
        zIndex:     9999,
      }}
    >
      {/* Select-all / clear row */}
      <div style={{
        display: 'flex', justifyContent: 'space-between',
        padding: '0.45rem 0.75rem', borderBottom: '1px solid var(--border)',
        background: 'var(--bg-primary)', position: 'sticky', top: 0,
      }}>
        <button type="button" onClick={selectAll} disabled={allSelected}
          style={{ background:'none', border:'none', color:'var(--accent-primary)', cursor:'pointer',
            fontSize:'0.78rem', padding:'2px 4px', opacity: allSelected ? 0.4 : 1 }}>
          All
        </button>
        <span style={{ color:'var(--text-tertiary)', fontSize:'0.78rem', alignSelf:'center' }}>{label}</span>
        <button type="button" onClick={clearAll} disabled={noneSelected}
          style={{ background:'none', border:'none', color:'var(--accent-primary)', cursor:'pointer',
            fontSize:'0.78rem', padding:'2px 4px', opacity: noneSelected ? 0.4 : 1 }}>
          None
        </button>
      </div>

      {options.map(opt => {
        const checked = selected.includes(opt);
        return (
          <div key={opt}
            style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'0.45rem 0.75rem', cursor:'pointer',
              background: checked ? 'rgba(59,130,246,0.06)' : 'transparent',
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-tertiary)'}
            onMouseLeave={e => e.currentTarget.style.background = checked ? 'rgba(59,130,246,0.06)' : 'transparent'}
          >
            <label style={{ display:'flex', alignItems:'center', gap:'0.5rem',
              cursor:'pointer', flex:1, fontSize:'0.85rem' }}>
              <input type="checkbox" checked={checked} onChange={() => toggle(opt)}
                style={{ width:14, height:14, cursor:'pointer', accentColor:'var(--accent-primary)' }} />
              <span style={{ color: checked ? 'var(--text-primary)' : 'var(--text-secondary)' }}>{labelMap[opt] || opt}</span>
            </label>
            {!(checked && selected.length === 1) && (
              <button type="button" onClick={e => { e.stopPropagation(); only(opt); }}
                style={{ background:'none', border:'none', fontSize:'0.68rem',
                  color:'var(--text-tertiary)', cursor:'pointer', padding:'1px 4px',
                  opacity:0.6, marginLeft:'0.4rem' }}
                onMouseEnter={e => { e.currentTarget.style.opacity=1; e.currentTarget.style.color='var(--accent-primary)'; }}
                onMouseLeave={e => { e.currentTarget.style.opacity=0.6; e.currentTarget.style.color='var(--text-tertiary)'; }}
              >only</button>
            )}
          </div>
        );
      })}
    </div>,
    document.body
  );

  return (
    <div ref={triggerRef} style={{ position:'relative', display:'inline-block' }}>
      <button
        type="button"
        onClick={openDropdown}
        style={{
          display: 'flex', alignItems: 'center', gap: '0.35rem',
          padding: '0.4rem 0.6rem',
          background: isFiltered ? 'rgba(59,130,246,0.12)' : 'var(--bg-primary)',
          border: `1px solid ${isFiltered ? 'var(--accent-primary)' : 'var(--border)'}`,
          borderRadius: '6px',
          cursor: 'pointer',
          fontSize: '0.82rem',
          color: isFiltered ? 'var(--accent-secondary, #93c5fd)' : 'var(--text-secondary)',
          whiteSpace: 'nowrap',
          transition: 'border-color 0.15s, background 0.15s',
        }}
      >
        <span>{triggerLabel}</span>
        <span style={{ fontSize:'0.6rem', opacity:0.7 }}>{isOpen ? '▲' : '▼'}</span>
      </button>
      {dropdown}
    </div>
  );
}

/**
 * StarRating — renders 1–5 stars with proper half-star support.
 * Accepts starsData = { full, half, empty } from calcInvestmentScore.
 */
function StarRating({ starsData, size = '1.35rem' }) {
  const full  = starsData?.full  ?? 0;
  const half  = starsData?.half  ?? false;
  const empty = starsData?.empty ?? (5 - full - (half ? 1 : 0));

  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', letterSpacing: '0.05em' }}>
      {Array.from({ length: full }, (_, i) => (
        <span key={`f${i}`} style={{ color: '#f59e0b', fontSize: size }}>★</span>
      ))}
      {half && (
        <span key="h" style={{ position: 'relative', display: 'inline-block', fontSize: size, width: '0.65em' }}>
          {/* empty star underneath */}
          <span style={{ color: '#374151' }}>★</span>
          {/* filled left half on top */}
          <span style={{
            position: 'absolute', left: 0, top: 0,
            width: '50%', overflow: 'hidden',
            color: '#f59e0b',
          }}>★</span>
        </span>
      )}
      {Array.from({ length: empty }, (_, i) => (
        <span key={`e${i}`} style={{ color: '#374151', fontSize: size }}>★</span>
      ))}
    </span>
  );
}

/**
 * DateRangeFilter — date range selector shared by ExpensesView and IncomeView.
 *
 * Props:
 *   value            – current preset key ('all' | 'ytd' | 'currentMonth' | 'currentYear' | 'lastYear' | 'custom')
 *   onChange         – (value: string) => void
 *   customStart      – YYYY-MM-DD string for custom range start
 *   customEnd        – YYYY-MM-DD string for custom range end
 *   onCustomStart    – (value: string) => void
 *   onCustomEnd      – (value: string) => void
 */
function DateRangeFilter({ value, onChange, customStart, customEnd, onCustomStart, onCustomEnd }) {
  return (
    <>
      <select value={value} onChange={e => onChange(e.target.value)}>
        <option value="all">All Time</option>
        <option value="ytd">YTD</option>
        <option value="currentMonth">This Month</option>
        <option value="currentYear">This Year</option>
        <option value="lastYear">Last Year</option>
        <option value="custom">Custom…</option>
      </select>
      {value === 'custom' && <>
        <input type="date" value={customStart} onChange={e => onCustomStart(e.target.value)} />
        <input type="date" value={customEnd}   onChange={e => onCustomEnd(e.target.value)} />
      </>}
    </>
  );
}

/**
 * Unified income/expenses breakdown for any period — all-time or YTD.
 *
 * Props:
 *   income, expenses, netExpenses, balance, operatingProfit
 *   principal    — principal repaid in this period; shown as note on Expenses card
 *   roi          — shown as secondary on Operating Profit (percent number, e.g. 12.3)
 *   prefix       — label prefix, e.g. "YTD " (default "" = all-time)
 *   scope        — "portfolio" | "filtered" | "property"
 */
function FinancialPeriodSection({
  income, expenses, netExpenses, balance, operatingProfit,
  principal = null, roi = null,
  prefix = '', scope = 'portfolio',
}) {
  const isYTD    = prefix.trim().length > 0;
  const scopeStr = scope === 'property'
    ? 'for this property'
    : scope === 'filtered'
      ? 'for filtered properties'
      : 'across all properties';

  // Expenses card tooltip
  const expTooltip = isYTD
    ? `All expenses ${scopeStr} in the trailing 12-month window.\n${
        principal > 0
          ? `Includes ${fmt(principal)} of principal repayment — equity-building, not a true cost.`
          : 'Principal repayments are equity-building payments, not true operating costs.'
      }`
    : `All expenses ever recorded ${scopeStr}.\nIncludes the initial down payment and all principal repayments paid to date — both are equity-building, not operating costs.`;

  // Net Expenses tooltip — correct for both periods
  const netExpTooltip = isYTD
    ? 'YTD Expenses minus principal repayment in the same period.\nShows the true operating cost burden for the trailing 12 months, excluding equity-building payments.'
    : `Total Expenses minus all principal payments (down payment + mortgage principal repaid to date).\nPrincipal payments build equity — they are not a true operating cost.\nFormula: Total Expenses − Total Principal Paid.`;

  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem' }}>
      {mc({ label: `${prefix}Income`, primary: fmt(income), primaryCls: 'text-success',
        tooltip: isYTD
          ? `All income recorded ${scopeStr} in the trailing 12-month window.`
          : `All income ever recorded ${scopeStr} since the first entry.` })}

      {mc({ label: `${prefix}Expenses`, primary: fmt(expenses), primaryCls: 'text-danger',
        secondary: principal > 0 ? `excl. ${fmt(principal)} principal` : null,
        secondaryCls: 'text-success',
        tooltip: expTooltip })}

      {mc({ label: `${prefix}Net Expenses`, primary: fmt(netExpenses),
        primaryCls: netExpenses >= 0 ? 'text-danger' : 'text-success',
        tooltip: netExpTooltip })}

      {mc({ label: `${prefix}Balance`, primary: fmt(balance),
        primaryCls: balance >= 0 ? 'text-success' : 'text-danger',
        tooltip: `${prefix || 'All-time '}Income minus ${prefix || 'all-time '}Expenses. Raw cash in/out with no adjustments for equity-building payments.` })}

      {mc({ label: `${prefix}Operating Profit`, primary: fmt(operatingProfit),
        primaryCls: operatingProfit >= 0 ? 'text-success' : 'text-danger',
        secondary: roi !== null ? roi.toFixed(1) + '% ROI' : null,
        secondaryCls: roi !== null && roi >= 0 ? 'text-success' : 'text-danger',
        tooltip: `${isYTD ? 'YTD' : 'All-time'} Income minus Net Expenses (down payment & principal excluded).\nThe true operating profit — money earned beyond your equity-building capital.\n${roi !== null ? `ROI = Operating Profit ÷ ${scope === 'property' ? 'Market Value' : 'Portfolio Value'}.` : ''}` })}
    </div>
  );
}

// Health badge derived from investment score
function HealthBadge({ score }) {
  if (score == null) return null;
  let bg, color, label;
  if      (score >= 70) { bg = 'rgba(16,185,129,0.15)'; color = '#10b981'; label = '● Healthy'; }
  else if (score >= 40) { bg = 'rgba(245,158,11,0.15)'; color = '#f59e0b'; label = '● Average'; }
  else                  { bg = 'rgba(239,68,68,0.15)';  color = '#ef4444'; label = '● Needs Attention'; }
  return (
    <span style={{
      fontSize: '0.7rem', fontWeight: 700, padding: '0.18rem 0.55rem',
      borderRadius: '20px', background: bg, color, letterSpacing: '0.03em',
    }}>{label}</span>
  );
}

function PropertyCard({ property, onClick, onEdit, avgCashFlow, avgNOI, events = [] }) {
  const equity       = property.market_price - property.loan_amount;
  const equityPct    = property.market_price > 0
    ? (equity / property.market_price * 100).toFixed(1) : null;
  const appreciation = property.market_price - property.purchase_price;
  const apprPct      = property.purchase_price > 0
    ? (appreciation / property.purchase_price * 100).toFixed(1) : null;
  const sellingProfit = property.market_price + property.total_income
                        - property.total_expenses - property.loan_amount;
  const sellingPct   = property.total_expenses > 0
    ? (sellingProfit / property.total_expenses * 100).toFixed(1) : null;
  const balance      = property.total_income - property.total_expenses;

  const yrs           = yearsHeld(property);
  const yearlyAppr    = yrs ? appreciation / yrs : null;
  const yearlyApprPct = (yrs && property.purchase_price > 0)
    ? (yearlyAppr / property.purchase_price * 100).toFixed(1) : null;

  const monthlyAppr = yearlyAppr !== null ? yearlyAppr / 12 : 0;
  const monthlyGain = avgCashFlow != null ? avgCashFlow + monthlyAppr : null;

  // Event-based economic vacancy — matches PropertyDetail methodology exactly.
  const { start: ytdStart, end: ytdEnd } = trailingYear();
  const econVacancy = calcEconVacancy(property, events, ytdStart, ytdEnd);

  // Time to reach selling profit
  const timeToProfit = (() => {
    if (sellingProfit <= 0) return { label: '\u2014', cls: '' };
    if (avgCashFlow == null || avgCashFlow <= 0)
      return { label: avgCashFlow < 0 ? '\u221e' : '\u2014', cls: 'text-danger' };
    const mo = sellingProfit / avgCashFlow;
    return {
      label: mo < 12 ? `${Math.round(mo)} mo` : `${(mo / 12).toFixed(1)} yr`,
      cls: mo < 24 ? 'text-success' : mo < 60 ? '' : 'text-danger',
    };
  })();

  // Investment score — uses calcSimpleHealth for consistency with the Properties table view
  const investmentScore = calcSimpleHealth(property);

  // Expected (budgeted) metrics — null if no cost fields entered
  // Pass 0 for avgMortgage since we don't have per-property window avg here
  const expected = calcExpected(property, 0);

  const eqCls = equityPct !== null
    ? (parseFloat(equityPct) >= 50 ? 'text-success'
    : parseFloat(equityPct) >= 25 ? 'text-warning' : 'text-danger') : '';

  const fmt = n => `$${Math.round(n).toLocaleString()}`;
  const handleEdit = (e) => { e.stopPropagation(); onEdit?.(property); };

  const Row = ({ label, value, valueCls = '', pct = null, pctCls = '' }) => (
    <div className="pc-row">
      <span className="pc-label">{label}</span>
      <span className="pc-right">
        <span className={`pc-value ${valueCls}`}>{value}</span>
        {pct != null && pct !== '' && <span className={`pc-pct ${pctCls}`}>{pct}</span>}
      </span>
    </div>
  );
  const Div = () => <div className="pc-divider" />;

  return (
    <div className="property-card" onClick={onClick}>
      {onEdit && (
        <div className="card-actions">
          <button className="btn btn-secondary btn-icon btn-small" onClick={handleEdit} title="Edit">✏️</button>
        </div>
      )}
      <div className="property-card-header">
        <div>
          <div className="property-name">{property.name}</div>
          <div className="property-address">{property.city}, {property.province}</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', alignItems: 'flex-end' }}>
          <div className={`property-badge ${property.status.toLowerCase()}`}>{property.status}</div>
          {investmentScore && <HealthBadge score={investmentScore.score} />}
        </div>
      </div>

      {/* Investment score stars */}
      {investmentScore && (
        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.35rem 0 0.1rem', borderBottom: '1px solid var(--border)', marginBottom: '0.4rem' }}>
          <StarRating starsData={investmentScore.starsData} size="1.1rem" />
          <span style={{ fontSize: '0.72rem', color: 'var(--text-tertiary)' }}>
            {investmentScore.score}/100
          </span>
          <span style={{ fontSize: '0.72rem', fontWeight: 600 }} className={investmentScore.cls}>
            {investmentScore.label}
          </span>
        </div>
      )}

      <div className="pc-body">
        {/* 1. Market value & equity */}
        <Row label="Market Value" value={fmt(property.market_price)} />
        <Row label="Equity"
          value={fmt(equity)} valueCls={equity >= 0 ? 'text-success' : 'text-danger'}
          pct={equityPct !== null ? `${equityPct}%` : null} pctCls={eqCls} />

        <Div />
        {/* 2. Rent, NOI actual vs potential, vacancy & cash flow */}
        {property.monthly_rent > 0 && (
          <Row label="Rent/mo" value={fmt(property.monthly_rent)} />
        )}
        {avgNOI != null && (() => {
          const cls = avgNOI >= 0 ? 'text-success' : 'text-danger';
          const expNOI = expected?.monthlyNOI;
          const expCls = expNOI != null ? (expNOI >= 0 ? 'text-success' : 'text-danger') : null;
          const pctLabel = expNOI != null
            ? <span className={expCls} style={{ fontSize: '0.72rem' }}>exp {fmt(expNOI)}</span>
            : (property.monthly_rent > 0
              ? <span style={{ fontSize: '0.72rem', opacity: 0.6 }}>of {fmt(property.monthly_rent)} rent</span>
              : null);
          return (
            <div className="pc-row">
              <span className="pc-label">Avg NOI/mo</span>
              <span className="pc-right">
                <span className={`pc-value ${cls}`}>{fmt(avgNOI)}</span>
                {pctLabel && <span className="pc-pct">{pctLabel}</span>}
              </span>
            </div>
          );
        })()}
        {econVacancy !== null && (
          <Row label="Econ. Vacancy"
            value={`${econVacancy.toFixed(1)}%`}
            valueCls={econVacancy > 10 ? 'text-danger' : econVacancy > 4 ? 'text-warning' : 'text-success'} />
        )}
        {avgCashFlow != null && (
          <Row label="Avg Cash Flow"
            value={fmt(avgCashFlow) + '/mo'}
            valueCls={avgCashFlow >= 0 ? 'text-success' : 'text-danger'} />
        )}
        {monthlyGain !== null && (
          <Row label="Monthly Gain"
            value={fmt(monthlyGain) + '/mo'}
            valueCls={monthlyGain >= 0 ? 'text-success' : 'text-danger'} />
        )}

        <Div />
        {/* 3. Selling profit */}
        <Row label="Sell Profit"
          value={fmt(sellingProfit)}
          valueCls={sellingProfit >= 0 ? 'text-success' : 'text-danger'}
          pct={sellingPct !== null ? `${sellingPct}%` : null}
          pctCls={sellingProfit >= 0 ? 'text-success' : 'text-danger'} />
        <Row label="Time to Profit"
          value={timeToProfit.label}
          valueCls={timeToProfit.cls} />
        {/* Cap rate: actual vs expected */}
        {avgNOI != null && property.purchase_price > 0 && (() => {
          const capRate = avgNOI * 12 / property.purchase_price;
          const capCls  = capRate > 0.07 ? 'text-success' : capRate > 0.04 ? '' : 'text-danger';
          const expCap  = expected?.capRate;
          const expCls  = expCap != null ? (expCap > 0.07 ? 'text-success' : expCap > 0.04 ? '' : 'text-danger') : null;
          return (
            <Row label="Cap Rate"
              value={`${(capRate * 100).toFixed(1)}%`}
              valueCls={capCls}
              pct={expCap != null ? `exp ${(expCap * 100).toFixed(1)}%` : null}
              pctCls={expCls || ''} />
          );
        })()}

        <Div />
        {/* 4. Income / expenses / balance */}
        <Row label="Income"   value={fmt(property.total_income)}   valueCls="text-success" />
        <Row label="Expenses" value={fmt(property.total_expenses)} valueCls="text-danger" />
        <Row label="Balance"  value={fmt(balance)}
          valueCls={balance >= 0 ? 'text-success' : 'text-danger'} />

        <Div />
        {/* 5. Appreciation */}
        <Row label="Appreciation"
          value={fmt(appreciation)}
          valueCls={appreciation >= 0 ? 'text-success' : 'text-danger'}
          pct={apprPct !== null ? `${apprPct}%` : null}
          pctCls={appreciation >= 0 ? 'text-success' : 'text-danger'} />
        {yearlyAppr !== null && (
          <Row label="Yearly Appr."
            value={fmt(yearlyAppr) + '/yr'}
            valueCls={yearlyAppr >= 0 ? 'text-success' : 'text-danger'}
            pct={yearlyApprPct !== null ? `${yearlyApprPct}%/yr` : null}
            pctCls={yearlyAppr >= 0 ? 'text-success' : 'text-danger'} />
        )}
      </div>
    </div>
  );
}

const STATUS_COLORS = { Rented: '#10b981', Vacant: '#ef4444', Primary: '#3b82f6' };
const G2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.25rem', marginBottom: '1.25rem' };

/** Build static chart datasets from property records (no async data needed). */
function buildChartData(list) {
  const incExp = list.map(p => ({
    name: sn(p.name),
    Income: p.total_income, Expenses: p.total_expenses,
    Net: p.total_income - p.total_expenses,
  }));
  const value = list.map(p => ({ name: sn(p.name), Value: p.market_price }));
  const roi   = list.map(p => {
    const net = p.total_income - (p.total_expenses - (p.purchase_price - p.loan_amount));
    return { name: sn(p.name), ROI: p.market_price ? parseFloat((net / p.market_price * 100).toFixed(2)) : 0 };
  });
  const statusCount = list.reduce((acc, p) => { acc[p.status] = (acc[p.status] || 0) + 1; return acc; }, {});
  const status = Object.entries(statusCount).map(([name, value]) => ({ name, value }));
  const equity = list.map(p => ({ name: sn(p.name), Equity: p.market_price - p.loan_amount, Loan: p.loan_amount }));
  const equityPct = list.map(p => ({
    name: sn(p.name),
    EquityPct: p.market_price ? parseFloat(((p.market_price - p.loan_amount) / p.market_price * 100).toFixed(1)) : 0,
  }));
  const appreciation = list.map(p => {
    const appr = p.market_price - p.purchase_price;
    const yrs  = yearsHeld(p);
    return { name: sn(p.name), Appreciation: appr, YearlyAppr: yrs ? parseFloat((appr / yrs).toFixed(0)) : null };
  });
  return { incExp, value, roi, status, equity, equityPct, appreciation };
}

/**
 * Analytics panel — shown inside a Collapsible in PropertiesView.
 *
 * Props:
 *   filtered    — filtered property array
 *   allIncome   — pre-fetched income records (flat, tagged with property_id)
 *   allExpenses — pre-fetched expense records (flat, tagged with property_id)
 */
function Analytics({ filtered, allIncome, allExpenses }) {
  const [avgWindow, setAvgWindow] = useState(3);

  // Chart data is derived from property records alone — no async needed.
  // Recomputes whenever the filtered list changes.
  const chartData = useMemo(() => buildChartData(filtered), [filtered]);

  // Aggregated portfolio metrics via shared hook
  const agg = usePortfolioAggregates(filtered, allIncome, allExpenses);

  // Monthly averages via the shared avgMonthly helper
  const avg = useMemo(
    () => avgMonthly(allIncome, allExpenses, avgWindow),
    [allIncome, allExpenses, avgWindow],
  );

  const ml = monthsLeftInYear();
  const m  = usePortfolioMetrics(filtered, avg, agg, ml);

  // ── Analytics-only derived values ─────────────────────────────────────────
  const availEq    = Math.max(0, 0.80 * agg.market - agg.loan);
  const availEqPct = agg.equity > 0 ? availEq / agg.equity * 100 : null;

  const totalMortgage   = avg.mortgage;
  const monthlyInterest = filtered.reduce((s, p) =>
    p.loan_amount > 0 && p.mortgage_rate > 0 ? s + p.loan_amount * p.mortgage_rate / 100 / 12 : s, 0);
  const mortgagePrincipal = totalMortgage > monthlyInterest ? totalMortgage - monthlyInterest : null;

  const npPctA = agg.balance !== 0 ? (agg.sellingProfit / Math.abs(agg.balance) * 100) : null;

  return (
    <div style={{ padding: '1.25rem 1.5rem' }}>

      {/* ── Portfolio Summary ── */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem', paddingTop: '0.25rem' }}>

        {mc({
          label: 'Avail. Equity',
          primary: fmt(availEq),
          primaryCls: availEq > 0 ? 'text-success' : 'text-secondary',
          secondary: availEqPct !== null ? availEqPct.toFixed(1) + '% of ' + fmt(agg.equity) : null,
          secondaryCls: availEq > 0 ? 'text-success' : '',
          tertiary: 'Borrowable at ≤80% LTV',

      </div>
    </div>
  );

function Dashboard({ properties, onPropertyClick }) {
  const [allIncome,   setAllIncome]   = useState([]);
  const [allExpenses, setAllExpenses] = useState([]);
  const [allEvents,   setAllEvents]   = useState({});   // keyed by property id
  const [avgWindow,   setAvgWindow]   = useState(3);
  const [loading,     setLoading]     = useState(false);

  useEffect(() => {
    if (!properties.length) return;
    setLoading(true);
    Promise.all(
      properties.map(p =>
        fetch(`${API_URL}/income?property_id=${p.id}`).then(r => r.ok ? r.json() : [])
          .then(d => d.map(i => ({ ...i, property_id: p.id })))
      )
    ).then(results => setAllIncome(results.flat())).catch(() => {});
    Promise.all(
      properties.map(p =>
        fetch(`${API_URL}/expenses?property_id=${p.id}`).then(r => r.ok ? r.json() : [])
          .then(d => d.map(e => ({ ...e, property_id: p.id })))
      )
    ).then(results => { setAllExpenses(results.flat()); setLoading(false); })
      .catch(() => setLoading(false));
    // Events are fetched per-property and stored in a map so PropertyCard
    // can call calcEconVacancy with the correct event history.
    Promise.all(
      properties.map(p =>
        fetch(`${API_URL}/events?property_id=${p.id}`).then(r => r.ok ? r.json() : [])
          .then(evs => [p.id, evs])
      )
    ).then(pairs => setAllEvents(Object.fromEntries(pairs))).catch(() => {});
  }, [properties.map(p => p.id).join(',')]);

  const agg = usePortfolioAggregates(properties, allIncome, allExpenses);

  const avg = useMemo(() =>
    avgMonthly(allIncome, allExpenses, avgWindow),
  [allIncome, allExpenses, avgWindow]);

  // ── Chart data ────────────────────────────────────────────────────────────
  const incExpData = properties.map(p => ({
    name: sn(p.name), Income: p.total_income, Expenses: p.total_expenses,
    Net: p.total_income - p.total_expenses,
  }));
  const apprData   = properties.map(p => ({ name: sn(p.name), Appreciation: p.market_price - p.purchase_price }));
  const equityData = properties.map(p => ({ name: sn(p.name), Equity: p.market_price - p.loan_amount, Loan: p.loan_amount }));

  // ── Pre-computed values ───────────────────────────────────────────────────

  // KPI panel
  const ltvColors = ltvColor(agg.loanPct ?? 0);
  const netPos    = agg.sellingProfit;
  const npPct     = agg.balance !== 0 ? (netPos / Math.abs(agg.balance) * 100) : null;

  const ml = monthsLeftInYear();
  const m  = usePortfolioMetrics(properties, avg, agg, ml);

  // Expected expenses for the avg-expenses card
  const expExpensesVal = agg.expNOI != null ? agg.totalExpectedOpEx + avg.mortgage : null;

  return (
    <>
      <div className="page-header">
        <div>
          <h1 className="page-title">Dashboard</h1>
          <p className="page-subtitle">Portfolio overview and performance</p>
        </div>
      </div>

      {/* ── Portfolio KPIs ── */}
      <SectionLabel>Portfolio Snapshot</SectionLabel>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.5rem' }}>
        <KPICard label="Portfolio Value" primary={fmt(agg.market)}
          secondary={agg.appr !== 0 ? (agg.appr >= 0 ? '+' : '') + fmt(agg.appr) + (agg.apprPct !== null ? ' (' + agg.apprPct.toFixed(1) + '%)' : '') : null}
          secondaryCls={agg.appr >= 0 ? 'text-success' : 'text-danger'}
          accentColor="#3b82f6"
          tooltip={`Sum of current market values across all properties.\nTotal appreciation: ${fmt(agg.appr)} (${agg.apprPct !== null ? agg.apprPct.toFixed(1) + '%' : 'n/a'} over purchase price of ${fmt(agg.purchase)}.`} />
        <KPICard label="Total Equity" primary={fmt(agg.equity)}
          primaryCls={agg.equity >= 0 ? 'text-success' : 'text-danger'}
          secondary={agg.equityPct !== null ? fp(agg.equityPct) + ' of value' : null}
          accentColor="#10b981"
          tooltip="Your ownership stake across all properties.\nFormula: Total Market Value − Total Outstanding Loans." />
        <KPICard label="Total Loan" primary={fmt(agg.loan)}
          primaryCls="text-danger"
          secondary={agg.loanPct !== null ? fp(agg.loanPct) + ' LTV' : null}
          secondaryCls={agg.loanPct !== null ? ltvColors.cls : ''}
          accentColor="#ef4444"
          tooltip="Total outstanding mortgage balances across all properties.\nLTV = Total Loans ÷ Portfolio Value." />
        <KPICard label="Occupancy"
          primary={agg.occupancyPct !== null ? fp(agg.occupancyPct) : '—'}
          primaryCls={agg.occupancyPct >= 90 ? 'text-success' : agg.occupancyPct >= 70 ? '' : 'text-danger'}
          secondary={`${agg.occupied} of ${properties.length} properties`}
          accentColor={agg.occupancyPct >= 90 ? '#10b981' : agg.occupancyPct >= 70 ? '#f59e0b' : '#ef4444'}
          tooltip="Share of properties currently occupied (not marked Vacant)." />
        <KPICard label="Operating Profit" primary={fmt(agg.netBalance)}
          primaryCls={agg.netBalance >= 0 ? 'text-success' : 'text-danger'}
          secondary={agg.roi !== null ? fp(agg.roi) + ' ROI' : null}
          secondaryCls={agg.roi !== null && agg.roi >= 0 ? 'text-success' : 'text-danger'}
          accentColor={agg.netBalance >= 0 ? '#10b981' : '#ef4444'}
          tooltip="All-time income minus all operating expenses (excluding equity-building capital).\nROI = Operating Profit ÷ Portfolio Value." />
        <KPICard label="Net Position" primary={fmt(netPos)}
          primaryCls={netPos >= 0 ? 'text-success' : 'text-danger'}
          secondary={npPct !== null ? npPct.toFixed(1) + '% of net spending' : null}
          secondaryCls={npPct !== null ? (npPct >= 0 ? 'text-success' : 'text-danger') : ''}
          accentColor={netPos >= 0 ? '#10b981' : '#ef4444'}
          tooltip={`What you would walk away with after selling all properties and clearing all mortgages today.\nFormula: Portfolio Value + All Income − All Expenses − All Loans.`} />
      </div>

      {/* ── Appreciation ── */}
      <SectionLabel>Appreciation</SectionLabel>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.25rem' }}>
        {mc({ label: 'Total Appreciation', primary: fmt(agg.appr),
          primaryCls: agg.appr >= 0 ? 'text-success' : 'text-danger',
          secondary: agg.apprPct !== null && agg.purchase > 0 ? agg.apprPct.toFixed(1) + '% from ' + fmt(agg.purchase) : null,
          secondaryCls: agg.appr >= 0 ? 'text-success' : 'text-danger',
          tooltip: 'Total unrealised gain: current Market Value minus original Purchase Price across all properties.' })}
        {mc({ label: 'Yearly Appreciation',
          primary: fmt(agg.yearlyAppr),
          primaryCls: agg.yearlyAppr >= 0 ? 'text-success' : 'text-danger',
          secondary: agg.yearlyApprPct !== null ? fp(agg.yearlyApprPct) + ' per year' : null,
          secondaryCls: agg.yearlyAppr >= 0 ? 'text-success' : 'text-danger',

      <SectionLabel>YTD — trailing 12 months</SectionLabel>

        {mc({ label: `Avg Expenses (${avgWindow}M)`,

        {mc({ label: `Avg NOI (${avgWindow}M)`,
          primary: fmt(avg.noi),
          primaryCls: avg.noi >= 0 ? 'text-success' : 'text-danger',
          ...expGap(avg.noi, agg.expNOI, v => v >= 0 ? 'text-success' : 'text-danger', fmt, 'Exp:', true, 50),
          tooltip: 'Net Operating Income: avg monthly income minus all op-ex, excluding mortgage and principal.\nExp = total monthly rent minus budgeted operating expenses.' })}
      </div>

      {/* Row 2 */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '0.65rem' }}>
        {m.capRate !== null && mc({ label: `Cap Rate (${avgWindow}M)`,
          primary: fPct(m.capRate),
          primaryCls: m.capRate > 0.07 ? 'text-success' : m.capRate > 0.04 ? '' : 'text-danger',
          ...expGap(m.capRate, m.expCap, v => v > 0.07 ? 'text-success' : v > 0.04 ? '' : 'text-danger', fPct, 'Exp:', true, 0.005),
          tertiary: m.capRate > 0.07 ? 'Strong yield' : m.capRate > 0.04 ? 'Moderate yield' : 'Weak yield',
          tooltip: 'Portfolio Cap Rate = annualised NOI ÷ total market value.\n> 7%: strong. 4–7%: moderate. < 4%: weak.' })}
        {m.oer !== null && mc({ label: `OER (${avgWindow}M)`,
          primary: fPct(m.oer),
          primaryCls: m.oer < 0.35 ? 'text-success' : m.oer < 0.50 ? '' : 'text-danger',
          ...expGap(m.oer, m.expOER, v => v < 0.35 ? 'text-success' : v < 0.50 ? '' : 'text-danger', fPct, 'Exp:', false, 0.02),
          tertiary: m.oer < 0.35 ? 'Efficient' : m.oer < 0.50 ? 'Normal' : 'High costs',
          tooltip: 'Operating Expense Ratio = avg op-ex ÷ avg gross income.\nBelow 35%: efficient. 35–50%: normal. Above 50%: review costs.' })}
        {m.dscr !== null && mc({ label: `DSCR (${avgWindow}M)`,
          primary: m.dscr.toFixed(2) + 'x',
          primaryCls: m.dscr >= 1.25 ? 'text-success' : m.dscr >= 1.0 ? 'text-warning' : 'text-danger',
          ...expGap(m.dscr, m.expDSCR, v => v >= 1.25 ? 'text-success' : v >= 1.0 ? 'text-warning' : 'text-danger', v => v.toFixed(2) + 'x', 'Exp:', true, 0.05),
          tertiary: m.dscr >= 1.25 ? 'Healthy coverage' : m.dscr >= 1.0 ? 'Marginal' : 'Below 1x',
          tooltip: 'Debt Service Coverage Ratio = avg monthly NOI ÷ avg mortgage payment.' })}
        {m.icr !== null && mc({ label: `ICR (${avgWindow}M)`,
          primary: m.icr.toFixed(2) + 'x',
          primaryCls: m.icr >= 2 ? 'text-success' : m.icr >= 1.25 ? '' : 'text-danger',
          ...expGap(m.icr, m.expICR, v => v >= 2 ? 'text-success' : v >= 1.25 ? '' : 'text-danger', v => v.toFixed(2) + 'x', 'Exp:', true, 0.05),
          tertiary: m.icr >= 2 ? 'Strong' : m.icr >= 1.25 ? 'Adequate' : 'Weak',
          tooltip: 'Interest Coverage Ratio = annualised NOI ÷ total annual interest (loan \u00d7 rate) across all properties.\n\u2265 2.0x: strong. 1.25\u20132.0x: adequate. < 1.25x: tight.\nExp uses budgeted operating costs.' })}
      </div>

      {/* Row 3: Monthly gain + net position + payback / break-even */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1.5rem' }}>
        {mc({ label: 'Monthly Gain', primary: fmt(m.mg),
          primaryCls: m.mg >= 0 ? 'text-success' : 'text-danger',
          ...expGap(m.mg, m.expMG, v => v >= 0 ? 'text-success' : 'text-danger', fmt, 'Exp:', true, 50),
          tooltip: 'Avg Cash Flow + Monthly Appreciation (yearly ÷ 12).\nExp uses budgeted operating costs + expected appreciation %.' })}
        {mc({ label: 'Net Position', primary: fmt(agg.sellingProfit),
          primaryCls: agg.sellingProfit >= 0 ? 'text-success' : 'text-danger',
          tooltip: 'Market Value + Total Income − Total Expenses − Loans.' })}
        {mc({ label: 'Payback Period', ...m.payback,
          secondary: m.expPPLabel, secondaryCls: m.expPPLabel ? 'text-success' : '',
          tooltip: `Time until all recorded expenses are recovered by cumulative cash flow.\nNumerator = Total Expenses − Total Income (${fmt(agg.expenses)} − ${fmt(agg.income)}).\nExp uses budgeted cash flow.` })}
        {mc({ label: 'Break-even', ...m.breakEven,
          secondary: m.expBELabel, secondaryCls: m.expBELabel ? 'text-success' : '',
          tooltip: 'Time until Net Position reaches zero or better.\nUses monthly gain (cash flow + appreciation) to close the gap.\nExp uses budgeted monthly gain.' })}
      </div>

      {/* ── Charts ── */}
      {properties.length > 0 && (<>
        <div className="chart-container">
          <div className="chart-header"><h2 className="chart-title">Income vs Expenses by Property</h2></div>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={incExpData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
              <XAxis dataKey="name" stroke="#9ca3af" />
              <YAxis stroke="#9ca3af" />
              <Tooltip contentStyle={CHART_TOOLTIP_STYLE} formatter={v => `$${Number(v).toLocaleString()}`} />
              <Legend />
              <Bar dataKey="Income"   fill="#10b981" name="Income" />
              <Bar dataKey="Expenses" fill="#ef4444" name="Expenses" />
              <Bar dataKey="Net"      fill="#3b82f6" name="Net" />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
          <div className="chart-container" style={{ margin: 0 }}>
            <div className="chart-header"><h2 className="chart-title">Appreciation by Property</h2></div>
            <ResponsiveContainer width="100%" height={210}>
              <BarChart data={apprData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                <XAxis dataKey="name" stroke="#9ca3af" tick={{ fontSize: 11 }} />
                <YAxis stroke="#9ca3af" tick={{ fontSize: 11 }} />
                <Tooltip contentStyle={CHART_TOOLTIP_STYLE} formatter={v => `$${Number(v).toLocaleString()}`} />
                <Bar dataKey="Appreciation">
                  {apprData.map((e, i) => <Cell key={i} fill={e.Appreciation >= 0 ? '#10b981' : '#ef4444'} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="chart-container" style={{ margin: 0 }}>
            <div className="chart-header"><h2 className="chart-title">Equity vs Loan by Property</h2></div>
            <ResponsiveContainer width="100%" height={210}>
              <BarChart data={equityData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                <XAxis dataKey="name" stroke="#9ca3af" tick={{ fontSize: 11 }} />
                <YAxis stroke="#9ca3af" tick={{ fontSize: 11 }} />
                <Tooltip contentStyle={CHART_TOOLTIP_STYLE} formatter={v => `$${Number(v).toLocaleString()}`} />
                <Legend />
                <Bar dataKey="Equity" stackId="a" fill="#10b981" />
                <Bar dataKey="Loan"   stackId="a" fill="#ef4444" />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </>)}

      <div className="page-header" style={{ marginTop: '1.5rem' }}>
        <h2 className="chart-title">Recent Properties</h2>
      </div>
      {properties.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">🏢</div>
          <div className="empty-state-text">No properties yet</div>
        </div>
      ) : (
        <div className="property-grid">
          {properties.slice(0, 6).map(p => (
            <PropertyCard
              key={p.id} property={p}
              avgCashFlow={agg.perPropAvg[p.id]?.cashflow}
              avgNOI={agg.perPropAvg[p.id]?.noi}
              events={allEvents[p.id] ?? []}
              onClick={() => onPropertyClick(p)}
            />
          ))}
        </div>
      )}
    </>
  );
}
