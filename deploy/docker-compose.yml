# ── Equitee Docker Compose ────────────────────────────────────────
#
# Production:  docker compose up -d
# Development: docker compose --profile dev up -d
#
# The nginx container serves:
#   - Landing page on the root domain (equitee.ca / dev.equitee.ca)
#   - React SPA + API proxy on the app subdomain (app.equitee.ca / app.dev.equitee.ca)
#
# Required .env file (see .env.saas.example):
#   JWT_SECRET, DB_PASSWORD, SMTP_*, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

services:
  # ── Nginx Gateway ───────────────────────────────────────────────
  # Serves landing page, frontend SPA, and proxies API requests.
  # This is the only service that exposes ports to the host.
  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
      args:
        # Switch to "development.conf" for the dev server
        VHOST: ${VHOST:-production.conf}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certs from Let's Encrypt (production only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # No ports exposed to host — nginx proxies to this container
    expose:
      - "5000"
    environment:
      - TENANCY_MODE=saas
      - DATABASE_URL=postgresql://equitee:${DB_PASSWORD:-equitee_db_password}@db:5432/equitee
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=true
      - MAIL_FROM=${MAIL_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=equitee
      - POSTGRES_PASSWORD=${DB_PASSWORD:-equitee_db_password}
      - POSTGRES_DB=equitee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equitee"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
