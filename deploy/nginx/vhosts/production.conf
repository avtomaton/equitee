# ── Production nginx vhosts ────────────────────────────────────────
# Deploy on: equitee.ca production server
#
# Architecture:
#   equitee.ca      → Landing page (static HTML)
#   app.equitee.ca  → React SPA (frontend) + API reverse proxy (backend)
#
# SSL certificates managed by certbot / Let's Encrypt.
# Replace the SSL placeholder paths after running: certbot --nginx

# ── Landing Page ──────────────────────────────────────────────────
server {
    listen 80;
    server_name equitee.ca www.equitee.ca;
    return 301 https://equitee.ca$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.equitee.ca;
    ssl_certificate     /etc/letsencrypt/live/equitee.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/equitee.ca/privkey.pem;
    return 301 https://equitee.ca$request_uri;
}

server {
    listen 443 ssl http2;
    server_name equitee.ca;

    ssl_certificate     /etc/letsencrypt/live/equitee.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/equitee.ca/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /var/www/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── Application (SPA + API) ──────────────────────────────────────
server {
    listen 80;
    server_name app.equitee.ca;
    return 301 https://app.equitee.ca$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.equitee.ca;

    ssl_certificate     /etc/letsencrypt/live/app.equitee.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.equitee.ca/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Frontend SPA ──────────────────────────────────────────────
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (Vite outputs hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Health check endpoint ─────────────────────────────────────
    location /health {
        proxy_pass http://backend:5000/api/health;
        access_log off;
    }
}
