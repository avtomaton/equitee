# ── Development / Testing nginx vhosts ────────────────────────────
# Deploy on: dev server (separate machine from production)
#
# Architecture:
#   dev.equitee.ca      → Landing page (static HTML)
#   app.dev.equitee.ca  → React SPA (frontend) + API reverse proxy (backend)
#
# For local development without SSL, see the "local dev" variant below.
# For staging on a real server, use certbot for SSL certs.

# ── Landing Page ──────────────────────────────────────────────────
server {
    listen 80;
    server_name dev.equitee.ca;
    # Uncomment for SSL on dev server:
    # return 301 https://dev.equitee.ca$request_uri;

    root /var/www/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

# Uncomment this block when using SSL on the dev server:
# server {
#     listen 443 ssl http2;
#     server_name dev.equitee.ca;
#
#     ssl_certificate     /etc/letsencrypt/live/dev.equitee.ca/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/dev.equitee.ca/privkey.pem;
#
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_prefer_server_ciphers off;
#
#     root /var/www/landing;
#     index index.html;
#
#     location / {
#         try_files $uri $uri/ /index.html;
#     }
# }

# ── Application (SPA + API) ──────────────────────────────────────
server {
    listen 80;
    server_name app.dev.equitee.ca;
    # Uncomment for SSL on dev server:
    # return 301 https://app.dev.equitee.ca$request_uri;

    root /var/www/frontend;
    index index.html;

    # ── Frontend SPA ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── API reverse proxy ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Health check ──────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:5000/api/health;
        access_log off;
    }
}

