# A generic, single database configuration for tenant schemas.
# This is invoked with TENANT_SCHEMA env var set to route migrations
# to a specific tenant's PostgreSQL schema.

[alembic]
script_location = %(here)s

# template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# sys.path path
prepend_sys_path = ..

# path_separator
path_separator = os

# database URL — inherited from the main app's DATABASE_URL
# (set via environment variable when invoking alembic)
sqlalchemy.url = %(DATABASE_URL)s

# output encoding
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
