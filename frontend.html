<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Analytics - Flask Backend</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f4c75;
            --highlight: #3282b8;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #0a0e1a;
            --surface: #151b2e;
            --text: #e8eaed;
            --text-secondary: #9ba3af;
            --border: #2a3350;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(50, 130, 184, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(15, 76, 117, 0.15) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-5%, -5%) rotate(120deg); }
            66% { transform: translate(5%, 5%) rotate(240deg); }
        }

        #root {
            position: relative;
            z-index: 1;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--text) 0%, var(--highlight) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .connection-status {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .connection-status.connected {
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .connection-status.disconnected {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--highlight), var(--accent));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--highlight);
            box-shadow: 0 12px 40px rgba(50, 130, 184, 0.2);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .stat-change {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--highlight) 0%, var(--accent) 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(50, 130, 184, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--highlight);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-icon {
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.875rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--highlight);
            box-shadow: 0 0 0 3px rgba(50, 130, 184, 0.1);
        }

        .property-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .property-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .property-item:hover {
            border-color: var(--highlight);
            transform: translateX(4px);
        }

        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .property-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .property-address {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .property-actions {
            display: flex;
            gap: 0.5rem;
        }

        .property-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .property-stat {
            text-align: center;
        }

        .property-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .property-stat-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .property-stat-value.positive { color: var(--success); }
        .property-stat-value.negative { color: var(--danger); }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.4s ease;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--highlight);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-success {
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .alert-info {
            background: rgba(50, 130, 184, 0.1);
            color: var(--highlight);
            border: 1px solid rgba(50, 130, 184, 0.3);
        }

        input[type="file"] {
            display: none;
        }

        .api-config {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .api-config input {
            margin-top: 0.5rem;
        }

        @media (max-width: 968px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2.5rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }

            .header-actions {
                width: 100%;
                flex-wrap: wrap;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        const COLORS = ['#3282b8', '#0f4c75', '#2ecc71', '#f39c12', '#e74c3c', '#9b59b6'];

        // API Configuration
        const DEFAULT_API_URL = 'http://localhost:5000/api';

        function App() {
            const [apiUrl, setApiUrl] = useState(localStorage.getItem('apiUrl') || DEFAULT_API_URL);
            const [properties, setProperties] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [editingProperty, setEditingProperty] = useState(null);
            const [loading, setLoading] = useState(true);
            const [alert, setAlert] = useState(null);
            const [isConnected, setIsConnected] = useState(false);

            useEffect(() => {
                localStorage.setItem('apiUrl', apiUrl);
                checkConnection();
            }, [apiUrl]);

            useEffect(() => {
                if (isConnected) {
                    loadProperties();
                }
            }, [isConnected]);

            const showAlert = (message, type = 'info') => {
                setAlert({ message, type });
                setTimeout(() => setAlert(null), 4000);
            };

            const checkConnection = async () => {
                try {
                    const response = await fetch(`${apiUrl.replace('/api', '')}/api/health`);
                    if (response.ok) {
                        setIsConnected(true);
                        showAlert('Connected to API server', 'success');
                    } else {
                        setIsConnected(false);
                        showAlert('API server not responding', 'error');
                    }
                } catch (error) {
                    setIsConnected(false);
                    showAlert('Cannot connect to API server', 'error');
                }
            };

            const loadProperties = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(`${apiUrl}/properties`);
                    if (!response.ok) throw new Error('Failed to fetch properties');
                    
                    const data = await response.json();
                    
                    // Convert snake_case to camelCase
                    const formatted = data.map(p => ({
                        id: p.id,
                        name: p.name,
                        province: p.province,
                        city: p.city,
                        address: p.address,
                        postalCode: p.postal_code,
                        parking: p.parking,
                        purchasePrice: p.purchase_price,
                        marketPrice: p.market_price,
                        loanAmount: p.loan_amount,
                        possDate: p.poss_date,
                        monthlyRent: p.monthly_rent,
                        status: p.status,
                        totalExpenses: p.total_expenses,
                        totalIncome: p.total_income,
                        expenses: []
                    }));
                    
                    setProperties(formatted);
                } catch (error) {
                    console.error('Error loading properties:', error);
                    showAlert('Failed to load properties', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const saveProperty = async (property) => {
                try {
                    const payload = {
                        name: property.name,
                        province: property.province,
                        city: property.city,
                        address: property.address,
                        postalCode: property.postalCode,
                        parking: property.parking,
                        purchasePrice: property.purchasePrice,
                        marketPrice: property.marketPrice,
                        loanAmount: property.loanAmount,
                        possDate: property.possDate,
                        monthlyRent: property.monthlyRent,
                        status: property.status
                    };

                    const url = property.id 
                        ? `${apiUrl}/properties/${property.id}`
                        : `${apiUrl}/properties`;
                    
                    const method = property.id ? 'PUT' : 'POST';
                    
                    const response = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('Failed to save property');
                    
                    await loadProperties();
                    showAlert(`Property ${property.id ? 'updated' : 'created'} successfully`, 'success');
                    setShowModal(false);
                } catch (error) {
                    console.error('Error saving property:', error);
                    showAlert('Failed to save property', 'error');
                }
            };

            const deleteProperty = async (id) => {
                if (!confirm('Are you sure you want to delete this property?')) return;
                
                try {
                    const response = await fetch(`${apiUrl}/properties/${id}`, {
                        method: 'DELETE'
                    });

                    if (!response.ok) throw new Error('Failed to delete property');
                    
                    await loadProperties();
                    showAlert('Property deleted successfully', 'success');
                } catch (error) {
                    console.error('Error deleting property:', error);
                    showAlert('Failed to delete property', 'error');
                }
            };

            const exportToJSON = async () => {
                try {
                    const response = await fetch(`${apiUrl}/export`);
                    if (!response.ok) throw new Error('Export failed');
                    
                    const data = await response.json();
                    
                    const dataStr = JSON.stringify(data, null, 2);
                    const dataBlob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(dataBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `real-estate-data-${new Date().toISOString().split('T')[0]}.json`;
                    link.click();
                    URL.revokeObjectURL(url);
                    showAlert('Data exported successfully', 'success');
                } catch (error) {
                    console.error('Export error:', error);
                    showAlert('Failed to export data', 'error');
                }
            };

            const importFromJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        
                        if (!Array.isArray(imported)) {
                            throw new Error('Invalid data format');
                        }

                        const response = await fetch(`${apiUrl}/import`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(imported)
                        });

                        if (!response.ok) throw new Error('Import failed');
                        
                        await loadProperties();
                        showAlert('Data imported successfully', 'success');
                    } catch (error) {
                        console.error('Import error:', error);
                        showAlert('Failed to import data', 'error');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const stats = useMemo(() => {
                const totalRevenue = properties.reduce((sum, p) => sum + p.totalIncome, 0);
                const totalExpenses = properties.reduce((sum, p) => sum + p.totalExpenses, 0);
                const netProfit = totalRevenue - totalExpenses;
                const totalValue = properties.reduce((sum, p) => sum + p.marketPrice, 0);
                const totalDebt = properties.reduce((sum, p) => sum + p.loanAmount, 0);
                const totalEquity = totalValue - totalDebt

                return {
                    totalRevenue,
                    totalExpenses,
                    netProfit,
                    totalValue,
                    totalEquity,
                    propertyCount: properties.length
                };
            }, [properties]);

            const propertyChartData = properties.map(p => ({
                name: p.name.split(' ')[0],
                Revenue: p.totalIncome,
                Expenses: p.totalExpenses,
                Profit: p.totalIncome - p.totalExpenses
            }));

            const expenseBreakdown = useMemo(() => {
                const breakdown = {};
                /*
                properties.forEach(p => {
                    p.expenses.forEach(e => {
                        breakdown[e.type] = (breakdown[e.type] || 0) + e.amount;
                    });
                });
                */
                return Object.entries(breakdown).map(([name, value]) => ({ name, value }));
            }, [properties]);

            if (loading) {
                return (
                    <div className="app-container">
                        <div className="loading">
                            <div className="loading-spinner"></div>
                            <p style={{ marginTop: '1rem' }}>Loading your properties...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <header>
                        <div className="header-left">
                            <h1>Portfolio Analytics</h1>
                            <p className="subtitle">Real Estate Investment Dashboard</p>
                        </div>
                        <div className="header-actions">
                            <div className={`connection-status ${isConnected ? 'connected' : 'disconnected'}`}>
                                <span className="status-dot"></span>
                                {isConnected ? 'API Connected' : 'API Offline'}
                            </div>
                            <button className="btn btn-secondary btn-small btn-icon" onClick={exportToJSON} disabled={!isConnected}>
                                <span>📥 Export</span>
                            </button>
                            <label className="btn btn-secondary btn-small btn-icon">
                                <span>📤 Import</span>
                                <input type="file" accept=".json" onChange={importFromJSON} disabled={!isConnected} />
                            </label>
                        </div>
                    </header>

                    {alert && (
                        <div className={`alert alert-${alert.type}`}>
                            <span>{alert.type === 'success' ? '✓' : alert.type === 'error' ? '✗' : 'ℹ'}</span>
                            <span>{alert.message}</span>
                        </div>
                    )}

                    {!isConnected && (
                        <div className="api-config">
                            <label>API URL:</label>
                            <input
                                type="text"
                                value={apiUrl}
                                onChange={(e) => setApiUrl(e.target.value)}
                                placeholder="http://localhost:5000/api"
                            />
                            <button 
                                className="btn btn-primary btn-small" 
                                onClick={checkConnection}
                                style={{ marginTop: '0.5rem' }}
                            >
                                <span>Connect</span>
                            </button>
                        </div>
                    )}

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Total Properties</div>
                            <div className="stat-value">{stats.propertyCount}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Portfolio Value</div>
                            <div className="stat-value">${stats.totalValue.toLocaleString()}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Total Equity</div>
                            <div className="stat-value">${stats.totalEquity.toLocaleString()}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Monthly Revenue</div>
                            <div className="stat-value">${stats.totalRevenue.toLocaleString()}</div>
                            <div className="stat-change positive">↑ Income</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Monthly Expenses</div>
                            <div className="stat-value">${stats.totalExpenses.toLocaleString()}</div>
                            <div className="stat-change negative">↓ Costs</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Net Profit</div>
                            <div className="stat-value" style={{ color: stats.netProfit >= 0 ? 'var(--success)' : 'var(--danger)' }}>
                                ${stats.netProfit.toLocaleString()}
                            </div>
                            <div className={`stat-change ${stats.netProfit >= 0 ? 'positive' : 'negative'}`}>
                                {stats.netProfit >= 0 ? '↑' : '↓'} {stats.totalRevenue > 0 ? ((stats.netProfit / stats.totalRevenue) * 100).toFixed(1) : 0}% margin
                            </div>
                        </div>
                    </div>

                    <div className="content-grid">
                        <div className="card">
                            <div className="card-header">
                                <h2 className="card-title">Revenue vs Expenses</h2>
                            </div>
                            {propertyChartData.length > 0 ? (
                                <ResponsiveContainer width="100%" height={300}>
                                    <BarChart data={propertyChartData}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#2a3350" />
                                        <XAxis dataKey="name" stroke="#9ba3af" />
                                        <YAxis stroke="#9ba3af" />
                                        <Tooltip 
                                            contentStyle={{ 
                                                background: '#151b2e', 
                                                border: '1px solid #2a3350',
                                                borderRadius: '8px',
                                                color: '#e8eaed'
                                            }} 
                                        />
                                        <Legend />
                                        <Bar dataKey="Revenue" fill="#3282b8" />
                                        <Bar dataKey="Expenses" fill="#e74c3c" />
                                        <Bar dataKey="Profit" fill="#2ecc71" />
                                    </BarChart>
                                </ResponsiveContainer>
                            ) : (
                                <div className="empty-state">
                                    <p>No data to display</p>
                                </div>
                            )}
                        </div>

                        <div className="card">
                            <div className="card-header">
                                <h2 className="card-title">Expense Breakdown</h2>
                            </div>
                            {expenseBreakdown.length > 0 ? (
                                <ResponsiveContainer width="100%" height={300}>
                                    <PieChart>
                                        <Pie
                                            data={expenseBreakdown}
                                            cx="50%"
                                            cy="50%"
                                            labelLine={false}
                                            label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}
                                            outerRadius={100}
                                            fill="#8884d8"
                                            dataKey="value"
                                        >
                                            {expenseBreakdown.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                            ))}
                                        </Pie>
                                        <Tooltip 
                                            contentStyle={{ 
                                                background: '#151b2e', 
                                                border: '1px solid #2a3350',
                                                borderRadius: '8px',
                                                color: '#e8eaed'
                                            }} 
                                        />
                                    </PieChart>
                                </ResponsiveContainer>
                            ) : (
                                <div className="empty-state">
                                    <p>No expenses to display</p>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="card full-width">
                        <div className="card-header">
                            <h2 className="card-title">Properties</h2>
                            <button 
                                className="btn btn-primary" 
                                onClick={() => { setEditingProperty(null); setShowModal(true); }}
                                disabled={!isConnected}
                            >
                                <span>+ Add Property</span>
                            </button>
                        </div>
                        
                        {properties.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">🏢</div>
                                <p>No properties yet. Add your first property to get started!</p>
                            </div>
                        ) : (
                            <div className="property-list">
                                {properties.map(property => (
                                    <PropertyItem 
                                        key={property.id}
                                        property={property}
                                        onEdit={(p) => { setEditingProperty(p); setShowModal(true); }}
                                        onDelete={deleteProperty}
                                    />
                                ))}
                            </div>
                        )}
                    </div>

                    {showModal && (
                        <PropertyModal
                            property={editingProperty}
                            onSave={saveProperty}
                            onClose={() => setShowModal(false)}
                        />
                    )}
                </div>
            );
        }

        function PropertyItem({ property, onEdit, onDelete }) {
            // const totalExpenses = property.expenses.reduce((sum, e) => sum + e.amount, 0);
            const totalExpenses = property.totalExpenses;
            const netIncome = property.totalIncome - totalExpenses;

            return (
                <div className="property-item">
                    <div className="property-header">
                        <div>
                            <div className="property-name">{property.name}</div>
                            <div className="property-address">{property.address}</div>
                        </div>
                        <div className="property-actions">
                            <button className="btn btn-secondary btn-small" onClick={() => onEdit(property)}>
                                <span>Edit</span>
                            </button>
                            <button className="btn btn-danger btn-small" onClick={() => onDelete(property.id)}>
                                <span>Delete</span>
                            </button>
                        </div>
                    </div>
                    <div className="property-stats">
                        <div className="property-stat">
                            <div className="property-stat-label">Monthly Rent</div>
                            <div className="property-stat-value">${property.monthlyRent.toLocaleString()}</div>
                        </div>
                        <div className="property-stat">
                            <div className="property-stat-label">Expenses</div>
                            <div className="property-stat-value">${totalExpenses.toLocaleString()}</div>
                        </div>
                        <div className="property-stat">
                            <div className="property-stat-label">Net Income</div>
                            <div className={`property-stat-value ${netIncome >= 0 ? 'positive' : 'negative'}`}>
                                ${netIncome.toLocaleString()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function PropertyModal({ property, onSave, onClose }) {
            const [formData, setFormData] = useState(property || {
                name: '',
                province: '',
                city: '',
                address: '',
                postalCode: '',
                parking: '',
                purchasePrice: 0,
                marketPrice: 0,
                loanAmount: 0,
                monthlyRent: 0,
                possDate: '',
                status: '',
                expenses: []
            });

            const [newExpense, setNewExpense] = useState({ type: '', amount: 0, recurring: true });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            const handleAddExpense = () => {
                if (newExpense.type && newExpense.amount > 0) {
                    setFormData({
                        ...formData,
                        expenses: [...formData.expenses, { ...newExpense }]
                    });
                    setNewExpense({ type: '', amount: 0, recurring: true });
                }
            };

            const handleRemoveExpense = (index) => {
                setFormData({
                    ...formData,
                    expenses: formData.expenses.filter((_, i) => i !== index)
                });
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{property ? 'Edit Property' : 'Add New Property'}</h2>
                        </div>
                        
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Property Name</label>
                                <input
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    required
                                />
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>Province</label>
                                    <input
                                        type="text"
                                        value={formData.province}
                                        onChange={(e) => setFormData({ ...formData, province: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>City</label>
                                    <input
                                        type="text"
                                        value={formData.city}
                                        onChange={(e) => setFormData({ ...formData, city: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Postal Code</label>
                                    <input
                                        type="text"
                                        value={formData.postalCode}
                                        onChange={(e) => setFormData({ ...formData, postalCode: e.target.value })}
                                        required
                                    />
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>Address</label>
                                    <input
                                        type="text"
                                        value={formData.address}
                                        onChange={(e) => setFormData({ ...formData, address: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Parking</label>
                                    <input
                                        type="text"
                                        value={formData.parking}
                                        onChange={(e) => setFormData({ ...formData, parking: e.target.value })}
                                        required
                                    />
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>Purchase Price</label>
                                    <input
                                        type="number"
                                        value={formData.purchasePrice}
                                        onChange={(e) => setFormData({ ...formData, purchasePrice: parseFloat(e.target.value) || 0 })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Market Price</label>
                                    <input
                                        type="number"
                                        value={formData.marketPrice}
                                        onChange={(e) => setFormData({ ...formData, marketPrice: parseFloat(e.target.value) || 0 })}
                                        required
                                    />
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                <label>Possession Date</label>
                                <input
                                    type="text"
                                    value={formData.possDate}
                                    onChange={(e) => setFormData({ ...formData, possDate: e.target.value })}
                                    required
                                />
                                </div>
                                <div className="form-group">
                                    <label>Loan Amount</label>
                                    <input
                                        type="number"
                                        value={formData.loanAmount}
                                        onChange={(e) => setFormData({ ...formData, loanAmount: parseFloat(e.target.value) || 0 })}
                                        required
                                    />
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                <label>Status</label>
                                <input
                                    type="text"
                                    value={formData.status}
                                    onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                    required
                                />
                                </div>
                                <div className="form-group">
                                    <label>Monthly Rent</label>
                                    <input
                                        type="number"
                                        value={formData.monthlyRent}
                                        onChange={(e) => setFormData({ ...formData, monthlyRent: parseFloat(e.target.value) || 0 })}
                                        required
                                    />
                                </div>
                            </div>

                            <div className="form-group">
                                <label>Expenses</label>
                                {formData.expenses.map((expense, index) => (
                                    <div key={index} style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.5rem', alignItems: 'center' }}>
                                        <input type="text" value={expense.type} readOnly style={{ flex: 1 }} />
                                        <input type="number" value={expense.amount} readOnly style={{ width: '120px' }} />
                                        <button 
                                            type="button" 
                                            className="btn btn-danger btn-small"
                                            onClick={() => handleRemoveExpense(index)}
                                        >
                                            <span>×</span>
                                        </button>
                                    </div>
                                ))}
                                
                                <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem' }}>
                                    <input
                                        type="text"
                                        placeholder="Expense type"
                                        value={newExpense.type}
                                        onChange={(e) => setNewExpense({ ...newExpense, type: e.target.value })}
                                        style={{ flex: 1 }}
                                    />
                                    <input
                                        type="number"
                                        placeholder="Amount"
                                        value={newExpense.amount || ''}
                                        onChange={(e) => setNewExpense({ ...newExpense, amount: parseFloat(e.target.value) || 0 })}
                                        style={{ width: '120px' }}
                                    />
                                    <button 
                                        type="button" 
                                        className="btn btn-secondary btn-small"
                                        onClick={handleAddExpense}
                                    >
                                    <span>Add</span>
                                    </button>
                                </div>
                            </div>

                            <div className="modal-actions">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>
                                    <span>Cancel</span>
                                </button>
                                <button type="submit" className="btn btn-primary">
                                    <span>{property ? 'Update' : 'Add'} Property</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ReactDOM.render(<App />, document.getElementById('root'));  // react 17
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
