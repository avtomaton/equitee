<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Portfolio Manager - Enhanced</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #252d3d;
            --accent-primary: #3b82f6;
            --accent-secondary: #60a5fa;
            --accent-tertiary: #93c5fd;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --border: #374151;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .sidebar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .sidebar-subtitle {
            font-size: 0.875rem;
            color: var(--text-tertiary);
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-section-title {
            padding: 0 2rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 2rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: var(--accent-primary);
            color: var(--accent-secondary);
        }

        .nav-icon {
            font-size: 1.25rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 2rem 3rem;
            max-width: calc(100vw - var(--sidebar-width));
        }

        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .page-subtitle {
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .page-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-tertiary));
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }

        /* Property Grid */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .property-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .property-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
        }

        .property-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .property-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .property-address {
            font-size: 0.875rem;
            color: var(--text-tertiary);
        }

        .property-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .property-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .property-badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .property-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .property-stat {
            display: flex;
            flex-direction: column;
        }

        .property-stat-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-bottom: 0.25rem;
        }

        .property-stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .property-card:hover .card-actions {
            opacity: 1;
        }

        /* Tables */
        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .table-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: var(--bg-tertiary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .filter-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .sort-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: var(--bg-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--accent-primary);
        }

        .sort-label {
            font-size: 0.75rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .multi-select {
            position: relative;
            min-width: 200px;
        }

        /* Trigger */
        .multi-select-trigger {
            padding: 0.5rem 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .multi-select-trigger:hover {
            border-color: var(--accent-primary);
        }

        /* Dropdown */
        .multi-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
        }

        /* Action bar */
        .multi-select-actions {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }

        .multi-select-actions button {
            background: none;
            border: none;
            color: var(--accent-primary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px 6px;
        }

        .multi-select-actions button:hover {
            text-decoration: underline;
        }

        .multi-select-actions button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* Options */
        .multi-select-option {
            padding: 0.6rem 0.75rem;
            display: flex;
            justify-content: space-between; /* important */
            align-items: center;
            transition: background 0.2s;
        }


        .multi-select-option:hover {
            background: var(--bg-tertiary);
        }

        /* Left side (checkbox + label) */
        .multi-select-option label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            flex: 1;
        }

        .multi-select-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Only button */
        .only-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        /* Show "only" on hover */
        .multi-select-option:hover .only-btn {
            opacity: 0.7;
        }

        .only-btn:hover {
            opacity: 1;
            color: var(--accent-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-tertiary);
        }

        th {
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Work Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-secondary);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .btn-icon {
            padding: 0.5rem;
            width: 2rem;
            height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input, select, textarea {
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Work Sans', sans-serif;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        /* Charts */
        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-header {
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Alerts */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* Responsive */
        @media (max-width: 968px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                max-width: 100vw;
                padding: 1.5rem;
            }
            
            .property-grid {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }

            .table-controls {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* Additional utility classes */
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-warning { color: var(--warning); }
        .text-primary { color: var(--text-primary); }
        .text-secondary { color: var(--text-secondary); }
        
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 1rem; }
        
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        const COLORS = ['#3b82f6', '#60a5fa', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
        const API_URL = 'http://localhost:5000/api';

        // Utility functions for date filtering
        const getDateRanges = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            return {
                ytd: {
                    start: new Date(year, 0, 1),
                    end: now
                },
                currentMonth: {
                    start: new Date(year, month, 1),
                    end: new Date(year, month + 1, 0)
                },
                currentYear: {
                    start: new Date(year, 0, 1),
                    end: new Date(year, 11, 31)
                },
                lastYear: {
                    start: new Date(year - 1, 0, 1),
                    end: new Date(year - 1, 11, 31)
                }
            };
        };

        const isDateInRange = (date, start, end) => {
            const d = new Date(date);
            return d >= start && d <= end;
        };

        // Multi-select component
        function MultiSelect({ label, options, selected, onChange }) {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };

                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const allSelected = selected.length === options.length;

            const handleToggle = (value) => {
                const newSelected = selected.includes(value)
                    ? selected.filter(s => s !== value)
                    : [...selected, value];
                onChange(newSelected);
            };

            const handleSelectAll = () => {
                onChange([...options]);
            };

            const handleClearAll = () => {
                onChange([]);
            };

            const handleOnly = (value) => {
                onChange([value]);
            };

            /*
            const displayText = selected.length === 0
                ? `All ${label}`
                : selected.length === options.length
                ? `All ${label}`
                : `${selected.length} selected`;
             */

            const displayText =
                selected.length === options.length
                    ? `All ${label}`
                    : selected.length === 0
                    ? `None`
                    : `${selected.length} selected`;

            return (
                <div className="multi-select" ref={ref}>

                        className="multi-select-trigger"

                                    <div key={option} className="multi-select-option">

                                            <input
                                                type="checkbox"
                                                checked={checked}
                                                onChange={() => handleToggle(option)}

                                );
                            })}

        // Main App Component
        function App() {

            const [alert, setAlert] = useState(null);
            const [selectedProperty, setSelectedProperty] = useState(null);
            const [showModal, setShowModal] = useState(null);

            useEffect(() => {

            const showAlert = (message, type = 'info') => {
                setAlert({ message, type });
                setTimeout(() => setAlert(null), 4000);
            };

            const loadData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(`${API_URL}/properties`);
                    if (!response.ok) throw new Error('Failed to fetch data');
                    const data = await response.json();
                    setProperties(data);
                } catch (error) {
                    console.error('Error loading data:', error);
                    showAlert('Failed to load data', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const stats = useMemo(() => {
                const totalValue = properties.reduce((sum, p) => sum + p.market_price, 0);
                const totalIncome = properties.reduce((sum, p) => sum + p.total_income, 0);
                const totalExpenses = properties.reduce((sum, p) => sum + p.total_expenses, 0);
                const netProfit = totalIncome - totalExpenses;

                return {
                    propertyCount: properties.length,
                    totalValue,
                    totalIncome,
                    totalExpenses,
                    netProfit,
                    avgROI: totalValue > 0 ? ((netProfit / totalValue) * 100).toFixed(2) : 0
                };
            }, [properties]);

            const renderView = () => {
                switch(currentView) {
                    case 'dashboard':
                        return <Dashboard properties={properties} stats={stats} onPropertyClick={handlePropertyClick} />;
                    case 'properties':
                        return <PropertiesView properties={properties} onPropertyClick={handlePropertyClick} onAddProperty={() => openModal('property', null)} onEditProperty={(p) => openModal('property', p)} onReload={loadData} />;
                    case 'expenses':
                        return <ExpensesView properties={properties} onAddExpense={() => openModal('expense', null)} onEditExpense={(e) => openModal('expense', e)} />;
                    case 'income':

                    case 'events':
                        return <EventsView properties={properties} />;
                    case 'property-detail':
                        return <PropertyDetail property={selectedProperty} onBack={() => setCurrentView('properties')} onAddExpense={() => openModal('expense', selectedProperty)} onAddIncome={() => openModal('income', selectedProperty)} onEdit={() => openModal('property', selectedProperty)} />;
                    default:
                        return <Dashboard properties={properties} stats={stats} onPropertyClick={handlePropertyClick} />;
                }
            };

            const handlePropertyClick = async (property) => {
                try {
                    const response = await fetch(`${API_URL}/properties/${property.id}`);
                    const data = await response.json();
                    setSelectedProperty(data);
                    setCurrentView('property-detail');

                    showAlert('Failed to load property details', 'error');

            const openModal = (type, data) => {
                setShowModal(type);
                setModalData(data);
            };

            const closeModal = () => {
                setShowModal(null);
                setModalData(null);
            };

            const handleSave = async () => {

                    <div className="loading">

                        <PropertyModal property={modalData} onClose={closeModal} onSave={handleSave} />

                    {showModal === 'expense' && (

        // EXPENSES VIEW with enhanced filtering
        function ExpensesView({ properties, onAddExpense, onEditExpense }) {
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [sortBy, setSortBy] = useState('expense_date');
            const [sortOrder, setSortOrder] = useState('desc');
            const [filterProperty, setFilterProperty] = useState('all');
            const [filterCategories, setFilterCategories] = useState([]);
            const [dateFilter, setDateFilter] = useState('all');
            const [customDateStart, setCustomDateStart] = useState('');
            const [customDateEnd, setCustomDateEnd] = useState('');

            useEffect(() => {
                loadExpenses();
            }, []);

            const loadExpenses = async () => {
                try {
                    setLoading(true);
                    const allExpenses = [];
                    for (const prop of properties) {
                        const response = await fetch(`${API_URL}/expenses?property_id=${prop.id}`);
                        if (response.ok) {
                            const data = await response.json();
                            allExpenses.push(...data.map(e => ({
                                ...e,
                                property_name: prop.name
                            })));
                        }
                    }
                    setExpenses(allExpenses);
                } catch (error) {
                    console.error('Error loading expenses:', error);
                } finally {
                    setLoading(false);
                }
            };

            const allCategories = useMemo(() => 
                [...new Set(expenses.map(e => e.expense_category))].sort(),
            [expenses]);

            const allPropertyNames = useMemo(() =>
                [...new Set(expenses.map(e => e.property_name))].sort(),
            [expenses]);

            const filteredExpenses = useMemo(() => {
                let filtered = expenses.filter(e => {
                    // Property filter
                    if (filterProperty !== 'all' && e.property_id !== parseInt(filterProperty)) {
                        return false;
                    }
                    // Category filter
                    if (filterCategories.length > 0 && !filterCategories.includes(e.expense_category)) {
                        return false;
                    }
                    // Date filter
                    if (dateFilter !== 'all' && dateFilter !== 'custom') {
                        const ranges = getDateRanges();
                        const range = ranges[dateFilter];
                        if (range && !isDateInRange(e.expense_date, range.start, range.end)) {
                            return false;
                        }
                    }
                    if (dateFilter === 'custom' && customDateStart && customDateEnd) {
                        const start = new Date(customDateStart);
                        const end = new Date(customDateEnd);
                        if (!isDateInRange(e.expense_date, start, end)) {
                            return false;
                        }
                    }
                    return true;
                });

                // Sort
                filtered.sort((a, b) => {
                    const order = sortOrder === 'asc' ? 1 : -1;
                    if (sortBy === 'expense_date') {
                        return order * (new Date(a.expense_date) - new Date(b.expense_date));
                    } else if (sortBy === 'amount') {
                        return order * (a.amount - b.amount);
                    }
                    return 0;
                });

                return filtered;
            }, [expenses, filterProperty, filterCategories, dateFilter, customDateStart, customDateEnd, sortBy, sortOrder]);

            const totalExpenses = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);

            return (
                <>

                        <div>

                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Total Transactions</div>
                            <div className="stat-value">{filteredExpenses.length}</div>
                        </div>
                    </div>

                    <div className="table-container">
                        <div className="table-header">
                            <div className="table-title">All Expenses</div>
                            <div className="table-controls">
                                <div className="filter-group">
                                    <span className="filter-label">Filter:</span>
                                    <select value={filterProperty} onChange={(e) => setFilterProperty(e.target.value)}>

                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                    <MultiSelect
                                        label="Categories"
                                        options={allCategories}
                                        selected={filterCategories}
                                        onChange={setFilterCategories}
                                    />
                                    <select value={dateFilter} onChange={(e) => setDateFilter(e.target.value)}>
                                        <option value="all">All Time</option>
                                        <option value="ytd">YTD</option>
                                        <option value="currentMonth">Current Month</option>
                                        <option value="currentYear">Current Year</option>
                                        <option value="lastYear">Last Year</option>
                                        <option value="custom">Custom Range</option>
                                    </select>
                                    {dateFilter === 'custom' && (
                                        <>
                                            <input
                                                type="date"
                                                value={customDateStart}
                                                onChange={(e) => setCustomDateStart(e.target.value)}
                                                placeholder="Start"
                                            />
                                            <input
                                                type="date"
                                                value={customDateEnd}
                                                onChange={(e) => setCustomDateEnd(e.target.value)}
                                                placeholder="End"
                                            />
                                        </>
                                    )}
                                </div>
                                <div className="sort-group">
                                    <span className="sort-label">Sort:</span>
                                    <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                                        <option value="expense_date">Date</option>

                                <div className="empty-state-icon">💳</div>

                                            <td className="text-danger">${expense.amount.toLocaleString()}</td>
                                            <td>

        // INCOME VIEW with enhanced filtering
        function IncomeView({ properties, onAddIncome, onEditIncome }) {
            const [income, setIncome] = useState([]);
            const [loading, setLoading] = useState(true);
            const [sortBy, setSortBy] = useState('income_date');
            const [sortOrder, setSortOrder] = useState('desc');
            const [filterProperty, setFilterProperty] = useState('all');
            const [filterTypes, setFilterTypes] = useState([]);
            const filterTypesInitialized = useRef(false);
            const [dateFilter, setDateFilter] = useState('all');
            const [customDateStart, setCustomDateStart] = useState('');
            const [customDateEnd, setCustomDateEnd] = useState('');

            const allTypes = useMemo(() =>
                [...new Set(income.map(i => i.income_type))].sort(),
                [income]);

            useEffect(() => {
                loadIncome();
            }, []);

            useEffect(() => {
                if (!filterTypesInitialized.current && allTypes.length > 0) {
                    setFilterTypes(allTypes);
                    filterTypesInitialized.current = true;
                }
            }, [allTypes]);

            const loadIncome = async () => {
                try {
                    setLoading(true);
                    const allIncome = [];
                    for (const prop of properties) {
                        const response = await fetch(`${API_URL}/income?property_id=${prop.id}`);
                        if (response.ok) {
                            const data = await response.json();
                            allIncome.push(...data.map(i => ({
                                ...i,
                                property_name: prop.name
                            })));
                        }
                    }
                    setIncome(allIncome);
                } catch (error) {
                    console.error('Error loading income:', error);
                } finally {
                    setLoading(false);
                }
            };

            const allPropertyNames = useMemo(() =>
                [...new Set(income.map(i => i.property_name))].sort(),
            [income]);

            const filteredIncome = useMemo(() => {
                let filtered = income.filter(i => {
                    // Property filter
                    if (filterProperty !== 'all' && i.property_id !== parseInt(filterProperty)) {
                        return false;
                    }
                    // Type filter
                    if (!filterTypes.includes(i.income_type)) {
                        return false;
                    }
                    // Date filter
                    if (dateFilter !== 'all' && dateFilter !== 'custom') {
                        const ranges = getDateRanges();
                        const range = ranges[dateFilter];
                        if (range && !isDateInRange(i.income_date, range.start, range.end)) {
                            return false;
                        }
                    }
                    if (dateFilter === 'custom' && customDateStart && customDateEnd) {
                        const start = new Date(customDateStart);
                        const end = new Date(customDateEnd);
                        if (!isDateInRange(i.income_date, start, end)) {
                            return false;
                        }
                    }
                    return true;
                });

                // Sort
                filtered.sort((a, b) => {
                    const order = sortOrder === 'asc' ? 1 : -1;
                    if (sortBy === 'income_date') {
                        return order * (new Date(a.income_date) - new Date(b.income_date));
                    } else if (sortBy === 'amount') {
                        return order * (a.amount - b.amount);
                    }
                    return 0;
                });

                return filtered;
            }, [income, filterProperty, filterTypes, dateFilter, customDateStart, customDateEnd, sortBy, sortOrder]);

            const totalIncome = filteredIncome.reduce((sum, i) => sum + i.amount, 0);

            return (

                    <div className="table-container">

                            <div className="table-controls">
                                <div className="filter-group">
                                    <span className="filter-label">Filter:</span>
                                    <select value={filterProperty} onChange={(e) => setFilterProperty(e.target.value)}>
                                        <option value="all">All Properties</option>
                                        {properties.map(p => (
                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                    <MultiSelect
                                        label="Types"
                                        options={allTypes}
                                        selected={filterTypes}
                                        onChange={setFilterTypes}
                                    />
                                    <select value={dateFilter} onChange={(e) => setDateFilter(e.target.value)}>
                                        <option value="all">All Time</option>
                                        <option value="ytd">YTD</option>
                                        <option value="currentMonth">Current Month</option>
                                        <option value="currentYear">Current Year</option>
                                        <option value="lastYear">Last Year</option>
                                        <option value="custom">Custom Range</option>
                                    </select>
                                    {dateFilter === 'custom' && (
                                        <>
                                            <input
                                                type="date"
                                                value={customDateStart}
                                                onChange={(e) => setCustomDateStart(e.target.value)}
                                                placeholder="Start"
                                            />
                                            <input

        // EVENTS VIEW
        function EventsView({ properties }) {
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filterProperty, setFilterProperty] = useState('all');
            const [editingEvent, setEditingEvent] = useState(null);
            const [editDescription, setEditDescription] = useState('');

            useEffect(() => {
                loadEvents();
            }, []);

            const loadEvents = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(`${API_URL}/events`);
                    if (response.ok) {
                        const data = await response.json();
                        setEvents(data);
                    }
                } catch (error) {
                    console.error('Error loading events:', error);
                } finally {
                    setLoading(false);
                }
            };

            const handleEditDescription = async (eventId) => {
                try {
                    const response = await fetch(`${API_URL}/events/${eventId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ description: editDescription })
                    });
                    if (response.ok) {
                        loadEvents();
                        setEditingEvent(null);
                        setEditDescription('');
                    }
                } catch (error) {
                    console.error('Error updating event:', error);
                }
            };

            const handleDeleteEvent = async (eventId) => {
                if (!confirm('Are you sure you want to delete this event?')) return;
                try {
                    const response = await fetch(`${API_URL}/events/${eventId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        loadEvents();
                    }
                } catch (error) {
                    console.error('Error deleting event:', error);
                }
            };

            const filteredEvents = events.filter(e => 
                filterProperty === 'all' || e.property_id === parseInt(filterProperty)
            );

            return (
                <>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">Events Log</h1>
                            <p className="page-subtitle">Track property changes and history</p>
                        </div>
                    </div>

                    <div className="table-container">
                        <div className="table-header">
                            <div className="table-title">All Events ({filteredEvents.length})</div>
                            <div className="table-controls">
                                <div className="filter-group">
                                    <span className="filter-label">Filter:</span>
                                    <select value={filterProperty} onChange={(e) => setFilterProperty(e.target.value)}>
                                        <option value="all">All Properties</option>
                                        {properties.map(p => (
                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {loading ? (
                            <div className="loading">
                                <div className="spinner"></div>
                            </div>
                        ) : filteredEvents.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">📝</div>
                                <div className="empty-state-text">No events recorded</div>
                            </div>
                        ) : (
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Property</th>
                                        <th>Field</th>
                                        <th>Old Value</th>
                                        <th>New Value</th>
                                        <th>Description</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredEvents.map((event) => (
                                        <tr key={event.id}>
                                            <td>{new Date(event.created_at).toLocaleString()}</td>
                                            <td>{event.property_name || 'N/A'}</td>
                                            <td>{event.column_name}</td>
                                            <td>{event.old_value}</td>
                                            <td>{event.new_value}</td>
                                            <td>
                                                {editingEvent === event.id ? (
                                                    <input
                                                        type="text"
                                                        value={editDescription}
                                                        onChange={(e) => setEditDescription(e.target.value)}
                                                        onBlur={() => handleEditDescription(event.id)}
                                                        onKeyPress={(e) => e.key === 'Enter' && handleEditDescription(event.id)}
                                                        autoFocus
                                                    />
                                                ) : (
                                                    <span 
                                                        onClick={() => {
                                                            setEditingEvent(event.id);
                                                            setEditDescription(event.description || '');
                                                        }}
                                                        style={{ cursor: 'pointer' }}
                                                    >
                                                        {event.description || '(click to add)'}
                                                    </span>
                                                )}
                                            </td>
                                            <td>
                                                <button 
                                                    className="btn btn-danger btn-small"
                                                    onClick={() => handleDeleteEvent(event.id)}
                                                >
                                                    Delete
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </>
            );
        }

        function IncomeModal({ income, properties, property, onClose, onSave }) {
            const [formData, setFormData] = useState(income || {
                property_id: property?.id || '',
                income_date: new Date().toISOString().split('T')[0],
                amount: 0,
                income_type: '',
                description: ''
            });

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                try {
                    const url = income 
                        ? `${API_URL}/income/${income.id}`
                        : `${API_URL}/income`;
                    
                    const method = income ? 'PUT' : 'POST';
                    
                    const response = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            propertyId: formData.property_id,
                            incomeDate: formData.income_date,
                            amount: formData.amount,
                            incomeType: formData.income_type,
                            description: formData.description
                        })
                    });

                    if (!response.ok) throw new Error('Failed to save income');
                    
                    onSave();
                } catch (error) {
                    console.error('Error saving income:', error);
                    alert('Failed to save income');
                }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{income ? 'Edit Income' : 'Add New Income'}</h2>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>

                        <form onSubmit={handleSubmit}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label>Property *</label>
                                    <select
                                        value={formData.property_id}
                                        onChange={(e) => setFormData({ ...formData, property_id: e.target.value })}
                                        required
                                    >
                                        <option value="">Select Property</option>
                                        {properties.map(p => (
                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Date *</label>
                                    <input
                                        type="date"
                                        value={formData.income_date}
                                        onChange={(e) => setFormData({ ...formData, income_date: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Amount *</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        value={formData.amount}
                                        onChange={(e) => setFormData({ ...formData, amount: parseFloat(e.target.value) || 0 })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Type *</label>
                                    <select
                                        value={formData.income_type}
                                        onChange={(e) => setFormData({ ...formData, income_type: e.target.value })}
                                        required
                                    >
                                        <option value="">Select Type</option>
                                        <option value="Rent">Rent</option>
                                        <option value="Security Deposit">Security Deposit</option>
                                        <option value="Late Fee">Late Fee</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                <div className="form-group full-width">
                                    <label>Description</label>
                                    <textarea
                                        rows="3"
                                        value={formData.description}
                                        onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                                    />
                                </div>
                            </div>

                            <div className="modal-actions">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>
                                    Cancel
                                </button>
                                <button type="submit" className="btn btn-primary">
                                    {income ? 'Update' : 'Add'} Income
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
